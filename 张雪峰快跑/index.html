<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>张雪峰快跑</title>
  <link rel="stylesheet" href="index.css">
  <script defer src="index.js"></script>
</head>
<body>
  <div class="page-shell">
    <main class="game-shell" aria-label="张雪峰快跑">
      <div class="hud" aria-live="polite">
        <div>
          <strong>张雪峰快跑</strong>
          <span>长按跳更高 · 连躲加分 · 收集道具 · 张老师语录助阵</span>
        </div>
        <div class="scoreboard">
          <span id="score">00000</span>
          <span id="best">HI 00000</span>
        </div>
      </div>

      <canvas id="game" width="960" height="420"></canvas>

      <div id="overlay" class="overlay">
        <h1>张雪峰快跑</h1>
        <p id="overlayText">空格 / ↑ 或跳跃按钮起跳，长按跳得更高；按 ↓ 或下蹲按钮躲过雪碧。</p>
        <div class="map-select" id="mapSelect">
          <button class="map-card active" data-map="campus">
            <span class="map-emoji">🎓</span>
            <span class="map-name">校园跑道</span>
          </button>
          <button class="map-card" data-map="city">
            <span class="map-emoji">🌃</span>
            <span class="map-name">城市夜景</span>
          </button>
          <button class="map-card" data-map="snow">
            <span class="map-emoji">🏔️</span>
            <span class="map-name">雪山高原</span>
          </button>
          <button class="map-card" data-map="volcano">
            <span class="map-emoji">🌋</span>
            <span class="map-name">火山地狱</span>
          </button>
          <button class="map-card" data-map="cyber">
            <span class="map-emoji">🌆</span>
            <span class="map-name">赛博都市</span>
          </button>
          <button class="map-card" data-map="beach">
            <span class="map-emoji">🏖️</span>
            <span class="map-name">沙滩海岸</span>
          </button>
        </div>
        <button id="startButton" type="button">开始</button>
      </div>
    </main>

    <div class="mobile-controls" aria-label="移动端控制">
      <button id="jumpButton" class="control-button jump-button" type="button">跳跃</button>
      <button id="duckButton" class="control-button duck-button" type="button">下蹲</button>
    </div>
  </div>
</body>
</html>
