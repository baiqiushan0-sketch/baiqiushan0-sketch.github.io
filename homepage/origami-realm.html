<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>折纸之境 | Origami Realm</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#1a1410;font-family:'PingFang SC','Microsoft YaHei',sans-serif;user-select:none}
canvas{display:block}
#ui{position:absolute;top:20px;left:50%;transform:translateX(-50%);display:flex;gap:12px;align-items:center;pointer-events:none}
.star-slot{width:36px;height:36px;border:2px dashed rgba(255,215,0,.3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .5s;background:rgba(0,0,0,.3)}
.star-slot.collected{border-color:#ffd700;background:rgba(255,215,0,.15);box-shadow:0 0 20px rgba(255,215,0,.4)}
#hint{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.75);font-size:14px;letter-spacing:2px;text-align:center;pointer-events:none;transition:all .3s;text-shadow:0 0 8px rgba(0,0,0,.8)}
#fold-hint{position:absolute;bottom:50%;left:50%;transform:translate(-50%,50%);padding:8px 20px;border:2px solid rgba(255,200,100,.8);border-radius:20px;color:#ffc864;font-size:14px;letter-spacing:2px;pointer-events:none;display:none;background:rgba(0,0,0,.5);animation:pulse2 1.2s ease-in-out infinite}
@keyframes pulse2{0%,100%{opacity:.5}50%{opacity:1}}
#title-overlay{position:absolute;top:30px;right:25px;pointer-events:none;color:rgba(255,255,255,.12);font-size:36px;letter-spacing:8px;writing-mode:vertical-rl;text-orientation:upright}
</style>
</head>
<body>
<div id="ui"></div>
<div id="hint">WASD 移动 · 靠近机关按 <b>E</b> 折叠 · 鼠标拖拽旋转视角 · 收集 5 颗纸星星</div>
<div id="title-overlay">折紙之境</div>
<div id="fold-hint">按 E 折叠</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
// ═══════════════════ SCENE ═══════════════════
const scene = new THREE.Scene();
scene.background = new THREE.Color('#2a2420');
scene.fog = new THREE.Fog('#2a2420', 18, 55);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.5, 100);
camera.position.set(6, 10, 10);
camera.lookAt(0, 1, 0);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.05;
document.body.appendChild(renderer.domElement);

// Lighting
scene.add(new THREE.AmbientLight('#fff5e8',0.5));
const sun=new THREE.DirectionalLight('#fff8f0',3.5);
sun.position.set(15,20,10);sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=0.5;sun.shadow.camera.far=80;
sun.shadow.camera.left=-25;sun.shadow.camera.right=25;
sun.shadow.camera.top=25;sun.shadow.camera.bottom=-25;
sun.shadow.bias=-0.0003;
scene.add(sun);
scene.add(new THREE.DirectionalLight('#ffe0c0',0.6).position.set(-5,3,-5));

// Paper Texture
const tc=document.createElement('canvas');tc.width=tc.height=512;
const tx=tc.getContext('2d');tx.fillStyle='#faf6f0';tx.fillRect(0,0,512,512);
for(let i=0;i<6000;i++){tx.fillStyle=`rgba(200,180,160,${Math.random()*0.06})`;tx.fillRect(Math.random()*512,Math.random()*512,Math.random()*3+1,Math.random()*2+1)}
const paperTex=new THREE.CanvasTexture(tc);paperTex.wrapS=paperTex.wrapT=THREE.RepeatWrapping;

function pMat(c='#f5efe5'){return new THREE.MeshStandardMaterial({color:c,roughness:0.75,metalness:0,map:paperTex,bumpMap:paperTex,bumpScale:0.02})}
function aMat(c='#e8c8a0'){return new THREE.MeshStandardMaterial({color:c,roughness:0.6,metalness:0.05})}
function eMat(c='#8b7355'){return new THREE.LineBasicMaterial({color:c,transparent:true,opacity:0.35})}
const sMat=new THREE.MeshStandardMaterial({color:'#ffd700',emissive:'#ffa000',emissiveIntensity:0.8,roughness:0.3,metalness:0.3});

function addEdge(mesh,color='#8b7355'){
  const eg=new THREE.EdgesGeometry(mesh.geometry);
  const el=new THREE.LineSegments(eg,eMat(color));
  el.position.copy(mesh.position);el.rotation.copy(mesh.rotation);
  scene.add(el);return el;
}

// ═══════════════════ GROUND PLANE ═══════════════════
const groundGeo=new THREE.PlaneGeometry(32,32);
const ground=new THREE.Mesh(groundGeo,pMat('#f8f3ec'));
ground.rotation.x=-Math.PI/2;ground.receiveShadow=true;
scene.add(ground);

// Ground crease grid
const cg=new THREE.Group();
for(let i=-15;i<=15;i+=2){
  const g=new THREE.BoxGeometry(32,0.015,0.025);cg.add(new THREE.Mesh(g,aMat('#e0d5c5')).position.set(0,0.008,i));
  const g2=new THREE.BoxGeometry(0.025,0.015,32);cg.add(new THREE.Mesh(g2,aMat('#e0d5c5')).position.set(i,0.008,0));
}cg.position.y=0.003;scene.add(cg);

// Desk border
const bGeo=new THREE.BoxGeometry(33,0.35,33);const bM=new THREE.Mesh(bGeo,aMat('#c4a882'));bM.position.y=-0.18;bM.receiveShadow=bM.castShadow=true;scene.add(bM);

// ═══════════════════ PLATFORMS (islands separated by gaps) ═══════════════════
// platforms: {x,z,w,d,h,name}
const platforms=[
  {x:0,z:0,w:5,d:5,h:0.5,name:'起始岛'},
  {x:0,z:-7,w:5,d:4,h:0.5,name:'北岛'},
  {x:9,z:0,w:5,d:5,h:0.5,name:'东岛'},
  {x:-7,z:-7,w:4,d:4,h:2.0,name:'高台岛'},
  {x:-7,z:5,w:4,d:4,h:0.5,name:'西岛'},
];
const platformMeshes=[];
platforms.forEach(p=>{
  const geo=new THREE.BoxGeometry(p.w,p.h,p.d);
  const mesh=new THREE.Mesh(geo,pMat('#faf6f2'));
  mesh.position.set(p.x,p.h/2,p.z);
  mesh.castShadow=mesh.receiveShadow=true;
  scene.add(mesh);addEdge(mesh,'#a09080');
  platformMeshes.push({mesh,x:p.x,z:p.z,hw:p.w/2,hd:p.d/2,ht:p.h});
});

// ═══════════════════ GAP ZONES (fall detection) ═══════════════════
const gaps=[
  {x:0,z:-3.5,w:3,d:2.5},        // Between start island and north island
  {x:4.5,z:0,w:3,d:3},           // Between start island and east island
  {x:-3.5,z:-3.5,w:2.5,d:2.5},   // Between start island and high platform
  {x:-3.5,z:2.5,w:2.5,d:2},      // Between start island and west island
];

// ═══════════════════ FOLDABLE BRIDGES ═══════════════════
const foldables=[];

function makeFoldBridge(x,y,z,w,h,axis='x',initialAngle=-Math.PI/2,label='bridge'){
  const group=new THREE.Group();group.position.set(x,y,z);
  const hinge=new THREE.Group();
  const pGeo=new THREE.PlaneGeometry(w,h);
  const panel=new THREE.Mesh(pGeo,pMat('#f2e8d8'));
  panel.position.y=h/2;panel.castShadow=panel.receiveShadow=true;
  hinge.add(panel);
  const edg=new THREE.LineSegments(new THREE.EdgesGeometry(pGeo),eMat('#8b7355'));
  edg.position.copy(panel.position);hinge.add(edg);
  hinge.rotation[axis]=initialAngle;
  group.add(hinge);
  group.userData={hinge,panel,edg,hingeAxis:axis,currentAngle:initialAngle,targetAngle:initialAngle,folded:true,ready:true,label,h,w,y};
  foldables.push(group);
  scene.add(group);
  return group;
}

// Bridge 1: Start → North (spans gap at z=-3.5)
const brN=makeFoldBridge(0,0.5,-4.8,4,3,'x',-Math.PI/2,'bridgeN');
// Bridge 2: Start → East (spans gap at x=4.5)
const brE=makeFoldBridge(6.8,0.5,0,4,3.5,'x',-Math.PI/2,'bridgeE');
// Bridge 3: Start → West
const brW=makeFoldBridge(-5,0.5,3.5,3.5,2.8,'x',-Math.PI/2,'bridgeW');
// Wall: Blocks path to high platform
const wallH=makeFoldBridge(-5.5,1.2,-5.5,2.5,3,'x',Math.PI/2,'wallH');

// ═══════════════════ COLLECTIBLE STARS ═══════════════════
const stars=[];
function mkStar(x,y,z){
  const g=new THREE.Group();
  [0,Math.PI/4].forEach(r=>{const c=new THREE.Mesh(new THREE.ConeGeometry(0.25,0.55,4),sMat);c.rotation.y=r;c.rotation.z=Math.PI/4;g.add(c)});
  g.position.set(x,y,z);g.userData={baseY:y,collected:false};
  scene.add(g);stars.push(g);return g;
}
// Stars placed such that each requires a foldable to reach
mkStar(0,1.5,-7.5);  // North island - needs bridgeN
mkStar(9.5,1.5,0);   // East island - needs bridgeE
mkStar(-7,1.5,5.5);  // West island - needs bridgeW
mkStar(-7,3.5,-7);   // High platform - needs wallH unfolded + bridge somewhere
mkStar(-7,3.5,-8.5); // High platform far edge

// ═══════════════════ PLAYER ═══════════════════
const player=new THREE.Group();
const bGeo=new THREE.ConeGeometry(0.22,0.8,4);const bM2=new THREE.Mesh(bGeo,aMat('#fafafa'));bM2.rotation.z=Math.PI/4;bM2.position.y=0.55;player.add(bM2);
const wGeo=new THREE.ConeGeometry(0.35,0.6,3);
const wL=new THREE.Mesh(wGeo,pMat('#fefefe'));wL.rotation.z=Math.PI/2.5;wL.position.set(0.18,0.65,0);player.add(wL);
const wR=new THREE.Mesh(wGeo,pMat('#fefefe'));wR.rotation.z=-Math.PI/2.5;wR.position.set(-0.18,0.65,0);player.add(wR);
const hGeo=new THREE.ConeGeometry(0.1,0.25,4);const hM=new THREE.Mesh(hGeo,aMat('#fff'));hM.position.y=1.0;hM.rotation.z=Math.PI/4;player.add(hM);
const shGeo=new THREE.CircleGeometry(0.22,16);const shM=new THREE.Mesh(shGeo,new THREE.MeshBasicMaterial({color:'#000',transparent:true,opacity:0.22,depthWrite:false}));shM.rotation.x=-Math.PI/2;shM.position.y=-0.01;player.add(shM);
player.position.set(0,0.6,0);player.castShadow=true;scene.add(player);

// ═══════════════════ STATE ═══════════════════
const keys={};let collected=0,lastSafePos=new THREE.Vector3(0,0.6,0),falling=false,fallTimer=0;
let camAngle=Math.PI/4,camDist=11,camH=7,targetAngle=camAngle,targetDist=camDist,targetH=camH;

// UI
const uiEl=document.getElementById('ui'),hintEl=document.getElementById('hint'),foldHint=document.getElementById('fold-hint');
for(let i=0;i<5;i++){const s=document.createElement('div');s.className='star-slot';s.textContent='★';uiEl.appendChild(s)}

// Input
window.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true});
window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false});
let dragging=false,lmx=0,lmx2=0;
window.addEventListener('mousedown',e=>{dragging=true;lmx=e.clientX});
window.addEventListener('mouseup',()=>dragging=false);
window.addEventListener('mousemove',e=>{if(dragging){targetAngle-=(e.clientX-lmx)*0.005;lmx=e.clientX}});
window.addEventListener('wheel',e=>{targetDist=Math.max(6,Math.min(22,targetDist+e.deltaY*0.02));targetH=Math.max(3,Math.min(16,targetH+e.deltaY*0.015))});

// ═══════════════════ HELPER: get platform height ═══════════════════
function getGroundY(px,pz){
  // Check each platform
  for(const p of platformMeshes){
    if(Math.abs(px-p.x)<p.hw+0.3&&Math.abs(pz-p.z)<p.hd+0.3){
      return p.ht+0.05; // top surface
    }
  }
  // Check unfolded bridges
  for(const f of foldables){
    const ud=f.userData;
    if(!ud.ready||Math.abs(ud.currentAngle-ud.targetAngle)>0.1)continue;
    if(ud.label==='wallH')continue; // wall is vertical block, not walkable
    const fx=f.position.x,fz=f.position.z,fw=ud.w/2,fh=ud.h;
    // Bridge lies flat (angle≈0): spans from fx-fh to fx along z
    if(ud.label==='bridgeN'&&Math.abs(px-fx)<fw+0.4&&pz<fz+0.3&&pz>fz-fh-0.3){
      return f.position.y+0.05;
    }
    if(ud.label==='bridgeE'&&Math.abs(pz-fz)<fw+0.4&&px>fx-fh-0.3&&px<fx+0.3){
      return f.position.y+0.05;
    }
    if(ud.label==='bridgeW'&&Math.abs(pz-fz)<fw+0.4&&px<fx+0.3&&px>fx-fh-0.3){
      return f.position.y+0.05;
    }
  }
  // Check if in gap
  for(const g of gaps){
    if(Math.abs(px-g.x)<g.w/2&&Math.abs(pz-g.z)<g.d/2){
      // Check if any unfolded bridge covers this gap
      for(const f of foldables){
        const ud=f.userData;
        if(!ud.ready||Math.abs(ud.currentAngle-ud.targetAngle)>0.3)continue;
        const fx=f.position.x,fz=f.position.z,fw=ud.w/2,fh=ud.h;
        if(ud.label==='bridgeN'&&Math.abs(px-fx)<fw+0.4&&pz<fz+0.3&&pz>fz-fh-0.3)return f.position.y+0.05;
        if(ud.label==='bridgeE'&&Math.abs(pz-fz)<fw+0.4&&px>fx-fh-0.3&&px<fx+0.3)return f.position.y+0.05;
        if(ud.label==='bridgeW'&&Math.abs(pz-fz)<fw+0.4&&px<fx+0.3&&px>fx-fh-0.3)return f.position.y+0.05;
      }
      // Gap not bridged → fall!
      return -5;
    }
  }
  return 0.5; // ground level
}

// ═══════════════════ FOLD TOGGLE ═══════════════════
function toggleFold(f){
  if(!f||!f.userData.ready)return;
  const ud=f.userData;
  ud.folded=!ud.folded;
  ud.targetAngle=ud.folded?-Math.PI/2:0;
  ud.ready=false;
  const names={bridgeN:'北桥',bridgeE:'东桥',bridgeW:'西桥',wallH:'高台壁'};
  hintEl.textContent=(ud.folded?'[折叠] ':'[展开] ')+(names[ud.label]||ud.label);
  hintEl.style.color=ud.folded?'#d4a060':'#60d4a0';
}

// ═══════════════════ UPDATE ═══════════════════
function update(){
  const spd=0.1;
  const fwd=new THREE.Vector3(-Math.sin(camAngle),0,-Math.cos(camAngle));
  const rgt=new THREE.Vector3(Math.cos(camAngle),0,-Math.sin(camAngle));
  const prevX=player.position.x,prevZ=player.position.z;

  if(keys['w']){player.position.x+=fwd.x*spd;player.position.z+=fwd.z*spd}
  if(keys['s']){player.position.x-=fwd.x*spd;player.position.z-=fwd.z*spd}
  if(keys['a']){player.position.x-=rgt.x*spd;player.position.z-=rgt.z*spd}
  if(keys['d']){player.position.x+=rgt.x*spd;player.position.z+=rgt.z*spd}

  // Clamp world bounds
  player.position.x=Math.max(-15,Math.min(15,player.position.x));
  player.position.z=Math.max(-15,Math.min(15,player.position.z));

  // Ground height
  const groundY=getGroundY(player.position.x,player.position.z);

  if(groundY<-3){
    // Falling into gap!
    if(!falling){falling=true;fallTimer=0}
    player.position.y-=(player.position.y-groundY)*0.1;
    fallTimer++;
    if(fallTimer>40){player.position.copy(lastSafePos);falling=false;hintEl.textContent='掉下去了！回到安全位置';hintEl.style.color='#e08060';setTimeout(()=>hintEl.style.color='',1500)}
  }else{
    if(falling){falling=false;fallTimer=0}
    player.position.y+=(groundY-player.position.y)*0.25;
    if(Math.abs(player.position.y-groundY)<0.15)lastSafePos.copy(player.position);
    // WallH collision (vertical wall blocking path)
    const wh=foldables.find(f=>f.userData.label==='wallH');
    if(wh&&Math.abs(wh.userData.currentAngle-Math.PI/2)<0.3){
      // Wall is up (vertical) - check collision
      const wp=wh.position;const hw=wh.userData.w/2,hh=wh.userData.h;
      if(Math.abs(player.position.z-wp.z)<0.4&&Math.abs(player.position.x-wp.x)<hw+0.5){
        player.position.x=prevX;player.position.z=prevZ;
      }
    }
  }

  // Movement animation
  const moved=Math.abs(player.position.x-prevX)>0.001||Math.abs(player.position.z-prevZ)>0.001;
  if(moved){const ma=Math.atan2(player.position.x-prevX,player.position.z-prevZ);player.rotation.y+=(ma-player.rotation.y)*0.25}
  const flSpd=moved?14:4;
  wL.rotation.z=Math.PI/2.5+Math.sin(Date.now()*0.012*flSpd)*0.3;
  wR.rotation.z=-Math.PI/2.5-Math.sin(Date.now()*0.012*flSpd)*0.3;

  // Fold animations
  foldables.forEach(f=>{
    const ud=f.userData;
    if(Math.abs(ud.currentAngle-ud.targetAngle)>0.003){
      ud.currentAngle+=(ud.targetAngle-ud.currentAngle)*0.15;
      ud.hinge.rotation[ud.hingeAxis]=ud.currentAngle;
    }else if(!ud.ready){
      ud.currentAngle=ud.targetAngle;ud.hinge.rotation[ud.hingeAxis]=ud.targetAngle;ud.ready=true;
    }
  });

  // Near foldable?
  let nearest=null,minDist=4;
  foldables.forEach(f=>{
    if(!f.userData.ready)return;
    const d=player.position.distanceTo(new THREE.Vector3(f.position.x,player.position.y,f.position.z));
    if(d<minDist){minDist=d;nearest=f}
  });
  if(nearest){foldHint.style.display='block'}else{foldHint.style.display='none'}

  // E key
  if(keys['e']&&nearest){toggleFold(nearest);keys['e']=false}

  // Collect stars
  stars.forEach((s,i)=>{
    if(s.userData.collected)return;
    const d=player.position.distanceTo(s.position);
    if(d<2.2){s.userData.collected=true;s.visible=false;collected++;
      const slots=uiEl.querySelectorAll('.star-slot');
      if(slots[collected-1])slots[collected-1].classList.add('collected');
      hintEl.textContent=`收集到纸星星！(${collected}/5)`;hintEl.style.color='#ffd700';
      setTimeout(()=>hintEl.style.color='',2000);
      if(collected>=5)setTimeout(()=>{hintEl.textContent='✨ 全部收集！折纸之境谜题已解开 ✨';hintEl.style.color='#ffd700'},1500);
    }
    s.rotation.y+=0.025;s.position.y=s.userData.baseY+Math.sin(Date.now()*0.0035+i)*0.35;
  });

  // Camera
  camAngle+=(targetAngle-camAngle)*0.06;camDist+=(targetDist-camDist)*0.06;camH+=(targetH-camH)*0.06;
  camera.position.set(player.position.x+Math.sin(camAngle)*camDist,player.position.y+camH,player.position.z+Math.cos(camAngle)*camDist);
  camera.lookAt(player.position.x,player.position.y+1,player.position.z);
}

// ═══════════════════ DECOR ═══════════════════
for(let i=0;i<15;i++){
  const g2=new THREE.PlaneGeometry(0.3+Math.random()*0.7,0.3+Math.random()*0.7);
  const m2=new THREE.Mesh(g2,pMat(`hsl(35,${25+Math.random()*20}%,${78+Math.random()*15}%)`));
  m2.rotation.x=-Math.PI/2+(Math.random()-0.5)*0.25;m2.rotation.z=Math.random()*Math.PI;
  m2.position.set((Math.random()-0.5)*30,0.015,(Math.random()-0.5)*30);m2.receiveShadow=true;scene.add(m2);
}
[[5,5,'#f5e6d0'],[-9,2,'#f0e0cc'],[3,-6,'#f8efe0'],[-10,-3,'#ede0d0'],[8,-8,'#f2e5d5']].forEach(([x,z,c])=>{
  const g3=new THREE.Group();
  g3.add(new THREE.Mesh(new THREE.ConeGeometry(0.12,0.4,4),pMat(c)).position.set(0,0.2,0));
  const w1=new THREE.Mesh(new THREE.ConeGeometry(0.16,0.3,3),pMat(c));w1.rotation.z=0.5;w1.position.set(0.08,0.25,0);g3.add(w1);
  const w2=new THREE.Mesh(new THREE.ConeGeometry(0.16,0.3,3),pMat(c));w2.rotation.z=-0.5;w2.position.set(-0.08,0.25,0);g3.add(w2);
  g3.position.set(x,0.03,z);g3.rotation.y=Math.random()*Math.PI*2;scene.add(g3);
});

// ═══════════════════ LOOP ═══════════════════
function loop(){requestAnimationFrame(loop);update();renderer.render(scene,camera)}
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
loop();
</script>
</body>
</html>
