<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🎱 3D台球 · 3D Pool</title>
<style>
:root{--bg:#080810;--gold:#c8a858;--text:#c0b8b0;--panel-bg:rgba(0,0,0,.55)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);overflow:hidden;touch-action:none;font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;user-select:none;-webkit-user-select:none}
#c{display:block}

/* top bar */
#top{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;justify-content:space-between;align-items:center;padding:10px 14px;pointer-events:none}
#top>*{pointer-events:auto}
#title{color:var(--gold);font-size:clamp(14px,2.5vw,19px);font-weight:700;letter-spacing:.06em;text-shadow:0 0 18px rgba(200,168,88,.4)}
#turn{color:var(--text);font-size:clamp(11px,2vw,13px);opacity:.85;background:var(--panel-bg);padding:6px 14px;border-radius:16px;border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(8px)}

/* power bar */
#pw-bar{position:fixed;right:12px;top:50%;transform:translateY(-50%);width:34px;height:min(180px,35vh);background:rgba(255,255,255,.04);border-radius:17px;border:1px solid rgba(255,255,255,.08);overflow:hidden;z-index:20}
#pw-fill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,#2ecc40,#f1c40f,#e74c3c);border-radius:0 0 16px 16px;transition:height .04s linear}
#pw-pct{position:absolute;bottom:6px;left:0;right:0;text-align:center;font-size:10px;font-weight:700;color:#fff;text-shadow:0 0 6px rgba(0,0,0,.8)}

/* messages */
#msg{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);z-index:15;pointer-events:none;font-size:clamp(16px,3.5vw,26px);font-weight:700;color:var(--gold);text-align:center;opacity:0;transition:opacity .35s;text-shadow:0 0 40px rgba(200,168,88,.5);letter-spacing:.04em}
#msg.on{opacity:1}
#alert{position:fixed;top:18%;left:50%;transform:translateX(-50%);z-index:15;pointer-events:none;font-size:clamp(11px,2vw,13px);color:#e05550;text-align:center;opacity:0;transition:opacity .3s;background:rgba(200,60,50,.1);padding:5px 16px;border-radius:12px;border:1px solid rgba(200,60,50,.2)}
#alert.on{opacity:1}

/* ball status sidebar */
#bs{position:fixed;left:8px;top:50%;transform:translateY(-50%);z-index:15;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:3px}
.bs-sect{font-size:9px;color:rgba(255,255,255,.4);margin:4px 0 2px;letter-spacing:.05em}
.bdot{width:12px;height:12px;border-radius:50%;border:1px solid rgba(255,255,255,.25);transition:all .4s}
.bdot.off{opacity:.15;transform:scale(.55);border-color:rgba(255,255,255,.08)}

/* buttons */
#btns{position:fixed;bottom:max(12px,2.5vh);left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:20;flex-wrap:wrap;justify-content:center}
.btn{padding:8px 18px;border-radius:20px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.45);color:var(--text);cursor:pointer;font-size:clamp(11px,1.8vw,13px);backdrop-filter:blur(6px);transition:all .18s;white-space:nowrap;letter-spacing:.03em}
.btn:active{background:rgba(255,255,255,.12);transform:scale(.94)}
.btn.au{border-color:rgba(200,168,88,.35);color:var(--gold)}

/* mobile tweaks */
@media(max-width:600px){
  #top{padding:6px 8px}#title{font-size:13px}
  #pw-bar{right:4px;width:26px}#btns{gap:5px}.btn{padding:6px 12px;font-size:10px}
  #bs{left:2px}.bdot{width:9px;height:9px}
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="top"><span id="title">🎱 3D 台球</span><span id="turn">玩家 1 · 开球</span></div>
<div id="pw-bar"><div id="pw-fill" style="height:0%"></div><div id="pw-pct">0%</div></div>
<div id="msg"></div><div id="alert"></div>
<div id="bs"></div>
<div id="btns">
  <button class="btn au" id="b-rst">🔄 重新开局</button>
  <button class="btn" id="b-cam">📷 视角</button>
  <button class="btn" id="b-top">🔝 俯视</button>
</div>

<script type="importmap">
{"imports":{
  "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ═══════════════════ CONSTANTS ═══════════════════ */
const TL=1.08,TW=0.55;             // table half-length / half-width
const BR=0.0275;                   // ball radius
const PR=0.052;                    // pocket detection radius
const RH=0.048,RW=0.075;           // rail height / width
const CUSH=0.62;                   // cushion restitution
const BALL_E=0.94;                 // ball-ball restitution
const FRIC=0.984;                  // sliding friction per frame
const ROLL_F=0.9982;               // rolling friction
const STOP=0.0006;                 // velocity stop threshold
const MAX_V=0.19;                  // max cue ball speed
const SUB=4;                       // physics sub-steps
const GRAV=9.8;

const SOLID_COLORS=['#f0c030','#2244bb','#cc2222','#442288','#ee6616','#117733','#772211'];
const STRIPE_COLORS=['#f0c030','#2244bb','#cc2222','#442288','#ee6616','#117733','#772211'];

/* pocket positions */
const POCKETS=[
  [-TL,-TW],[TL,-TW],[-TL,TW],[TL,TW], // corners
  [0,-TW-0.01],[0,TW+0.01]              // sides (slightly outside rail)
];

/* ═══════════════════ THREE SETUP ═══════════════════ */
const canvas=document.getElementById('c');
const isMobile=window.innerWidth<768||/Mobi|Android/i.test(navigator.userAgent);
const renderer=new THREE.WebGLRenderer({canvas,antialias:!isMobile,alpha:false});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=!isMobile;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.15;
renderer.outputColorSpace=THREE.SRGBColorSpace;

const scene=new THREE.Scene();
scene.background=new THREE.Color('#0c0c18');
scene.fog=new THREE.Fog('#0c0c18',3,9);

const camera=new THREE.PerspectiveCamera(48,innerWidth/innerHeight,.05,20);
camera.position.set(0,1.7,2.5);
camera.lookAt(0,0,.08);

const controls=new OrbitControls(camera,renderer.domElement);
controls.target.set(0,0,.08);
controls.enableDamping=true; controls.dampingFactor=.08;
controls.minDistance=.7; controls.maxDistance=5;
controls.maxPolarAngle=Math.PI*.47; controls.minPolarAngle=.12;
controls.rotateSpeed=.35; controls.panSpeed=.4;
controls.touches={ONE:THREE.TOUCH.ROTATE,TWO:THREE.TOUCH.DOLLY_PAN};
controls.update();

/* ═══════════════════ LIGHTS ═══════════════════ */
scene.add(new THREE.AmbientLight('#b0b8d0',.5));

const key=new THREE.DirectionalLight('#fff8e4',4);
key.position.set(2,4,1.5);
key.castShadow=!isMobile;
key.shadow.mapSize.set(1024,1024);
key.shadow.camera.near=.1;key.shadow.camera.far=16;
key.shadow.camera.left=-3.5;key.shadow.camera.right=3.5;
key.shadow.camera.top=3.5;key.shadow.camera.bottom=-3.5;
key.shadow.bias=-.00025;key.shadow.normalBias=.015;
scene.add(key);

scene.add(new THREE.DirectionalLight('#8899cc',.7).position.set(-1,2,-.5));
const spot=new THREE.SpotLight('#ffe8d0',7,8,Math.PI/4.5,.25,.6);
spot.position.set(0,3.2,.15);spot.castShadow=!isMobile;
spot.shadow.mapSize.set(512,512);spot.shadow.bias=-.00015;
scene.add(spot);

/* ═══════════════════ SOUND (Web Audio) ═══════════════════ */
let audioCtx=null;
function initAudio(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
}
function playHit(vol=.3,freq=800,dur=.08){
  if(!audioCtx) return;
  try{
    const t=audioCtx.currentTime;
    const g=audioCtx.createGain();
    const o=audioCtx.createOscillator();
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);
    o.frequency.setValueAtTime(freq,t);
    o.frequency.exponentialRampToValueAtTime(freq*.4,t+dur);
    o.type='sine';o.connect(g);g.connect(audioCtx.destination);
    o.start(t);o.stop(t+dur);
  }catch(e){}
}
function playBallHit(vol=.25){playHit(vol,900+Math.random()*400,.06);}
function playRailHit(vol=.2){playHit(vol,300+Math.random()*200,.05);}
function playPocket(vol=.18){
  if(!audioCtx) return;
  try{
    const t=audioCtx.currentTime;
    const g=audioCtx.createGain();g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+.25);
    const o=audioCtx.createOscillator();o.frequency.setValueAtTime(180,t);o.frequency.exponentialRampToValueAtTime(60,t+.25);
    o.type='triangle';o.connect(g);g.connect(audioCtx.destination);
    o.start(t);o.stop(t+.25);
  }catch(e){}
}

/* ═══════════════════ MATERIALS ═══════════════════ */
const M={
  felt:new THREE.MeshStandardMaterial({color:'#0d5e2e',roughness:.88,metalness:.02}),
  wood:new THREE.MeshStandardMaterial({color:'#4a2a10',roughness:.42,metalness:.06}),
  woodD:new THREE.MeshStandardMaterial({color:'#2a1406',roughness:.38,metalness:.08}),
  woodT:new THREE.MeshStandardMaterial({color:'#5e3a18',roughness:.32,metalness:.12}),
  pocket:new THREE.MeshStandardMaterial({color:'#050505',roughness:.25,metalness:.18}),
  metal:new THREE.MeshStandardMaterial({color:'#c0a880',roughness:.22,metalness:.78}),
  floor:new THREE.MeshStandardMaterial({color:'#1a1410',roughness:.72,metalness:.02}),
  rubber:new THREE.MeshStandardMaterial({color:'#1a3820',roughness:.68,metalness:.01}),
};

/* ═══════════════════ BALL TEXTURES ═══════════════════ */
function makeBallTex(num,baseColor){
  const S=512;const cv=document.createElement('canvas');cv.width=S;cv.height=S;
  const ctx=cv.getContext('2d');const cx=S/2,cy=S/2,R=S/2-4;

  function circle(x,y,r,fill){
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=fill;ctx.fill();
  }

  /* base sphere shading */
  const g=ctx.createRadialGradient(cx-R*.28,cy-R*.32,R*.04,cx,cy,R);
  g.addColorStop(0,'#ffffff');g.addColorStop(.45,'#eaeaea');g.addColorStop(1,'#b0b0b0');
  circle(cx,cy,R,g);

  if(num===0){/* cue - white */}

  else if(num===8){
    const b8=ctx.createRadialGradient(cx-R*.18,cy-R*.25,R*.04,cx,cy,R);
    b8.addColorStop(0,'#333');b8.addColorStop(1,'#0a0a0a');
    circle(cx,cy,R,b8);
    circle(cx,cy,R*.4,'#fafafa');
    ctx.fillStyle='#111';ctx.font=`bold ${R*.58}px "Segoe UI","Arial"`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('8',cx,cy+1);
  }else if(num<=7){
    const sc=ctx.createRadialGradient(cx-R*.18,cy-R*.25,R*.04,cx,cy,R);
    sc.addColorStop(0,lighten(baseColor,.35));sc.addColorStop(1,baseColor);
    circle(cx,cy,R,sc);
    circle(cx,cy,R*.4,'#fafafa');
    ctx.fillStyle='#111';ctx.font=`bold ${R*.58}px "Segoe UI","Arial"`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(String(num),cx,cy+1);
  }else{
    circle(cx,cy,R,'#f5f5f5');
    ctx.save();ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.clip();
    ctx.fillStyle=baseColor;ctx.fillRect(0,cy-R*.32,S,R*.64);ctx.restore();
    circle(cx,cy,R*.4,'#fafafa');
    ctx.fillStyle='#111';ctx.font=`bold ${R*.58}px "Segoe UI","Arial"`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(String(num),cx,cy+1);
  }
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.strokeStyle='rgba(0,0,0,.1)';ctx.lineWidth=3;ctx.stroke();

  const tex=new THREE.CanvasTexture(cv);
  tex.colorSpace=THREE.SRGBColorSpace;
  tex.minFilter=THREE.LinearMipmapLinearFilter;tex.magFilter=THREE.LinearFilter;tex.generateMipmaps=true;
  return tex;
}
function lighten(hex,a){
  const c=parseInt(hex.slice(1),16);
  let r=(c>>16)&0xff,g=(c>>8)&0xff,b=c&0xff;
  r=Math.min(255,r+Math.round((255-r)*a));g=Math.min(255,g+Math.round((255-g)*a));b=Math.min(255,b+Math.round((255-b)*a));
  return `#${((r<<16)|(g<<8)|b).toString(16).padStart(6,'0')}`;
}

/* ═══════════════════ BUILD TABLE ═══════════════════ */
/* floor */
const fl=new THREE.Mesh(new THREE.PlaneGeometry(10,10),M.floor);
fl.rotation.x=-Math.PI/2;fl.position.y=-.38;fl.receiveShadow=true;scene.add(fl);

/* cabinet (table body) */
const cab=new THREE.Mesh(
  new THREE.BoxGeometry(TL*2+RW*2,.26,TW*2+RW*2),M.woodD);
cab.position.y=-.22;cab.castShadow=true;cab.receiveShadow=true;scene.add(cab);

/* cabinet molding */
const moldGeo=new THREE.BoxGeometry(TL*2+RW*2+.04,.03,TW*2+RW*2+.04);
const mold=new THREE.Mesh(moldGeo,M.woodT);mold.position.y=-.085;mold.castShadow=true;scene.add(mold);

/* legs */
for(let x=-1;x<=1;x+=2)for(let z=-1;z<=1;z+=2){
  const legTop=new THREE.Mesh(new THREE.CylinderGeometry(.046,.05,.06,24),M.woodT);
  legTop.position.set(x*(TL-.06),-.2,z*(TW-.06));legTop.castShadow=true;scene.add(legTop);
  const leg=new THREE.Mesh(new THREE.CylinderGeometry(.04,.044,.58,24),M.woodD);
  leg.position.set(x*(TL-.06),-.5,z*(TW-.06));leg.castShadow=true;scene.add(leg);
}

/* playing surface */
const surfGeo=new THREE.PlaneGeometry(TL*2,TW*2,32,16);
/* felt with noise texture */
const fc=document.createElement('canvas');fc.width=256;fc.height=128;
const fctx=fc.getContext('2d');fctx.fillStyle='#0d5e2e';fctx.fillRect(0,0,256,128);
for(let i=0;i<3000;i++){
  const v=8+Math.random()*12;
  fctx.fillStyle=`rgba(${v},${55+Math.random()*18},${28+Math.random()*14},.12)`;
  fctx.fillRect(Math.random()*256,Math.random()*128,1.2,1.2);
}
const feltTex=new THREE.CanvasTexture(fc);feltTex.wrapS=feltTex.wrapT=THREE.RepeatWrapping;feltTex.repeat.set(10,5);
M.felt.map=feltTex;
const surf=new THREE.Mesh(surfGeo,M.felt);
surf.rotation.x=-Math.PI/2;surf.position.y=.001;surf.receiveShadow=true;scene.add(surf);

/* head string line */
const hlGeo=new THREE.PlaneGeometry(.003,TW*2);
const hl=new THREE.Mesh(hlGeo,new THREE.MeshBasicMaterial({color:'#fff',transparent:true,opacity:.12,side:THREE.DoubleSide}));
hl.rotation.x=-Math.PI/2;hl.position.set(-TL/2,.002,0);scene.add(hl);

/* foot spot */
const fs=new THREE.Mesh(new THREE.CircleGeometry(.016,32),
  new THREE.MeshBasicMaterial({color:'#fff',transparent:true,opacity:.25,side:THREE.DoubleSide}));
fs.rotation.x=-Math.PI/2;fs.position.set(TL/2,.002,0);scene.add(fs);

/* ── Rails ── */
function makeRail(x,z,w,h,isLong){
  const g=new THREE.Group();
  g.position.set(x,0,z);

  /* main rail block */
  const b=new THREE.Mesh(new THREE.BoxGeometry(w,RH,h),M.wood);
  b.position.y=RH/2;b.castShadow=true;b.receiveShadow=true;g.add(b);

  /* top cap */
  const c=new THREE.Mesh(new THREE.BoxGeometry(w,.01,h),M.woodT);
  c.position.y=RH;c.castShadow=true;g.add(c);

  /* inner cushion rubber */
  const cushW=isLong?w-.08:w*.22;
  const cushH=h-((isLong?.12:.1));
  const cush=new THREE.Mesh(new THREE.BoxGeometry(cushW,RH*.65,cushH),M.rubber);
  cush.position.y=RH*.38;
  /* position on inner edge */
  if(isLong){
    /* long rails: cushion on inner Z side */
    cush.position.z=z>0?-h/2+cushH*.5+0.005:h/2-cushH*.5-0.005;
  }else{
    /* short rails: cushion on inner X side */
    cush.position.x=x>0?-w/2+cushH*.5+0.005:w/2-cushH*.5-0.005;
  }
  g.add(cush);
  return g;
}

/* 2 long rails along X at ±(TW+RW/2) */
scene.add(makeRail(0,TW+RW/2,TL*2+RW*2,RW,true));
scene.add(makeRail(0,-TW-RW/2,TL*2+RW*2,RW,true));

/* 2 short rails along Z at ±(TL+RW/2) */
scene.add(makeRail(-TL-RW/2,0,RW,TW*2+RW*2,false));
scene.add(makeRail(TL+RW/2,0,RW,TW*2+RW*2,false));

/* ── Pocket holes ── */
POCKETS.forEach(([px,pz])=>{
  /* hole cylinder in the table */
  const hGeo=new THREE.CylinderGeometry(PR*.75,PR*.55,.14,40);
  const hole=new THREE.Mesh(hGeo,M.pocket);
  hole.position.set(px,-.05,pz);hole.receiveShadow=true;scene.add(hole);

  /* metal rim */
  const rimGeo=new THREE.TorusGeometry(PR*.78,.014,16,40);
  const rim=new THREE.Mesh(rimGeo,M.metal);
  rim.rotation.x=-Math.PI/2;rim.position.set(px,.003,pz);scene.add(rim);
});

/* ── Diamond markers ── */
function diamond(x,z,ry=0){
  const d=new THREE.Mesh(new THREE.SphereGeometry(.013,8,8),M.metal);
  d.scale.set(1,1,.25);d.position.set(x,RH+.004,z);d.rotation.y=ry;scene.add(d);
}
for(let i=-2;i<=2;i++){if(i!==0){diamond(i*TL/3,TW+RW,0);diamond(i*TL/3,-TW-RW,0);}}
for(let i=-1;i<=1;i++){if(i!==0){diamond(-TL-RW,i*TW/2,Math.PI/2);diamond(TL+RW,i*TW/2,Math.PI/2);}}

/* ═══════════════════ BALLS ═══════════════════ */
const balls=[];
const ballGeo=new THREE.SphereGeometry(BR,56,56);

function createBall(num,x,z){
  const color=num<=7?SOLID_COLORS[num-1]:num>=9?STRIPE_COLORS[num-9]:'#fff';
  const tex=makeBallTex(num,color);
  const mat=new THREE.MeshStandardMaterial({map:tex,roughness:.2,metalness:.06,color:'#fff'});
  const mesh=new THREE.Mesh(ballGeo,mat);
  mesh.castShadow=true;mesh.receiveShadow=true;
  mesh.position.set(x,BR,z);
  scene.add(mesh);
  const ball={
    num,mesh,
    pos:new THREE.Vector3(x,BR,z),
    vel:new THREE.Vector3(),
    ang:new THREE.Vector3(),
    out:false,
    cue:num===0,
    solid:num>=1&&num<=7,
    stripe:num>=9&&num<=15,
    eight:num===8,
    /* for spin visualization */
    rotQ:new THREE.Quaternion(),
  };
  balls.push(ball);
  return ball;
}

function rackBalls(){
  balls.forEach(b=>{if(b.mesh){scene.remove(b.mesh);b.mesh.material.map?.dispose();b.mesh.material.dispose();}});
  balls.length=0;

  const rx=TL/2;const space=BR*2.001;const rowH=space*Math.sqrt(3)/2;
  const order=[1,9,2,10,8,3,11,4,14,5,12,6,15,7,13];let idx=0;
  for(let row=0;row<5;row++){
    for(let col=0;col<=row;col++){
      createBall(order[idx++],rx+row*rowH,(col-row/2)*space);
    }
  }
  createBall(0,-TL/2,0);
}

/* ═══════════════════ CUE STICK ═══════════════════ */
const cueGrp=new THREE.Group();scene.add(cueGrp);cueGrp.visible=false;
const cueL=1.3;
/* shaft */
const shaft=new THREE.Mesh(
  new THREE.CylinderGeometry(.0055,.012,.6*cueL,28),
  new THREE.MeshStandardMaterial({color:'#f0dfc8',roughness:.28,metalness:.06}));
shaft.position.y=.2*cueL;cueGrp.add(shaft);
/* butt */
const butt=new THREE.Mesh(
  new THREE.CylinderGeometry(.012,.015,.4*cueL,28),
  new THREE.MeshStandardMaterial({color:'#1a0804',roughness:.32,metalness:.12}));
butt.position.y=-.2*cueL;cueGrp.add(butt);
/* ferrule + tip */
cueGrp.add(new THREE.Mesh(new THREE.CylinderGeometry(.005,.0055,.018,24),
  new THREE.MeshStandardMaterial({color:'#e8e0d0',roughness:.22,metalness:.35}))
).position.y=.5*cueL-.003;
cueGrp.add(new THREE.Mesh(new THREE.CylinderGeometry(.0045,.005,.012,24),
  new THREE.MeshStandardMaterial({color:'#2850a0',roughness:.48,metalness:.08}))
).position.y=.5*cueL+.01;

/* ═══════════════════ GAME STATE ═══════════════════ */
const S={
  moving:false,player:1,p1type:null,p2type:null,over:false,winner:null,
  foul:false,foulMsg:'',pocketed:[],firstHit:null,
  ballInHand:false,placing:false,power:0,shots:0,
};

/* ═══════════════════ PHYSICS ═══════════════════ */
function actives(){return balls.filter(b=>!b.out);}

function bbCollide(a,b){
  const dx=b.pos.x-a.pos.x,dz=b.pos.z-a.pos.z;
  const dist=Math.sqrt(dx*dx+dz*dz),minD=BR*2;
  if(dist>=minD||dist<.00001) return false;
  const nx=dx/dist,nz=dz/dist;
  const dvn=(a.vel.x-b.vel.x)*nx+(a.vel.z-b.vel.z)*nz;
  if(dvn<=0) return true; // already separating
  const imp=dvn*BALL_E*.5;
  a.vel.x-=imp*nx;a.vel.z-=imp*nz;
  b.vel.x+=imp*nx;b.vel.z+=imp*nz;
  const ov=minD-dist;
  a.pos.x-=ov*.5*nx;a.pos.z-=ov*.5*nz;
  b.pos.x+=ov*.5*nx;b.pos.z+=ov*.5*nz;
  return true;
}

function nearPocket(x,z){
  for(const [px,pz] of POCKETS){
    const d=Math.sqrt((x-px)**2+(z-pz)**2);
    if(d<PR+BR) return true;
  }
  return false;
}

function brCollide(ball){
  const bx=ball.pos.x,bz=ball.pos.z,r=BR;
  let hit=false;

  /* long rails (Z) */
  if(bz+r>TW){
    if(!nearPocket(bx,TW)){ball.pos.z=TW-r;if(ball.vel.z>0){ball.vel.z*=-CUSH;hit=true;}}
  }
  if(bz-r<-TW){
    if(!nearPocket(bx,-TW)){ball.pos.z=-TW+r;if(ball.vel.z<0){ball.vel.z*=-CUSH;hit=true;}}
  }
  /* short rails (X) */
  if(bx+r>TL){
    if(!nearPocket(TL,bz)){ball.pos.x=TL-r;if(ball.vel.x>0){ball.vel.x*=-CUSH;hit=true;}}
  }
  if(bx-r<-TL){
    if(!nearPocket(-TL,bz)){ball.pos.x=-TL+r;if(ball.vel.x<0){ball.vel.x*=-CUSH;hit=true;}}
  }
  return hit;
}

function checkPocket(ball){
  for(const [px,pz] of POCKETS){
    const d=Math.sqrt((ball.pos.x-px)**2+(ball.pos.z-pz)**2);
    if(d<PR*.7) return true;
    /* near edge and close enough */
    const atEdge=Math.abs(ball.pos.x)>TL-BR*1.6||Math.abs(ball.pos.z)>TW-BR*1.6;
    if(d<PR*.88&&atEdge) return true;
  }
  return false;
}

function pocketBall(ball){
  ball.out=true;ball.vel.set(0,0,0);
  S.pocketed.push(ball);
  playPocket();
  /* animate drop */
  const sy=ball.mesh.position.y;const ty=-.15;const st=performance.now();
  function anim(now){
    const t=Math.min((now-st)/250,1);
    ball.mesh.position.y=sy+(ty-sy)*(t*t);
    ball.mesh.visible=ball.mesh.position.y>ty+.03;
    if(t<1) requestAnimationFrame(anim);
  }
  requestAnimationFrame(anim);
}

function updatePhysics(dt){
  const active=actives();
  const sdt=dt/SUB;
  let hitSoundPlayed=false;

  for(let s=0;s<SUB;s++){
    for(const b of active){
      b.pos.x+=b.vel.x*sdt;
      b.pos.z+=b.vel.z*sdt;
      b.pos.y=BR;
    }
    /* ball-ball */
    for(let i=0;i<active.length;i++)
      for(let j=i+1;j<active.length;j++)
        if(bbCollide(active[i],active[j])&&!hitSoundPlayed){playBallHit();hitSoundPlayed=true;}
    /* ball-rail */
    for(const b of active){
      if(brCollide(b)){
        if(!hitSoundPlayed){playRailHit();hitSoundPlayed=true;}
        if(!S._railHit) S._railHit=true;
      }
    }
    /* pockets */
    for(const b of active){
      if(b.cue) continue;
      if(checkPocket(b)) pocketBall(b);
    }
  }

  /* friction */
  let anyMove=false;
  for(const b of active){
    const sp=b.vel.length();
    if(sp>STOP){
      const f=sp<.008?ROLL_F:FRIC;
      b.vel.multiplyScalar(f);anyMove=true;
    }else{b.vel.set(0,0,0);}
  }
  return anyMove;
}

/* ═══════════════════ GAME LOGIC ═══════════════════ */
const $msg=document.getElementById('msg'),$alert=document.getElementById('alert'),$turn=document.getElementById('turn');
const $pwF=document.getElementById('pw-fill'),$pwP=document.getElementById('pw-pct'),$bs=document.getElementById('bs');

function msg(t,d=2200){
  $msg.textContent=t;$msg.classList.add('on');
  clearTimeout($msg._t);$msg._t=setTimeout(()=>$msg.classList.remove('on'),d);
}
function alertMsg(t,d=2800){
  $alert.textContent=t;$alert.classList.add('on');
  clearTimeout($alert._t);$alert._t=setTimeout(()=>$alert.classList.remove('on'),d);
}

function updateBS(){
  if(!balls.length){$bs.innerHTML='';return;}
  const sols=balls.filter(b=>b.solid),strs=balls.filter(b=>b.stripe),e8=balls.find(b=>b.eight);
  let h='<span class="bs-sect">实心</span>';
  sols.forEach(b=>h+=`<div class="bdot${b.out?' off':''}" style="background:${SOLID_COLORS[b.num-1]};box-shadow:0 0 6px ${SOLID_COLORS[b.num-1]}33"></div>`);
  h+='<span class="bs-sect">花色</span>';
  strs.forEach(b=>h+=`<div class="bdot${b.out?' off':''}" style="background:${STRIPE_COLORS[b.num-9]};box-shadow:0 0 6px ${STRIPE_COLORS[b.num-9]}33"></div>`);
  h+='<span class="bs-sect">黑8</span>';
  h+=`<div class="bdot${e8&&e8.out?' off':''}" style="background:#111;box-shadow:0 0 6px #000;border:2px solid #555"></div>`;
  $bs.innerHTML=h;
}

function updateTurnLabel(){
  const t=S.player===1?S.p1type:S.p2type;
  const ts=t==='solid'?'实心球':t==='stripe'?'花色球':'任意球';
  $turn.textContent=`玩家 ${S.player} · ${ts}${S.over?' (胜!)':''}`;
}

function checkEndShot(){
  const cue=balls.find(b=>b.cue);
  if(!cue) return;

  /* cue ball in pocket */
  if(cue.out||checkPocket(cue)){
    if(!cue.out){cue.out=true;cue.vel.set(0,0,0);cue.mesh.visible=false;playPocket();}
    S.foul=true;S.foulMsg='白球落袋';
    S.ballInHand=true;
  }

  /* foul check: first contact */
  if(!S.foul&&S.firstHit){
    const pt=S.player===1?S.p1type:S.p2type;
    if(pt==='solid'&&S.firstHit.stripe){S.foul=true;S.foulMsg='先击中对方球';}
    if(pt==='stripe'&&S.firstHit.solid){S.foul=true;S.foulMsg='先击中对方球';}
    if(S.firstHit.eight){
      const rem=balls.filter(b=>{
        if(b.out||b.cue||b.eight) return false;
        return pt==='solid'?b.solid:b.stripe;
      });
      if(rem.length>0){S.foul=true;S.foulMsg='尚有球未打完击中8号';}
    }
  }

  /* foul: no object ball contact */
  if(!S.foul&&!S.firstHit&&S.pocketed.filter(b=>!b.cue).length===0){
    S.foul=true;S.foulMsg='未击中目标球';
    S.ballInHand=true;
  }

  /* foul check: no rail contact */
  if(!S.foul&&S.pocketed.length===0&&S.firstHit&&!S._railHit){
    S.foul=true;S.foulMsg='无球碰库';
    S.ballInHand=true;
  }

  /* check win/loss */
  const e8=balls.find(b=>b.eight);
  if(e8&&e8.out){
    const pt=S.player===1?S.p1type:S.p2type;
    const rem=balls.filter(b=>{if(b.out||b.cue||b.eight)return false;return pt==='solid'?b.solid:b.stripe;});
    if(rem.length===0&&!S.foul){S.over=true;S.winner=S.player;msg(`🎉 玩家 ${S.player} 获胜！`,4000);}
    else{S.over=true;S.winner=S.player===1?2:1;msg(`💥 8号违规落袋！玩家 ${S.winner} 获胜`,4000);}
  }

  /* first pocket assigns types */
  if(!S.p1type&&S.pocketed.length>0&&!S.foul){
    const fp=S.pocketed.filter(b=>!b.cue&&!b.eight)[0];
    if(fp){
      if(fp.solid){S.p1type=S.player===1?'solid':'stripe';S.p2type=S.player===1?'stripe':'solid';}
      else{S.p1type=S.player===1?'stripe':'solid';S.p2type=S.player===1?'solid':'stripe';}
      msg(`${S.player===1?'玩家 1':'玩家 2'} → ${S.p1type==='solid'?'实心球':'花色球'}`,1800);
    }
  }

  /* switch turn? */
  let sw=false;
  if(S.foul) sw=true;
  else if(S.pocketed.length===0) sw=true;
  else{
    const pt=S.player===1?S.p1type:S.p2type;
    if(pt){
      const own=S.pocketed.filter(b=>pt==='solid'?b.solid:b.stripe);
      if(own.length===0) sw=true;
    }
  }

  if(sw&&!S.over){
    S.player=S.player===1?2:1;
    if(S.foul){alertMsg(`⚠ ${S.foulMsg} — 换手，任意球`,2600);}
    else{msg(`玩家 ${S.player}`,1400);}
  }

  if(S.foul){S.ballInHand=true;}

  /* reset shot state */
  S.pocketed=[];S.foul=false;S.foulMsg='';S.firstHit=null;S._railHit=false;
  S.shots++;S.moving=false;
  if(S.ballInHand) S.placing=true;
  updateBS();updateTurnLabel();updateCueVis();
}

function updateCueVis(){
  const cue=balls.find(b=>b.cue);
  if(!cue||cue.out||S.moving||S.over||S.placing) cueGrp.visible=false;
  else cueGrp.visible=true;
}

/* ═══════════════════ INPUT ═══════════════════ */
const IN={
  down:false,start:new THREE.Vector3(),angle:Math.PI/2,dragId:null,aiming:false,
};
const rc=new THREE.Raycaster();
const tPlane=new THREE.Plane(new THREE.Vector3(0,1,0),-BR);

function tablePt(e){
  const r=canvas.getBoundingClientRect();
  const mx=((e.clientX-r.left)/r.width)*2-1,my=-((e.clientY-r.top)/r.height)*2+1;
  rc.setFromCamera(new THREE.Vector2(mx,my),camera);
  const tg=new THREE.Vector3();
  return rc.ray.intersectPlane(tPlane,tg)?tg:null;
}

function updateAim(wp){
  const cue=balls.find(b=>b.cue);
  if(!cue||cue.out||S.moving||S.over) return;
  const dx=cue.pos.x-wp.x,dz=cue.pos.z-wp.z;
  IN.angle=Math.atan2(dx,dz);
  setCue(cue,IN.angle,0);
}

function setCue(cue,angle,pull){
  const halfCue=cueL/2;
  const gap=BR+.03+pull;
  /* cue stick center is behind the cu eball (opposite of aim direction) */
  cueGrp.position.set(
    cue.pos.x-Math.sin(angle)*(gap+halfCue),
    BR,
    cue.pos.z-Math.cos(angle)*(gap+halfCue)
  );
  /* lay flat: rotate vertical cue (Y) to horizontal (XZ plane), then aim */
  cueGrp.rotation.set(-Math.PI/2,angle,0);
  cueGrp.visible=true;
}

function shoot(power){
  if(S.moving||S.over) return;
  const cue=balls.find(b=>b.cue);
  if(!cue||cue.out) return;
  initAudio();
  const sp=power*MAX_V;
  cue.vel.x=Math.sin(IN.angle)*sp;cue.vel.z=Math.cos(IN.angle)*sp;
  S.moving=true;S.pocketed=[];S.foul=false;S.foulMsg='';S.firstHit=null;S._railHit=false;
  S.placing=false;cueGrp.visible=false;
  $pwF.style.height='0%';$pwP.textContent='0%';
  playHit(.35,400+Math.random()*200,.04);
}

/* mouse */
canvas.addEventListener('pointerdown',e=>{
  if(e.pointerType==='touch') return; // handled by touch events
  initAudio();
  if(S.over) return;if(S.moving) return;
  if(S.placing){const wp=tablePt(e);if(wp) placeCue(wp.x,wp.z);return;}
  const wp=tablePt(e);if(!wp) return;
  IN.down=true;IN.start.copy(wp);IN.aiming=true;updateAim(wp);
});
canvas.addEventListener('pointermove',e=>{
  if(e.pointerType==='touch') return;
  if(S.placing){const wp=tablePt(e);if(wp) placeCue(wp.x,wp.z);return;}
  if(!IN.down||!IN.aiming||S.moving) return;
  const wp=tablePt(e);if(!wp||!IN.start) return;
  const dist=wp.distanceTo(IN.start),p=Math.min(dist/.75,1);
  S.power=p;$pwF.style.height=(p*100)+'%';$pwP.textContent=Math.round(p*100)+'%';
  const cue=balls.find(b=>b.cue);if(cue&&!cue.out) setCue(cue,IN.angle,p*.28);
});
canvas.addEventListener('pointerup',e=>{
  if(e.pointerType==='touch') return;
  if(!IN.down) return;IN.down=false;IN.aiming=false;
  if(S.power>.012){shoot(S.power);S.power=0;}IN.start=null;
});

/* touch */
canvas.addEventListener('touchstart',e=>{
  initAudio();
  if(S.over||S.moving) return;
  if(e.touches.length===1){
    if(S.placing){const wp=tablePt(e.touches[0]);if(wp) placeCue(wp.x,wp.z);e.preventDefault();return;}
    const wp=tablePt(e.touches[0]);if(!wp) return;
    IN.down=true;IN.start.copy(wp);IN.aiming=true;IN.dragId=e.touches[0].identifier;
    updateAim(wp);
  }
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  if(S.placing&&e.touches.length===1){const wp=tablePt(e.touches[0]);if(wp) placeCue(wp.x,wp.z);e.preventDefault();return;}
  if(!IN.down||!IN.aiming) return;
  let t=null;for(let i=0;i<e.touches.length;i++){if(e.touches[i].identifier===IN.dragId){t=e.touches[i];break;}}
  if(!t) return;
  const wp=tablePt(t);if(!wp||!IN.start) return;
  const dist=wp.distanceTo(IN.start),p=Math.min(dist/.75,1);
  S.power=p;$pwF.style.height=(p*100)+'%';$pwP.textContent=Math.round(p*100)+'%';
  const cue=balls.find(b=>b.cue);if(cue&&!cue.out) setCue(cue,IN.angle,p*.28);
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend',e=>{
  let found=false;for(let i=0;i<e.touches.length;i++){if(e.touches[i].identifier===IN.dragId){found=true;break;}}
  if(!found){IN.down=false;IN.aiming=false;if(S.power>.012){shoot(S.power);S.power=0;}IN.start=null;IN.dragId=null;}
});

/* cue ball placement */
function placeCue(x,z){
  const cue=balls.find(b=>b.cue);if(!cue) return;
  const cx=Math.max(-TL+BR,Math.min(TL-BR,x));
  const cz=Math.max(-TW+BR,Math.min(TW-BR,z));
  /* check overlap */
  for(const b of actives()){if(b.cue)continue;if(Math.sqrt((cx-b.pos.x)**2+(cz-b.pos.z)**2)<BR*2.001)return;}
  cue.pos.set(cx,BR,cz);cue.out=false;cue.mesh.visible=true;cue.mesh.position.copy(cue.pos);
  cue.vel.set(0,0,0);
  S.ballInHand=false;S.placing=false;
  updateCueVis();msg('白球已放置',1000);
}

/* keyboard */
window.addEventListener('keydown',e=>{
  switch(e.key){
    case 'r':case 'R':resetGame();break;
    case 'c':case 'C':cycleCam();break;
    case 't':case 'T':setCam(1);break;
    case ' ':e.preventDefault();
      if(S.placing){const cue=balls.find(b=>b.cue);if(cue){cue.pos.set(-TL/2,BR,0);cue.out=false;cue.mesh.visible=true;cue.mesh.position.copy(cue.pos);cue.vel.set(0,0,0);S.placing=false;S.ballInHand=false;updateCueVis();}}break;
  }
});

/* ═══════════════════ CAMERA ═══════════════════ */
const VIEWS=[
  {pos:[0,1.7,2.5],tgt:[0,0,.08],label:'默认视角'},
  {pos:[0,3.5,.05],tgt:[0,0,0],label:'俯视'},
  {pos:[-1.6,.55,0],tgt:[-TL/2,0,0],label:'球员视角'},
  {pos:[0,.7,-1.7],tgt:[0,0,.15],label:'正前'},
];
let cv=0;
function setCam(i){
  const v=VIEWS[i%VIEWS.length];cv=i%VIEWS.length;
  const sp=camera.position.clone(),ep=new THREE.Vector3(...v.pos);
  const stt=controls.target.clone(),ett=new THREE.Vector3(...v.tgt);
  const t0=performance.now();const D=600;
  function anim(now){const t=Math.min((now-t0)/D,1),e=t<.5?2*t*t:-1+(4-2*t)*t;
    camera.position.lerpVectors(sp,ep,e);controls.target.lerpVectors(stt,ett,e);
    if(t<1) requestAnimationFrame(anim);}
  requestAnimationFrame(anim);msg(v.label,1000);
}
function cycleCam(){setCam(cv+1);}

/* ═══════════════════ FIRST CONTACT TRACKING ═══════════════════ */
/* We need to detect first ball hit after shooting */
/* This is checked in the physics loop by watching velocity changes */
let _prevFirstCheck=false;
function checkFirstContact(){
  if(_prevFirstCheck&&!S.firstHit){
    const cue=balls.find(b=>b.cue);if(!cue) return;
    for(const b of actives()){
      if(b.cue) continue;
      const d=Math.sqrt((cue.pos.x-b.pos.x)**2+(cue.pos.z-b.pos.z)**2);
      if(d<BR*2.02){S.firstHit=b;break;}
    }
  }
}

/* ═══════════════════ GAME LOOP ═══════════════════ */
const clk=new THREE.Clock();
function animate(ts){
  requestAnimationFrame(animate);
  const dt=Math.min(clk.getDelta(),.06);
  controls.update();

  if(S.moving&&!S.over){
    const mv=updatePhysics(dt);
    /* track first contact */
    if(!S.firstHit){
      const cue=balls.find(b=>b.cue);
      if(cue&&!cue.out){
        for(const b of actives()){
          if(b.cue) continue;
          const d=Math.sqrt((cue.pos.x-b.pos.x)**2+(cue.pos.z-b.pos.z)**2);
          if(d<BR*2.03){S.firstHit=b;playBallHit(.35);break;}
        }
      }
    }

    /* sync mesh positions + roll animation */
    for(const b of balls){
      if(!b.out){
        b.mesh.position.copy(b.pos);
        b.mesh.position.y=BR;
        /* visual rolling */
        if(b.vel.length()>.0005){
          const ax=new THREE.Vector3(b.vel.z,0,-b.vel.x).normalize();
          const ang=b.vel.length()*dt/BR;
          b.mesh.rotateOnWorldAxis(ax,ang);
        }
      }
    }
    /* cue ball pocket check (during movement) */
    const cue=balls.find(b=>b.cue);
    if(cue&&!cue.out&&checkPocket(cue)){
      cue.out=true;cue.vel.set(0,0,0);cue.mesh.visible=false;playPocket();
      S.foul=true;S.foulMsg='白球落袋';S.ballInHand=true;
    }

    if(!mv) checkEndShot();
  }

  /* idle cue positioning */
  if(!S.moving&&!S.over&&!S.placing){
    const cue=balls.find(b=>b.cue);
    if(cue&&!cue.out){cueGrp.visible=true;setCue(cue,IN.angle,0);}
  }

  if(S.placing) cueGrp.visible=false;

  renderer.render(scene,camera);
}

/* ═══════════════════ RESET ═══════════════════ */
function resetGame(){
  S.moving=false;S.player=1;S.p1type=null;S.p2type=null;S.over=false;S.winner=null;
  S.foul=false;S.foulMsg='';S.pocketed=[];S.firstHit=null;
  S.ballInHand=false;S.placing=false;S.power=0;S.shots=0;
  rackBalls();updateBS();updateTurnLabel();updateCueVis();
  $pwF.style.height='0%';$pwP.textContent='0%';
  $msg.classList.remove('on');$alert.classList.remove('on');
  const cue=balls.find(b=>b.cue);if(cue){IN.angle=Math.PI/2;setCue(cue,IN.angle,0);}
  msg('🎱 开球！',1600);
  $turn.textContent='玩家 1 · 开球';
}

document.getElementById('b-rst').addEventListener('click',resetGame);
document.getElementById('b-cam').addEventListener('click',cycleCam);
document.getElementById('b-top').addEventListener('click',()=>setCam(1));

/* resize */
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

/* start */
resetGame();
requestAnimationFrame(animate);
</script>
