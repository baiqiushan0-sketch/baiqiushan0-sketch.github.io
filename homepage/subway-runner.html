<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>地铁酷跑 · Neon Runner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;font-family:'PingFang SC','Microsoft YaHei',sans-serif}
#c{position:fixed;top:0;left:0;width:100%;height:100%}

/* ===== HUD ===== */
#hud{position:fixed;top:16px;left:0;width:100%;z-index:10;display:flex;justify-content:space-between;padding:0 20px;pointer-events:none}
#score-box{display:flex;flex-direction:column}
#score{color:#00e5ff;font-size:clamp(1.6rem,4vw,2.5rem);font-weight:900;text-shadow:0 0 20px rgba(0,229,255,.5);transition:transform .15s}
#score.pulse{transform:scale(1.15)}
#combo{color:#ff4081;font-size:clamp(.7rem,2vw,.9rem);font-weight:bold;opacity:0;transition:opacity .2s}
#combo.show{opacity:1}
#coins-box{text-align:right}
#coins-hud{color:#ffd740;font-size:clamp(1.2rem,3vw,1.8rem);font-weight:bold;text-shadow:0 0 15px rgba(255,215,64,.4)}
#speed-bar{color:rgba(255,255,255,.4);font-size:.7rem}
#player-name-hud{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;color:rgba(255,255,255,.3);font-size:.65rem;letter-spacing:1px}

/* ===== Name Input Overlay ===== */
#name-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:25;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,rgba(10,10,40,.9),rgba(0,0,0,.97))}
#name-overlay.hidden{display:none}
#name-overlay h2{font-size:clamp(1.5rem,4vw,2.5rem);background:linear-gradient(135deg,#00e5ff,#7c4dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
#name-overlay .sub{color:#7c8aa0;font-size:.8rem;margin-bottom:20px}
#name-input{background:rgba(255,255,255,.05);border:2px solid rgba(0,229,255,.3);color:#fff;padding:12px 20px;font-size:1rem;border-radius:8px;text-align:center;width:min(280px,80vw);outline:none;transition:border-color .3s;font-family:inherit}
#name-input:focus{border-color:#00e5ff}
#name-input::placeholder{color:rgba(255,255,255,.2)}
#name-btn{padding:12px 40px;font-size:1rem;border:2px solid #00e5ff;background:rgba(0,229,255,.1);color:#00e5ff;border-radius:30px;cursor:pointer;letter-spacing:2px;margin-top:16px;transition:all .3s;font-weight:bold}
#name-btn:hover{background:rgba(0,229,255,.25);box-shadow:0 0 30px rgba(0,229,255,.2)}
#name-error{color:#ff5252;font-size:.7rem;margin-top:8px;display:none}

/* ===== Game Over Overlay ===== */
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,rgba(10,10,40,.85),rgba(0,0,0,.95));pointer-events:none}
#overlay.hidden{display:none}
#overlay h1{font-size:clamp(2.5rem,8vw,4.5rem);background:linear-gradient(135deg,#00e5ff,#7c4dff,#ff4081);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;font-weight:900}
#overlay .sub{font-size:clamp(.8rem,2vw,1rem);color:#7c8aa0;margin-bottom:12px;letter-spacing:4px}
#overlay .stats{margin-bottom:16px;text-align:center}
#overlay .final-score{font-size:clamp(2rem,5vw,3rem);color:#00e5ff;font-weight:900;text-shadow:0 0 30px rgba(0,229,255,.3)}
#overlay .final-coins{font-size:clamp(1rem,2.5vw,1.5rem);color:#ffd740;margin-bottom:4px}
#overlay .final-best{font-size:.8rem;color:#7c8aa0;margin-bottom:8px}
#overlay .final-rank{font-size:.85rem;color:#7c4dff;margin-bottom:16px}
#overlay button{pointer-events:auto;padding:14px 50px;font-size:clamp(.9rem,2.5vw,1.2rem);border:2px solid #00e5ff;background:rgba(0,229,255,.08);color:#00e5ff;border-radius:30px;cursor:pointer;letter-spacing:3px;transition:all .3s;font-weight:bold;margin:4px}
#overlay button:hover{background:rgba(0,229,255,.2);box-shadow:0 0 30px rgba(0,229,255,.15)}
#overlay .btn-secondary{border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.4);font-size:.7rem;padding:10px 30px;letter-spacing:1px}
#overlay .btn-secondary:hover{background:rgba(255,255,255,.05);box-shadow:none}

/* ===== Leaderboard ===== */
#leaderboard{position:fixed;top:0;right:-320px;width:min(300px,85vw);height:100%;z-index:18;background:rgba(5,5,20,.95);border-left:1px solid rgba(0,229,255,.1);transition:right .4s cubic-bezier(.4,0,.2,1);overflow-y:auto;padding:20px}
#leaderboard.open{right:0}
#lb-toggle{position:fixed;top:50%;right:0;z-index:19;transform:translateY(-50%);background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.2);color:#00e5ff;padding:12px 6px;border-radius:8px 0 0 8px;cursor:pointer;font-size:.6rem;writing-mode:vertical-rl;letter-spacing:2px;transition:right .4s cubic-bezier(.4,0,.2,1)}
#lb-toggle.shifted{right:min(300px,85vw)}
#leaderboard h3{color:#00e5ff;font-size:.9rem;margin-bottom:16px;letter-spacing:2px;text-align:center}
#lb-list{list-style:none}
#lb-list li{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;margin-bottom:4px;border-radius:6px;background:rgba(255,255,255,.02);font-size:.8rem;transition:all .3s}
#lb-list li.me{background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.15)}
#lb-list .rank{color:#7c8aa0;width:24px;font-weight:bold}
#lb-list li:nth-child(1) .rank{color:#ffd740}
#lb-list li:nth-child(2) .rank{color:#b0bec5}
#lb-list li:nth-child(3) .rank{color:#ff8a65}
#lb-list .name{flex:1;color:#ccc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin:0 8px}
#lb-list .pts{color:#00e5ff;font-weight:bold}
#lb-empty{color:#7c8aa0;font-size:.7rem;text-align:center;padding:20px}

/* ===== Misc ===== */
#hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
#hint span{font-size:.6rem;color:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.08);padding:3px 10px;border-radius:12px}
#back{position:fixed;top:16px;left:16px;z-index:25}
#back a{color:rgba(255,255,255,.25);text-decoration:none;font-size:.65rem;letter-spacing:1px}
#flash{position:fixed;top:0;left:0;width:100%;height:100%;z-index:15;pointer-events:none;background:radial-gradient(circle,rgba(255,64,129,.12),transparent 60%);opacity:0;transition:opacity .1s}
#flash.pop{opacity:1;transition:opacity 0s}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="flash"></div>

<div id="hud">
  <div id="score-box"><div id="score">0</div><div id="combo"></div></div>
  <div id="coins-box"><div id="coins-hud">🪙 0</div><div id="speed-bar"></div></div>
</div>
<div id="player-name-hud"></div>

<div id="hint"><span>⬅➡ 切道</span><span>⬆ 跳跃</span><span>⬇ 下滑</span></div>

<!-- Name Input -->
<div id="name-overlay">
  <h2>✦ 输入你的名字 ✦</h2>
  <div class="sub">加入全球排行榜</div>
  <input id="name-input" type="text" maxlength="12" placeholder="请输入昵称…" autocomplete="off">
  <div id="name-error"></div>
  <button id="name-btn">开始游戏</button>
</div>

<!-- Game Over -->
<div id="overlay" class="hidden">
  <h1>NEON RUNNER</h1>
  <div class="sub">✦ 霓虹地铁酷跑 ✦</div>
  <div class="stats">
    <div class="final-score" style="display:none"></div>
    <div class="final-coins" style="display:none"></div>
    <div class="final-best" style="display:none"></div>
    <div class="final-rank" style="display:none"></div>
  </div>
  <button id="restart-btn">再来一局</button>
  <button class="btn-secondary" id="change-name-btn">换个名字</button>
</div>

<!-- Leaderboard -->
<div id="lb-toggle">🏆 排行榜</div>
<div id="leaderboard">
  <h3>🏆 排行榜 TOP 20</h3>
  <ul id="lb-list"><li id="lb-empty">暂无记录，成为第一个！</li></ul>
</div>

<div id="back"><a href="../index.html">← 返回合集</a></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js">
</script>
<script>
// ==================== DOM ====================
const canvas=document.getElementById('c');
const scoreEl=document.getElementById('score'),comboEl=document.getElementById('combo');
const coinsEl=document.getElementById('coins-hud'),speedEl=document.getElementById('speed-bar');
const nameHud=document.getElementById('player-name-hud');
const nameOverlay=document.getElementById('name-overlay');
const nameInput=document.getElementById('name-input'),nameBtn=document.getElementById('name-btn');
const nameErr=document.getElementById('name-error');
const overlay=document.getElementById('overlay');
const restartBtn=document.getElementById('restart-btn');
const changeNameBtn=document.getElementById('change-name-btn');
const finalScore=overlay.querySelector('.final-score');
const finalCoins=overlay.querySelector('.final-coins');
const finalBest=overlay.querySelector('.final-best');
const finalRank=overlay.querySelector('.final-rank');
const subEl=overlay.querySelector('.sub');
const hintEl=document.getElementById('hint'),flashEl=document.getElementById('flash');
const lbToggle=document.getElementById('lb-toggle'),leaderboard=document.getElementById('leaderboard');
const lbList=document.getElementById('lb-list'),lbEmpty=document.getElementById('lb-empty');

// ==================== Leaderboard (localStorage) ====================
const LB_KEY='neon_runner_leaderboard';
const LB_MAX=20;
let playerName='';
let lbOpen=false;

function loadLB(){
  try{return JSON.parse(localStorage.getItem(LB_KEY))||[];}
  catch(e){return[];}
}
function saveLB(data){localStorage.setItem(LB_KEY,JSON.stringify(data));}
function addScore(name,pts,coinCount){
  const lb=loadLB();
  lb.push({name,score:Math.floor(pts),coins:coinCount,time:Date.now()});
  lb.sort((a,b)=>b.score-a.score);
  const top=lb.slice(0,LB_MAX);
  saveLB(top);
  return top.findIndex(e=>e.name===name&&e.score===Math.floor(pts)&&e.coins===coinCount);
}
function renderLB(highlightName){
  const lb=loadLB();
  lbList.innerHTML='';
  if(lb.length===0){lbList.appendChild(lbEmpty);lbEmpty.style.display='block';return;}
  lbEmpty.style.display='none';
  lb.forEach((e,i)=>{
    const li=document.createElement('li');
    if(e.name===highlightName&&e.score===Math.floor(score))li.classList.add('me');
    const medals=['🥇','🥈','🥉'];
    const rank=i<3?medals[i]:`<span class="rank">${i+1}</span>`;
    li.innerHTML=`<span>${rank}</span><span class="name">${esc(e.name)}</span><span class="pts">${e.score}</span>`;
    lbList.appendChild(li);
  });
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// Leaderboard toggle
lbToggle.addEventListener('click',()=>{
  lbOpen=!lbOpen;
  leaderboard.classList.toggle('open',lbOpen);
  lbToggle.classList.toggle('shifted',lbOpen);
  renderLB();
});

// ==================== Procedural Textures ====================
function seedRand(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return()=>{h=(h*1103515245+12345)&0x7fffffff;return h/0x7fffffff;};}

function createObstacleTex(w,h,type){
  const cv=document.createElement('canvas');cv.width=w;cv.height=h;
  const ctx=cv.getContext('2d');
  const rng=seedRand(type+String(w));

  // Base gradient
  const baseGrad=ctx.createLinearGradient(0,0,w,h);
  if(type==='low'){
    baseGrad.addColorStop(0,'#d32f2f');baseGrad.addColorStop(.3,'#f44336');
    baseGrad.addColorStop(.6,'#c62828');baseGrad.addColorStop(1,'#b71c1c');
  }else if(type==='high'){
    baseGrad.addColorStop(0,'#e65100');baseGrad.addColorStop(.3,'#ff6d00');
    baseGrad.addColorStop(.6,'#e65100');baseGrad.addColorStop(1,'#bf360c');
  }else{
    baseGrad.addColorStop(0,'#880000');baseGrad.addColorStop(.3,'#c62828');
    baseGrad.addColorStop(.6,'#660000');baseGrad.addColorStop(1,'#4a0000');
  }
  ctx.fillStyle=baseGrad;ctx.fillRect(0,0,w,h);

  // Warning stripes
  const stripeH=h/5;
  for(let row=0;row<5;row++){
    const y=row*stripeH;
    ctx.fillStyle=row%2===0?'rgba(255,255,0,.25)':'rgba(0,0,0,.35)';
    ctx.fillRect(0,y,w,stripeH);
    // Diagonal lines in yellow stripes
    if(row%2===0){
      ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=1;
      for(let x=-h;x<w+h;x+=8){
        ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+h,row*stripeH+stripeH);
        ctx.stroke();
      }
    }
  }

  // Rust/noise overlay
  for(let i=0;i<w*h*.15;i++){
    const x=rng()*w,y=rng()*h;
    const alpha=.05+rng()*.15;
    ctx.fillStyle=`rgba(${80+rng()*60},${40+rng()*40},${10+rng()*30},${alpha})`;
    ctx.fillRect(x,y,2+rng()*4,2+rng()*4);
  }

  // Edge wear
  const edgeGrad=ctx.createLinearGradient(0,0,0,h);
  edgeGrad.addColorStop(0,'rgba(0,0,0,.5)');edgeGrad.addColorStop(.1,'rgba(0,0,0,0)');
  edgeGrad.addColorStop(.9,'rgba(0,0,0,0)');edgeGrad.addColorStop(1,'rgba(0,0,0,.5)');
  ctx.fillStyle=edgeGrad;ctx.fillRect(0,0,w,h);

  // Rivets
  ctx.fillStyle='rgba(255,255,255,.15)';
  const rivetCols=3, rivetRows=Math.floor(h/20);
  for(let col=0;col<rivetCols;col++){
    for(let row=0;row<rivetRows;row++){
      const rx=w*(col+1)/(rivetCols+1),ry=(row+.5)*h/rivetRows;
      ctx.beginPath();ctx.arc(rx,ry,2.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(0,0,0,.2)';
      ctx.beginPath();ctx.arc(rx+1,ry+1,1.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.15)';
    }
  }

  const tex=new THREE.CanvasTexture(cv);
  tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
  return tex;
}

function createBrickTex(w,h){
  const cv=document.createElement('canvas');cv.width=w;cv.height=h;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#1a1a30';ctx.fillRect(0,0,w,h);
  const bw=w/4.5,bh=h/3.5;
  const colors=['#1e1e38','#222240','#1c1c35','#202044','#1d1d3a'];
  for(let row=0;row<5;row++){
    const offset=row%2===0?0:bw/2;
    for(let col=-1;col<6;col++){
      const x=col*bw+offset,y=row*bh;
      ctx.fillStyle=colors[Math.floor(Math.random()*colors.length)];
      ctx.fillRect(x+1,y+1,bw-2,bh-2);
      // Brick detail lines
      ctx.fillStyle='rgba(255,255,255,.02)';
      ctx.fillRect(x+3,y+3,bw-6,1);
      ctx.fillRect(x+3,y+bh-4,bw-6,1);
      // Mortar shadow
      ctx.fillStyle='rgba(0,0,0,.3)';
      ctx.fillRect(x,y+bh-1,bw,1);
      ctx.fillRect(x+bw-1,y,1,bh);
    }
  }
  // Window reflection
  ctx.fillStyle='rgba(100,120,255,.04)';
  ctx.fillRect(w*.3,h*.2,w*.15,h*.25);
  ctx.fillRect(w*.55,h*.15,w*.15,h*.3);
  ctx.fillStyle='rgba(255,255,200,.03)';
  ctx.fillRect(w*.32,h*.22,w*.11,h*.21);
  ctx.fillRect(w*.57,h*.17,w*.11,h*.26);
  const tex=new THREE.CanvasTexture(cv);
  tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
  return tex;
}

function createRoadTex(w,h){
  const cv=document.createElement('canvas');cv.width=w;cv.height=h;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#1c1c28';ctx.fillRect(0,0,w,h);
  // Asphalt noise
  for(let i=0;i<1200;i++){
    const x=Math.random()*w,y=Math.random()*h;
    const g=30+Math.random()*25;
    ctx.fillStyle=`rgba(${g},${g},${g+8},.2)`;
    ctx.fillRect(x,y,Math.random()*5+1,Math.random()*5+1);
  }
  // Lane dashes
  ctx.fillStyle='rgba(255,255,255,.1)';
  for(let y=0;y<h;y+=16){
    ctx.fillRect(w/2-1.5,y,3,8);
  }
  // Edge lines
  ctx.fillStyle='rgba(255,255,255,.12)';
  ctx.fillRect(2,0,2,h);
  ctx.fillRect(w-4,0,2,h);
  const tex=new THREE.CanvasTexture(cv);
  tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
  tex.repeat.set(2,8);
  return tex;
}

function createMetalTex(w,h){
  const cv=document.createElement('canvas');cv.width=w;cv.height=h;
  const ctx=cv.getContext('2d');
  const grad=ctx.createLinearGradient(0,0,w,h);
  grad.addColorStop(0,'#3a3a4a');grad.addColorStop(.3,'#5a5a6a');
  grad.addColorStop(.5,'#6a6a7a');grad.addColorStop(.7,'#5a5a6a');
  grad.addColorStop(1,'#3a3a4a');
  ctx.fillStyle=grad;ctx.fillRect(0,0,w,h);
  // Diamond plate
  for(let y=0;y<h;y+=10){
    for(let x=0;x<w;x+=10){
      ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=.6;
      ctx.beginPath();ctx.moveTo(x+5,y);ctx.lineTo(x+10,y+5);ctx.lineTo(x+5,y+10);ctx.lineTo(x,y+5);ctx.closePath();ctx.stroke();
    }
  }
  // Scratches
  for(let i=0;i<30;i++){
    ctx.strokeStyle=`rgba(${200+Math.random()*55},${200+Math.random()*55},${200+Math.random()*55},.1)`;
    ctx.lineWidth=.5;ctx.beginPath();
    const sx=Math.random()*w,sy=Math.random()*h;
    ctx.moveTo(sx,sy);ctx.lineTo(sx+Math.random()*20-10,sy+Math.random()*20-10);ctx.stroke();
  }
  return new THREE.CanvasTexture(cv);
}

function createNeonTex(color){
  const cv=document.createElement('canvas');cv.width=64;cv.height=64;
  const ctx=cv.getContext('2d');
  const grad=ctx.createRadialGradient(32,32,0,32,32,32);
  grad.addColorStop(0,'rgba(255,255,255,.9)');
  grad.addColorStop(.1,color);
  grad.addColorStop(.4,'rgba(0,0,0,0)');
  ctx.fillStyle=grad;ctx.fillRect(0,0,64,64);
  return new THREE.CanvasTexture(cv);
}

// ==================== Three.js Setup ====================
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;

const scene=new THREE.Scene();
scene.background=new THREE.Color('#0a0a14');
scene.fog=new THREE.FogExp2('#0a0a14',.0007);

const camera=new THREE.PerspectiveCamera(62,innerWidth/innerHeight,.5,200);
camera.position.set(0,4.5,9);
camera.lookAt(0,1.2,-3);

// ==================== Lights ====================
const ambient=new THREE.AmbientLight('#334466',.8);
scene.add(ambient);

const mainLight=new THREE.DirectionalLight('#ffffff',3);
mainLight.position.set(8,20,15);
mainLight.castShadow=true;
mainLight.shadow.mapSize.set(1024,1024);
mainLight.shadow.camera.near=.5;mainLight.shadow.camera.far=60;
mainLight.shadow.camera.left=-18;mainLight.shadow.camera.right=18;
mainLight.shadow.camera.top=12;mainLight.shadow.camera.bottom=-6;
mainLight.shadow.bias=-.0001;
scene.add(mainLight);

const lightL=new THREE.PointLight('#00e5ff',30,25);
lightL.position.set(-8,3,-5);scene.add(lightL);
const lightR=new THREE.PointLight('#7c4dff',25,25);
lightR.position.set(8,3,-5);scene.add(lightR);
const lightFront=new THREE.PointLight('#ff4081',20,20);
lightFront.position.set(0,2,5);scene.add(lightFront);

// ==================== Textures & Materials ====================
const texBrick=createBrickTex(256,192);
const texRoad=createRoadTex(512,256);
const texMetal=createMetalTex(128,128);
const texLowOb=createObstacleTex(128,256,'low');
const texHighOb=createObstacleTex(128,256,'high');
const texBlockOb=createObstacleTex(128,256,'block');
const texGlow=createNeonTex('rgba(0,229,255,.8)');
const texGlowPink=createNeonTex('rgba(255,64,129,.8)');
const texGlowGold=createNeonTex('rgba(255,215,64,.8)');

const matPlayerBody=new THREE.MeshStandardMaterial({color:'#00e5ff',metalness:.6,roughness:.25,emissive:'#003344',emissiveIntensity:.4});
const matPlayerAccent=new THREE.MeshStandardMaterial({color:'#7c4dff',metalness:.5,roughness:.3,emissive:'#110033',emissiveIntensity:.3});
const matPlayerDark=new THREE.MeshStandardMaterial({color:'#1a1a2e',metalness:.3,roughness:.6});

const matLowOb=new THREE.MeshStandardMaterial({map:texLowOb,metalness:.4,roughness:.5,emissive:'#330000',emissiveIntensity:.3});
const matHighOb=new THREE.MeshStandardMaterial({map:texHighOb,metalness:.4,roughness:.5,emissive:'#331100',emissiveIntensity:.3});
const matBlockOb=new THREE.MeshStandardMaterial({map:texBlockOb,metalness:.5,roughness:.4,emissive:'#440000',emissiveIntensity:.4});

const matGround=new THREE.MeshStandardMaterial({map:texRoad,color:'#2a2a3a',metalness:.05,roughness:.85});
const matBuilding=new THREE.MeshStandardMaterial({map:texBrick,color:'#252540',metalness:.1,roughness:.8});
const matCoin=new THREE.MeshStandardMaterial({color:'#ffd740',metalness:.9,roughness:.15,emissive:'#332200',emissiveIntensity:.6});

const matNeonCyan=new THREE.SpriteMaterial({map:texGlow,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true});
const matNeonPink=new THREE.SpriteMaterial({map:texGlowPink,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true});
const matGoldGlow=new THREE.SpriteMaterial({map:texGlowGold,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true});

const matTunnelWall=new THREE.MeshStandardMaterial({map:texBrick,color:'#181830',metalness:.1,roughness:.8});
const matRail=new THREE.MeshStandardMaterial({map:texMetal,color:'#4a4a5a',metalness:.8,roughness:.2});
const matTie=new THREE.MeshStandardMaterial({color:'#2a2218',metalness:.1,roughness:.9});

// ==================== Constants ====================
const LANE_X=[-1.8,0,1.8],LANE_COUNT=3;
const GRAVITY=30,JUMP_VEL=12,SLIDE_DURATION=.55,PLAYER_Y=1;

// ==================== Game State ====================
let state='WAITING',bestScore=0;
let score=0,coins=0,combo=0,comboTimer=0;
let speed=14;
let lane=1,targetX=LANE_X[1];
let playerVelY=0,playerY=PLAYER_Y;
let isSliding=false,slideTimer=0;
let obstacles=[],coinItems=[];
let spawnTimer=0,coinTimer=0,difficultyTimer=0;
let groundTiles=[],buildingItems=[],tunnelItems=[],railItems=[];
let particles=[];
let animTime=0;

// ==================== Player Model ====================
const playerGroup=new THREE.Group();
const torsoGeo=new THREE.BoxGeometry(.5,1,.35);
const torso=new THREE.Mesh(torsoGeo,matPlayerBody);
torso.position.y=.6;torso.castShadow=true;playerGroup.add(torso);

const beltGeo=new THREE.BoxGeometry(.52,.08,.37);
playerGroup.add(new THREE.Mesh(beltGeo,matPlayerAccent)).position.y=.95;

const headGeo=new THREE.SphereGeometry(.28,12,10);
const head=new THREE.Mesh(headGeo,matPlayerBody);
head.position.y=1.4;head.castShadow=true;playerGroup.add(head);

const visorGeo=new THREE.BoxGeometry(.4,.12,.15);
playerGroup.add(new THREE.Mesh(visorGeo,new THREE.MeshStandardMaterial({color:'#111',metalness:.3,roughness:.4}))).position.set(0,1.45,.15);

const armGeo=new THREE.BoxGeometry(.18,.6,.18);
const armL=new THREE.Mesh(armGeo,matPlayerBody);armL.position.set(-.34,.7,0);armL.castShadow=true;playerGroup.add(armL);
const armR=new THREE.Mesh(armGeo,matPlayerBody);armR.position.set(.34,.7,0);armR.castShadow=true;playerGroup.add(armR);

const legGeo2=new THREE.BoxGeometry(.2,.55,.2);
const legL2=new THREE.Mesh(legGeo2,matPlayerDark);legL2.position.set(-.13,.2,0);legL2.castShadow=true;playerGroup.add(legL2);
const legR2=new THREE.Mesh(legGeo2,matPlayerDark);legR2.position.set(.13,.2,0);legR2.castShadow=true;playerGroup.add(legR2);

const shoeGeo=new THREE.BoxGeometry(.22,.12,.28);
playerGroup.add(new THREE.Mesh(shoeGeo,matPlayerAccent)).position.set(-.13,-.06,.02);
playerGroup.add(new THREE.Mesh(shoeGeo,matPlayerAccent)).position.set(.13,-.06,.02);

const glowSprite=new THREE.Sprite(matNeonCyan);
glowSprite.scale.set(1.2,1.8,1);glowSprite.position.set(0,.7,-.3);playerGroup.add(glowSprite);

const trailGlow=new THREE.Sprite(matNeonCyan);
trailGlow.scale.set(.6,1.2,1);trailGlow.position.set(0,PLAYER_Y,-.5);playerGroup.add(trailGlow);

playerGroup.position.set(LANE_X[1],PLAYER_Y,0);
scene.add(playerGroup);

// ==================== Spawn ====================
function spawnObstacle(){
  const r=Math.random();
  const type=r<.4?'low':(r<.65?'high':'block');
  const occupyLane=Math.floor(Math.random()*LANE_COUNT);
  const z=-42-Math.random()*10;

  let h,w,mat;
  if(type==='low'){h=.6;w=.7;mat=matLowOb;}
  else if(type==='high'){h=1.4;w=.7;mat=matHighOb;}
  else{h=2.0;w=.7;mat=matBlockOb;}

  const geo=new THREE.BoxGeometry(w,h,.5);
  const mesh=new THREE.Mesh(geo,mat);
  mesh.position.set(LANE_X[occupyLane],h/2,z);
  mesh.castShadow=true;mesh.receiveShadow=true;
  scene.add(mesh);

  let warnSprite=null;
  if(type==='block'){
    warnSprite=new THREE.Sprite(matNeonPink);
    warnSprite.scale.set(1.5,2.5,1);
    warnSprite.position.set(LANE_X[occupyLane],1,z);
    scene.add(warnSprite);
  }
  obstacles.push({mesh,type,lane:occupyLane,h,w,warn:warnSprite});
}

function spawnCoinPattern(){
  const z=-42-Math.random()*10;
  const pattern=Math.floor(Math.random()*6);
  const positions=[];
  if(pattern===0)positions.push({l:Math.floor(Math.random()*3),y:1.8,z});
  else if(pattern===1){const l=Math.floor(Math.random()*3);for(let i=0;i<4;i++)positions.push({l,y:1.8+i*.15,z:z+i*.8});}
  else if(pattern===2)for(let i=0;i<3;i++)positions.push({l:i,y:1.8+i*.2,z});
  else if(pattern===3){const l1=Math.floor(Math.random()*3),l2=(l1+1)%3;for(let i=0;i<2;i++){positions.push({l:l1,y:1.8,z:z+i*.7});positions.push({l:l2,y:1.8,z:z+i*.7});}}
  else if(pattern===4)for(let i=0;i<6;i++)positions.push({l:i%3,y:1.8+i*.2,z:z+i*.6});
  else{const m=Math.floor(Math.random()*3);positions.push({l:m,y:2.3,z});positions.push({l:(m+1)%3,y:1.8,z:z+.5});positions.push({l:(m+2)%3,y:1.8,z:z+.5});positions.push({l:m,y:1.3,z:z+1});}

  for(const p of positions){
    const coinGeo=new THREE.CylinderGeometry(.18,.18,.05,20);
    const coinMesh=new THREE.Mesh(coinGeo,matCoin);
    coinMesh.position.set(LANE_X[p.l],p.y,p.z);
    coinMesh.rotation.x=Math.PI/2;
    scene.add(coinMesh);
    const gs=new THREE.Sprite(matGoldGlow);
    gs.scale.set(.5,.5,1);gs.position.copy(coinMesh.position);scene.add(gs);
    coinItems.push({mesh:coinMesh,glow:gs,lane:p.l,baseY:p.y});
  }
}

function spawnBuilding(side,z){
  const h=4+Math.random()*10,w=1.2+Math.random()*2,d=1.5+Math.random()*3;
  const bld=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),matBuilding);
  bld.position.set(side*(6+w/2),h/2,z);bld.castShadow=true;bld.receiveShadow=true;
  scene.add(bld);buildingItems.push(bld);
  if(Math.random()<.5){
    const sign=new THREE.Sprite(Math.random()<.5?matNeonCyan:matNeonPink);
    sign.scale.set(w*.6,.3,1);sign.position.set(side*(6+w/2),h*.7,z+d/2+.05);
    scene.add(sign);buildingItems.push(sign);
  }
}

function spawnTunnelWall(z){
  const geo=new THREE.BoxGeometry(.5,8,20);
  for(const side of[-1,1]){
    const wall=new THREE.Mesh(geo,matTunnelWall);
    wall.position.set(side*8.5,4,z);scene.add(wall);tunnelItems.push(wall);
  }
}

function spawnRails(z){
  for(const x of LANE_X)for(const dx of[-.35,.35]){
    const rail=new THREE.Mesh(new THREE.BoxGeometry(.04,.04,20),matRail);
    rail.position.set(x+dx,.02,z);scene.add(rail);railItems.push(rail);
  }
  for(let tz=z-10;tz<z+10;tz+=1.2){
    const tie=new THREE.Mesh(new THREE.BoxGeometry(4,.03,.1),matTie);
    tie.position.set(0,.01,tz);scene.add(tie);railItems.push(tie);
  }
}

// ==================== Particles ====================
function burstParticles(x,y,z,color,count){
  for(let i=0;i<count;i++){
    const geo=new THREE.SphereGeometry(.04+Math.random()*.06,4,4);
    const p=new THREE.Mesh(geo,new THREE.MeshBasicMaterial({color,transparent:true,opacity:1}));
    p.position.set(x,y,z);
    const angle=Math.random()*Math.PI*2;
    p.userData={life:.4+Math.random()*.6,vx:Math.cos(angle)*5*Math.random(),vy:3+Math.random()*10,vz:(Math.random()-.5)*6,decay:.8+Math.random()*2};
    scene.add(p);particles.push(p);
  }
}

// ==================== World ====================
function clearWorld(){
  for(const arr of[obstacles,coinItems,buildingItems,tunnelItems,railItems,particles,groundTiles]){
    for(const item of arr){
      if(item.mesh)scene.remove(item.mesh);
      else if(item.geometry)scene.remove(item);
      else scene.remove(item);
      if(item.warn)scene.remove(item.warn);
      if(item.glow)scene.remove(item.glow);
    }
    arr.length=0;
  }
}

function initWorld(){
  clearWorld();
  for(let z=5;z>-120;z-=20){
    const g=new THREE.Mesh(new THREE.PlaneGeometry(6,20),matGround);
    g.rotation.x=-Math.PI/2;g.position.set(0,-.05,z);g.receiveShadow=true;
    scene.add(g);groundTiles.push(g);
    for(const lx of LANE_X)for(const dx of[-.35,.35]){
      const lm=new THREE.Mesh(new THREE.PlaneGeometry(.03,20),new THREE.MeshBasicMaterial({color:'rgba(255,255,255,.15)'}));
      lm.rotation.x=-Math.PI/2;lm.position.set(lx+dx,.02,z);scene.add(lm);groundTiles.push(lm);
    }
  }
  for(let z=5;z>-120;z-=20){spawnRails(z);spawnTunnelWall(z);}
  for(let z=5;z>-65;z-=6+Math.random()*8){spawnBuilding(-1,z);spawnBuilding(1,z);}
  lane=1;targetX=LANE_X[1];playerY=PLAYER_Y;playerVelY=0;isSliding=false;slideTimer=0;
  playerGroup.position.set(LANE_X[1],PLAYER_Y,0);playerGroup.scale.set(1,1,1);
  torso.material=matPlayerBody;head.material=matPlayerBody;glowSprite.material=matNeonCyan;
}

function resetGame(){
  score=0;coins=0;combo=0;comboTimer=0;speed=14;
  spawnTimer=0;coinTimer=0;difficultyTimer=0;
  scoreEl.textContent='0';coinsEl.textContent='🪙 0';
  comboEl.textContent='';comboEl.classList.remove('show');speedEl.textContent='';
  nameHud.textContent=playerName;
  initWorld();
}

// ==================== Collision ====================
function getPlayerBounds(){
  const px=playerGroup.position.x,pz=playerGroup.position.z;
  if(isSliding)return{x:px,y:.4,z:pz,hw:.4,hh:.35,hd:.3};
  if(playerY>PLAYER_Y+.3)return{x:px,y:playerY,z:pz,hw:.4,hh:.8,hd:.3};
  return{x:px,y:1,z:pz,hw:.4,hh:.8,hd:.3};
}
function checkCollision(ob){
  const p=getPlayerBounds();
  return Math.abs(p.x-ob.mesh.position.x)<p.hw+ob.w/2
      &&Math.abs(p.y-ob.mesh.position.y)<p.hh+ob.h/2
      &&Math.abs(p.z-ob.mesh.position.z)<p.hd+.25;
}

// ==================== Game Flow ====================
function gameOver(){
  state='OVER';
  burstParticles(playerGroup.position.x,playerY,playerGroup.position.z,'#ff4081',40);
  burstParticles(playerGroup.position.x,playerY,playerGroup.position.z,'#00e5ff',20);

  const pts=Math.floor(score);
  const rank=addScore(playerName||'无名',pts,coins);
  if(pts>bestScore)bestScore=pts;

  finalScore.textContent='得分: '+pts;
  finalScore.style.display='block';
  finalCoins.textContent='🪙 × '+coins;
  finalCoins.style.display='block';
  finalBest.textContent='最高分: '+bestScore;
  finalBest.style.display='block';
  finalRank.textContent=rank>=0?`🏆 排行榜第 ${rank+1} 名！`:'';
  finalRank.style.display=rank>=0?'block':'none';
  subEl.style.display='none';
  restartBtn.textContent='再来一局';
  overlay.classList.remove('hidden');
  hintEl.style.display='none';
  flashEl.classList.add('pop');setTimeout(()=>flashEl.classList.remove('pop'),150);
  renderLB(playerName);
}

function startGame(){
  resetGame();state='PLAYING';
  overlay.classList.add('hidden');hintEl.style.display='flex';
  finalScore.style.display='none';finalCoins.style.display='none';
  finalBest.style.display='none';finalRank.style.display='none';
  subEl.style.display='block';
}
restartBtn.addEventListener('click',startGame);
changeNameBtn.addEventListener('click',()=>{
  overlay.classList.add('hidden');nameOverlay.classList.remove('hidden');
  nameInput.focus();
});

// ==================== Name Input ====================
nameBtn.addEventListener('click',()=>{
  const n=nameInput.value.trim();
  if(!n||n.length<1){nameErr.textContent='请输入名字';nameErr.style.display='block';return;}
  if(n.length>12){nameErr.textContent='名字最多12个字';nameErr.style.display='block';return;}
  nameErr.style.display='none';
  playerName=n;
  nameOverlay.classList.add('hidden');
  nameHud.textContent=playerName;
  bestScore=0;
  const lb=loadLB();
  for(const e of lb)if(e.name===playerName&&e.score>bestScore)bestScore=e.score;
  startGame();
});
nameInput.addEventListener('keydown',e=>{if(e.key==='Enter')nameBtn.click();});
nameOverlay.addEventListener('click',e=>{if(e.target===nameOverlay)nameInput.focus();});

// Auto-load name from localStorage
const savedName=localStorage.getItem('neon_runner_name');
if(savedName){playerName=savedName;nameInput.value=savedName;}

// ==================== Update ====================
const clock=new THREE.Clock();

function moveWorld(arr,realDt,cleanupZ){
  for(let i=arr.length-1;i>=0;i--){
    const item=arr[i],obj=item.mesh||item;
    obj.position.z+=speed*realDt;
    if(obj.position.z>cleanupZ){
      if(item.warn)scene.remove(item.warn);
      if(item.glow)scene.remove(item.glow);
      if(item.mesh)scene.remove(item.mesh);else scene.remove(obj);
      arr.splice(i,1);
    }
  }
}

function update(dt){
  if(state!=='PLAYING')return;
  const realDt=Math.min(dt,.12);
  animTime+=realDt;
  difficultyTimer+=realDt;
  speed=14+difficultyTimer*.18;if(speed>32)speed=32;

  moveWorld(obstacles,realDt,5);
  moveWorld(coinItems,realDt,5);
  moveWorld(groundTiles,realDt,5);
  moveWorld(railItems,realDt,5);
  moveWorld(tunnelItems,realDt,5);
  moveWorld(buildingItems,realDt,8);

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.userData.life-=realDt;
    p.position.x+=p.userData.vx*realDt;p.position.y+=p.userData.vy*realDt;
    p.position.z+=p.userData.vz*realDt+speed*realDt;p.userData.vy-=15*realDt;
    p.material.opacity=p.userData.life*2;
    if(p.userData.life<=0||p.position.y<-2){scene.remove(p);particles.splice(i,1);}
  }

  let furthestZ=Infinity;
  for(const g of groundTiles)if(g.position.z<furthestZ)furthestZ=g.position.z;
  while(furthestZ>-120){
    const g=new THREE.Mesh(new THREE.PlaneGeometry(6,20),matGround);
    g.rotation.x=-Math.PI/2;g.position.set(0,-.05,furthestZ-10);g.receiveShadow=true;
    scene.add(g);groundTiles.push(g);
    for(const lx of LANE_X)for(const dx of[-.35,.35]){
      const lm=new THREE.Mesh(new THREE.PlaneGeometry(.03,20),new THREE.MeshBasicMaterial({color:'rgba(255,255,255,.15)'}));
      lm.rotation.x=-Math.PI/2;lm.position.set(lx+dx,.02,furthestZ-10);scene.add(lm);groundTiles.push(lm);
    }
    spawnRails(furthestZ-10);spawnTunnelWall(furthestZ-10);furthestZ-=20;
  }

  let furthestBZ=Infinity;
  for(const b of buildingItems)if(b.position&&b.position.z<furthestBZ)furthestBZ=b.position.z;
  if(furthestBZ===Infinity)furthestBZ=5;
  while(furthestBZ>-65){spawnBuilding(-1,furthestBZ-6-Math.random()*8);spawnBuilding(1,furthestBZ-6-Math.random()*8);furthestBZ-=6+Math.random()*8;}

  spawnTimer+=realDt;
  if(spawnTimer>Math.max(.3,1-speed*.025)){spawnTimer=0;spawnObstacle();if(Math.random()<.25+speed*.005)spawnObstacle();}

  coinTimer+=realDt;
  if(coinTimer>Math.max(.6,1.5-speed*.02)){coinTimer=0;spawnCoinPattern();}

  for(let i=coinItems.length-1;i>=0;i--){
    const c=coinItems[i];
    c.mesh.position.z+=speed*realDt;c.glow.position.copy(c.mesh.position);
    c.mesh.position.y=c.baseY+Math.sin(animTime*6+c.mesh.position.x)*.25;c.mesh.rotation.z+=realDt*4;c.glow.position.y=c.mesh.position.y;
    if(Math.abs(playerGroup.position.x-c.mesh.position.x)<.7&&Math.abs(playerGroup.position.z-c.mesh.position.z)<.6&&Math.abs(playerY-c.mesh.position.y)<1.5){
      scene.remove(c.mesh);scene.remove(c.glow);coinItems.splice(i,1);
      coins++;combo++;comboTimer=2;coinsEl.textContent='🪙 '+coins;score+=10+combo*2;
      burstParticles(c.mesh.position.x,c.mesh.position.y,c.mesh.position.z,'#ffd740',8);
    }
  }

  if(comboTimer>0){comboTimer-=realDt;if(combo>=3){comboEl.textContent='COMBO ×'+combo;comboEl.classList.add('show');}}
  else if(combo>0){combo=0;comboEl.classList.remove('show');}

  playerGroup.position.x+=(targetX-playerGroup.position.x)*15*realDt;
  if(playerVelY!==0||playerY>PLAYER_Y){playerVelY-=GRAVITY*realDt;playerY+=playerVelY*realDt;
    if(playerY<=PLAYER_Y){playerY=PLAYER_Y;playerVelY=0;playerGroup.position.y=PLAYER_Y;playerGroup.scale.set(1,1,1);torso.material=matPlayerBody;head.material=matPlayerBody;glowSprite.material=matNeonCyan;}}
  playerGroup.position.y=playerY;

  if(isSliding){slideTimer-=realDt;if(slideTimer<=0){isSliding=false;playerGroup.scale.set(1,1,1);playerGroup.position.y=PLAYER_Y;torso.material=matPlayerBody;head.material=matPlayerBody;glowSprite.material=matNeonCyan;}}

  for(const o of obstacles)if(checkCollision(o)){burstParticles(playerGroup.position.x,playerY,playerGroup.position.z,'#ff4081',35);gameOver();return;}

  score+=speed*realDt*2;
  const bobFreq=isSliding?8:14;
  if(!isSliding&&playerY===PLAYER_Y){playerGroup.position.y+=Math.sin(animTime*bobFreq)*(isSliding?.02:.08);legL2.rotation.x=Math.sin(animTime*14)*.5;legR2.rotation.x=Math.sin(animTime*14+Math.PI)*.5;armL.rotation.x=Math.sin(animTime*14+Math.PI)*.3;armR.rotation.x=Math.sin(animTime*14)*.3;}

  camera.position.x+=(playerGroup.position.x*.25-camera.position.x)*4*realDt;
  camera.lookAt(playerGroup.position.x*.25,playerY+.4,playerGroup.position.z-4);

  scoreEl.textContent=Math.floor(score);
  speedEl.textContent='⚡ '+Math.floor(speed)+' km/h';
  if(combo>=5)scoreEl.classList.add('pulse');else scoreEl.classList.remove('pulse');
  lightL.intensity=25+Math.sin(animTime*2)*5;lightR.intensity=25+Math.cos(animTime*2.3)*5;

  // Save name
  if(playerName)localStorage.setItem('neon_runner_name',playerName);
}

function render(){renderer.render(scene,camera);}
function loop(){requestAnimationFrame(loop);update(clock.getDelta());render();}

// ==================== Controls ====================
function moveLeft(){if(state==='PLAYING'&&lane>0){lane--;targetX=LANE_X[lane];}}
function moveRight(){if(state==='PLAYING'&&lane<LANE_COUNT-1){lane++;targetX=LANE_X[lane];}}
function jump(){if(state==='PLAYING'&&playerY===PLAYER_Y&&!isSliding){playerVelY=JUMP_VEL;playerGroup.scale.set(.9,1.25,.9);burstParticles(playerGroup.position.x,0,playerGroup.position.z,'#00e5ff',5);}}
function slide(){if(state==='PLAYING'&&playerY===PLAYER_Y&&!isSliding){isSliding=true;slideTimer=SLIDE_DURATION;playerGroup.scale.set(1,.3,1);playerGroup.position.y=.4;const sm=new THREE.MeshStandardMaterial({color:'#0091ea',metalness:.6,roughness:.25,emissive:'#001133',emissiveIntensity:.5});torso.material=sm;head.material=sm;glowSprite.material=matNeonPink;burstParticles(playerGroup.position.x,.3,playerGroup.position.z,'#7c4dff',4);}}

document.addEventListener('keydown',e=>{
  switch(e.key){case'ArrowLeft':case'a':e.preventDefault();moveLeft();break;case'ArrowRight':case'd':e.preventDefault();moveRight();break;case'ArrowUp':case'w':e.preventDefault();jump();break;case'ArrowDown':case's':e.preventDefault();slide();break;case' ':e.preventDefault();if(state!=='PLAYING'&&playerName)startGame();break;}
});

let tsX=0,tsY=0;
canvas.addEventListener('touchstart',e=>{e.preventDefault();tsX=e.touches[0].clientX;tsY=e.touches[0].clientY;},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();const dx=(e.changedTouches[0]?.clientX||tsX)-tsX,dy=(e.changedTouches[0]?.clientY||tsY)-tsY;if(Math.max(Math.abs(dx),Math.abs(dy))<20)return;if(Math.abs(dx)>Math.abs(dy)){if(dx>0)moveRight();else moveLeft();}else{if(dy<0)jump();else slide();}},{passive:false});

window.addEventListener('resize',()=>{renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();});

// ==================== Boot ====================
initWorld();loop();
renderLB();
nameInput.focus();
</script>
</body>
</html>
