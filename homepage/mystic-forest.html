<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🌿 迷幻森林 · Mystic Forest</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#06060f;overflow:hidden;touch-action:none;
  font-family:'PingFang SC','Microsoft YaHei',monospace;
  user-select:none;-webkit-user-select:none;
  display:flex;align-items:center;justify-content:center;height:100vh;
}
#game{
  image-rendering:pixelated;image-rendering:crisp-edges;
  max-width:100vw;max-height:100vh;
  box-shadow:0 0 60px rgba(100,40,200,.3),0 0 120px rgba(30,160,140,.18);
}
#hud{
  position:fixed;top:0;left:0;right:0;pointer-events:none;z-index:10;
  display:flex;justify-content:space-between;padding:8px 12px;gap:8px;
}
.hud-item{
  color:#c8b8e8;font-size:clamp(10px,1.5vw,12px);
  text-shadow:0 0 8px rgba(140,100,210,.6);
  background:rgba(8,6,18,.55);padding:4px 10px;border-radius:8px;
  border:1px solid rgba(140,110,200,.12);
}
#hint{
  position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:10;
  pointer-events:none;color:rgba(190,170,220,.65);font-size:11px;
  text-shadow:0 0 10px rgba(100,40,200,.5);
  animation:fadeHint 3s ease-in-out infinite;
}
@keyframes fadeHint{0%,100%{opacity:.35}50%{opacity:1}}
#ctrl{
  position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:20;
  display:none;gap:3px;
}
@media(max-width:768px),(hover:none){
  #ctrl{display:grid;grid-template-columns:50px 50px 50px;grid-template-rows:50px 50px 50px;
    grid-template-areas:'. up .' 'left . right' '. down .';gap:3px;}
  #hint{display:none}
}
.ctrl-btn{
  width:50px;height:50px;border-radius:12px;border:2px solid rgba(140,100,200,.28);
  background:rgba(25,15,50,.45);color:rgba(190,170,220,.75);font-size:18px;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);touch-action:manipulation;
}
.ctrl-btn:active{background:rgba(100,40,200,.3);border-color:rgba(180,140,240,.55)}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hud">
  <span class="hud-item" id="hud-pos">🌲 迷幻森林</span>
  <span class="hud-item" id="hud-time">☀ 白昼</span>
  <span class="hud-item" id="hud-info">✨ 0</span>
</div>
<div id="hint">WASD / 方向键 移动 · 靠近花朵蘑菇收集光芒</div>

<div id="ctrl">
  <div></div><button class="ctrl-btn" id="btn-up" style="grid-area:up">▲</button><div></div>
  <button class="ctrl-btn" id="btn-left" style="grid-area:left">◀</button>
  <div></div><button class="ctrl-btn" id="btn-right" style="grid-area:right">▶</button>
  <button class="ctrl-btn" id="btn-down" style="grid-area:down">▼</button><div></div>
</div>

<script>
/* ═══════════════════ PIXEL CANVAS SETUP ═══════════════════ */
const W=256,H=160; // internal pixel resolution
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
canvas.width=W;canvas.height=H;
ctx.imageSmoothingEnabled=false;

function resize(){
  const sw=window.innerWidth,sh=window.innerHeight;
  const s=Math.floor(Math.min(sw/W,sh/H));
  canvas.style.width=(W*(s<1?1:s))+'px';
  canvas.style.height=(H*(s<1?1:s))+'px';
}
resize();window.addEventListener('resize',resize);

/* ═══════════════════ COLOR PALETTE ═══════════════════ */
const C={
  g1:'#142414',g2:'#182c18',g3:'#1c341c',g4:'#203c20',
  t1:'#2a1a08',t2:'#3a2810',t3:'#4a3418',
  lf1:'#163024',lf2:'#1a3a2c',lf3:'#1e4234',
  lg1:'#22403a',lg2:'#264840',lg3:'#2a5048',
  mush1:'#5a2080',mush2:'#7a30a8',mushG1:'#b848d8',mushG2:'#d068f0',
  flw1:'#d83870',flw2:'#f05898',flw3:'#3878d8',flw4:'#5898f8',
  wtr1:'#162840',wtr2:'#1a3050',
  pth1:'#302818',pth2:'#3e3420',
  rk1:'#404048',rk2:'#505058',
  alt1:'#585860',alt2:'#686870',rune:'#c0a0e8',
  sk:'#f0c898',hair:'#3a1a08',shirt:'#284878',
};
const hexToRGBA=(hex,a)=>`rgba(${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)},${a})`;

/* ═══════════════════ MAP ═══════════════════ */
const MW=64,MH=48,TS=16; // map 64x48 tiles, each 16px
const tiles=[];
const T={GRASS:0,TREE:1,TREE_BIG:2,MUSH:3,FLOWER:4,WATER:5,PATH:6,ROCK:7,ALTAR:8,CRYSTAL:9,STUMP:10,GLOW_MUSH:11};
const IMPASSABLE=[T.TREE,T.TREE_BIG,T.WATER,T.ROCK,T.ALTAR,T.STUMP];

function rng(s){return function(){s|=0;s=s+0x6D2B79F5|0;let t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}

function initMap(){
  const R=rng(42);
  for(let y=0;y<MH;y++){tiles[y]=[];for(let x=0;x<MW;x++)tiles[y][x]=T.GRASS;}

  // lake top-left
  for(let y=0;y<MH;y++)for(let x=0;x<MW;x++){
    if((x-10)*(x-10)/25+(y-8)*(y-8)/16<1)tiles[y][x]=T.WATER;
    if((x-50)*(x-50)/12+(y-38)*(y-38)/8<1)tiles[y][x]=T.WATER;
  }
  // river
  for(let y=0;y<MH;y++)for(let x=0;x<MW;x++){
    if(x>20&&x<42){const ry=y-22;if(Math.abs(x-31-ry*0.2-Math.sin(ry*0.25)*3)<2&&tiles[y][x]!==T.WATER)tiles[y][x]=T.WATER;}
  }

  // paths
  for(let y=0;y<MH;y++)for(let x=0;x<MW;x++){
    if(Math.abs(y-24+x*.12+Math.sin(x*.35)*1.5-10)<1&&tiles[y][x]===T.GRASS)tiles[y][x]=T.PATH;
    if(Math.abs(x-32+Math.sin(y*.3)*2.5)<1&&y>5&&y<45&&tiles[y][x]===T.GRASS)tiles[y][x]=T.PATH;
  }

  // trees
  for(let i=0;i<320;i++){const x=R()*MW|0,y=R()*MH|0;if(tiles[y][x]===T.GRASS)tiles[y][x]=R()<.2?T.TREE_BIG:T.TREE;}

  // mushrooms & flowers
  for(let i=0;i<65;i++){const x=R()*MW|0,y=R()*MH|0;if(tiles[y][x]===T.GRASS)tiles[y][x]=R()<.3?T.GLOW_MUSH:T.MUSH;}
  for(let i=0;i<100;i++){const x=R()*MW|0,y=R()*MH|0;if(tiles[y][x]===T.GRASS)tiles[y][x]=T.FLOWER;}
  for(let i=0;i<40;i++){const x=R()*MW|0,y=R()*MH|0;if(tiles[y][x]===T.GRASS)tiles[y][x]=T.ROCK;}

  // crystal circle
  for(let dy=-4;dy<=4;dy++)for(let dx=-4;dx<=4;dx++){
    const tx=18+dx,ty=15+dy,d=Math.sqrt(dx*dx+dy*dy);
    if(tx>=0&&tx<MW&&ty>=0&&ty<MH&&tiles[ty][tx]!==T.WATER){
      if(d<3.5)tiles[ty][tx]=d<1.5?T.CRYSTAL:T.FLOWER;
    }
  }
  // altar
  for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++){
    const tx=50+dx,ty=36+dy;
    if(tx>=0&&tx<MW&&ty>=0&&ty<MH&&tiles[ty][tx]!==T.WATER)
      tiles[ty][tx]=dx===0&&dy===0?T.ALTAR:T.PATH;
  }

  // spawn clearing
  for(let dy=-4;dy<=4;dy++)for(let dx=-4;dx<=4;dx++){
    const tx=4+dx,ty=24+dy;
    if(tx>=0&&tx<MW&&ty>=0&&ty<MH)tiles[ty][tx]=dx===0&&dy===0?T.PATH:T.GRASS;
  }
}

/* ═══════════════════ RENDER TILES ═══════════════════ */
function drawTile(sx,sy,tx,ty,t,f){
  ctx.fillStyle=(tx+ty)%2?C.g2:C.g1;ctx.fillRect(sx,sy,TS,TS);

  switch(t){
    case T.WATER:
      ctx.fillStyle=(tx+ty+((f*3.5)|0))%2?C.wtr1:C.wtr2;ctx.fillRect(sx,sy,TS,TS);
      ctx.fillStyle=hexToRGBA('#4088b0',.12+.08*Math.sin(f*5+tx*.7+ty*.9));
      ctx.fillRect(sx+4+(tx%5),sy+5+(ty%4),5,2);
      break;
    case T.PATH:
      ctx.fillStyle=(tx+ty)%2?C.pth1:C.pth2;ctx.fillRect(sx,sy,TS,TS);
      break;
    case T.ROCK:
      ctx.fillStyle=C.rk1;ctx.fillRect(sx+3,sy+9,7,5);ctx.fillRect(sx+2,sy+10,10,3);
      ctx.fillStyle=C.rk2;ctx.fillRect(sx+4,sy+10,4,2);
      break;
    case T.TREE: drawTree(sx,sy,1,f); break;
    case T.TREE_BIG: drawTree(sx,sy,1.4,f); break;
    case T.MUSH: drawMushroom(sx,sy,false,f); break;
    case T.GLOW_MUSH: drawMushroom(sx,sy,true,f); break;
    case T.FLOWER: drawFlower(sx,sy,tx,ty); break;
    case T.CRYSTAL: drawCrystal(sx,sy,f); break;
    case T.ALTAR: drawAltar(sx,sy,f); break;
    case T.STUMP: drawStump(sx,sy); break;
  }
}

function drawTree(cx,cy,s,f){
  ctx.fillStyle=C.t2;ctx.fillRect(cx+TS/2-2,cy+TS/2,3,7);
  ctx.fillStyle=C.t3;ctx.fillRect(cx+TS/2-1,cy+TS/2,2,6);
  const r=6*s,lx=cx+TS/2,ly=cy+1;
  for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){
    if(dx*dx+dy*dy<r*r){
      if(f>0.5){ctx.fillStyle=[C.lg1,C.lg2,C.lg3][Math.abs(dx+dy)%3];}
      else{ctx.fillStyle=[C.lf1,C.lf2,C.lf3][Math.abs(dx+dy)%3];}
      ctx.fillRect(lx+dx,ly+dy,1,1);
    }
  }
}

function drawMushroom(cx,cy,glow,f){
  ctx.fillStyle='#d0c0a8';ctx.fillRect(cx+6,cy+7,3,5);
  ctx.fillStyle=glow?C.mush2:C.mush1;
  ctx.fillRect(cx+3,cy+5,9,4);ctx.fillRect(cx+2,cy+4,11,3);
  ctx.fillRect(cx+4,cy+3,8,2);ctx.fillRect(cx+5,cy+2,5,1);
  if(glow){
    ctx.fillStyle=C.mushG1;ctx.fillRect(cx+5,cy+4,5,2);ctx.fillRect(cx+6,cy+3,3,1);
    ctx.fillStyle=hexToRGBA('#c060e8',.18+.14*Math.sin(f*4));ctx.fillRect(cx+2,cy+2,12,9);
  }
}

function drawFlower(cx,cy,tx,ty){
  const col=[C.flw1,C.flw2,C.flw3,C.flw4][Math.abs(tx+ty*3)%4];
  ctx.fillStyle='#3a5a28';ctx.fillRect(cx+7,cy+10,2,6);
  ctx.fillStyle=col;ctx.fillRect(cx+5,cy+9,6,2);ctx.fillRect(cx+4,cy+10,8,2);
  ctx.fillRect(cx+7,cy+8,2,2);ctx.fillRect(cx+6,cy+7,1,1);ctx.fillRect(cx+9,cy+7,1,1);
  ctx.fillStyle='#ffe8a8';ctx.fillRect(cx+7,cy+9,2,1);
}

function drawCrystal(cx,cy,f){
  ctx.fillStyle='#7058b0';ctx.fillRect(cx+7,cy+12,2,4);
  ctx.fillStyle='#8870c8';ctx.fillRect(cx+6,cy+9,4,3);
  ctx.fillStyle='#a088e0';ctx.fillRect(cx+7,cy+7,3,2);
  ctx.fillStyle='#c8a8f8';ctx.fillRect(cx+8,cy+5,2,3);ctx.fillRect(cx+7,cy+4,2,1);
  const g=.25+.2*Math.sin(f*3.5);
  ctx.fillStyle=hexToRGBA('#9068d8',g);ctx.fillRect(cx+3,cy+4,12,12);
  ctx.fillStyle=hexToRGBA('#b898f0',g*.6);ctx.fillRect(cx+5,cy+6,8,9);
}

function drawAltar(cx,cy,f){
  ctx.fillStyle=C.alt1;ctx.fillRect(cx+2,cy+10,12,6);ctx.fillRect(cx+1,cy+11,14,4);
  ctx.fillStyle=C.alt2;ctx.fillRect(cx+3,cy+10,10,3);
  const g=.35+.3*Math.sin(f*2.2);
  ctx.fillStyle=hexToRGBA(C.rune,g);ctx.fillRect(cx+5,cy+8,6,3);ctx.fillRect(cx+6,cy+6,4,4);
  ctx.fillStyle=hexToRGBA('#e8d8ff',g*.7);ctx.fillRect(cx+7,cy+7,2,2);
}

function drawStump(cx,cy){
  ctx.fillStyle='#3a2818';ctx.fillRect(cx+4,cy+9,7,6);
  ctx.fillStyle='#4a3826';ctx.fillRect(cx+5,cy+9,5,4);
  ctx.fillStyle='#5a4832';ctx.fillRect(cx+5,cy+8,5,2);
  ctx.fillStyle='#685840';ctx.fillRect(cx+6,cy+9,3,1);
}

/* ═══════════════════ PLAYER ═══════════════════ */
const P={x:4*TS+TS/2,y:24*TS+TS/2,vx:0,vy:0,speed:1.6,dir:2,frame:0,sparkles:0};
const keys={};

window.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright'].includes(k)){
    keys[k]=true;e.preventDefault();
    collectNearby();
  }
});
window.addEventListener('keyup',e=>{
  keys[e.key.toLowerCase()]=false;e.preventDefault();
});

function collectNearby(){
  const tx=P.x/TS|0,ty=P.y/TS|0;
  for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
    const nx=tx+dx,ny=ty+dy;
    if(nx>=0&&nx<MW&&ny>=0&&ny<MH){
      const t=tiles[ny][nx];
      if(t===T.CRYSTAL||t===T.FLOWER||t===T.MUSH||t===T.GLOW_MUSH){
        tiles[ny][nx]=T.GRASS;P.sparkles=Math.min(P.sparkles+1,99);
        spawnParticles(nx*TS+TS/2,ny*TS+TS/2,8,t===T.CRYSTAL?'#c8a8f8':t===T.GLOW_MUSH?'#c060e8':'#f0d888');
      }
    }
  }
}

function drawPlayer(cx,cy){
  const sx=W/2-8,sy=H/2-8;
  // shadow
  ctx.fillStyle='rgba(0,0,0,.22)';ctx.fillRect(sx+1,sy+13,13,3);
  // shoes
  ctx.fillStyle='#3a1a08';ctx.fillRect(sx+3,sy+13,4,2);ctx.fillRect(sx+9,sy+13,4,2);
  // legs animation
  ctx.fillStyle='#243856';ctx.fillRect(sx+3,sy+11,4,3);ctx.fillRect(sx+9,sy+11,4,3);
  if(P.vx!==0||P.vy!==0){if(P.frame%10<5){ctx.fillRect(sx+3,sy+10,4,1);ctx.fillRect(sx+10,sy+10,3,1);}else{ctx.fillRect(sx+4,sy+10,3,1);ctx.fillRect(sx+9,sy+10,3,1);}}
  // body
  ctx.fillStyle=C.shirt;ctx.fillRect(sx+4,sy+6,8,6);ctx.fillStyle='#385888';ctx.fillRect(sx+5,sy+6,6,3);
  // arms
  ctx.fillStyle=C.shirt;ctx.fillRect(sx+2,sy+7,2,5);ctx.fillRect(sx+12,sy+7,2,5);
  // hands
  ctx.fillStyle=C.sk;ctx.fillRect(sx+1,sy+8,2,3);ctx.fillRect(sx+13,sy+8,2,3);
  // head
  ctx.fillStyle=C.sk;ctx.fillRect(sx+5,sy+2,6,5);ctx.fillRect(sx+4,sy+3,8,3);
  // hair
  ctx.fillStyle=C.hair;ctx.fillRect(sx+5,sy,6,3);ctx.fillRect(sx+4,sy+2,2,3);ctx.fillRect(sx+10,sy+2,2,3);
  // eyes
  ctx.fillStyle='#fff';ctx.fillRect(sx+6,sy+4,2,2);ctx.fillRect(sx+9,sy+4,2,2);
  ctx.fillStyle='#111';ctx.fillRect(sx+7,sy+4,1,1);ctx.fillRect(sx+10,sy+4,1,1);
  // sparkle aura
  if(P.sparkles>0){
    const g=.25+.2*Math.sin(performance.now()*.005);
    ctx.fillStyle=hexToRGBA('#c8b8f0',g);
    for(let i=0;i<Math.min(P.sparkles,5);i++){
      const sx2=sx+2+Math.sin(performance.now()*.004+i*1.8)*8;
      const sy2=sy-4+Math.cos(performance.now()*.003+i)*7;
      ctx.fillRect(sx2|0,sy2|0,1,1);
    }
  }
}

/* ═══════════════════ PARTICLES ═══════════════════ */
const particles=[];
function spawnParticles(x,y,n,col){
  for(let i=0;i<n;i++){
    particles.push({x,y,vx:(Math.random()-.5)*2.5,vy:(Math.random()-.5)*2-1.5,life:1,decay:.015+.025*Math.random(),col:col||'#e8d890',size:1+(Math.random()*2|0)});
  }
}

/* ═══════════════════ FIREFLIES ═══════════════════ */
const fireflies=[];
for(let i=0;i<55;i++){
  fireflies.push({
    x:Math.random()*MW*TS,y:Math.random()*MH*TS,
    vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,
    ph:Math.random()*Math.PI*2,sp:.003+.018*Math.random(),
    col:Math.random()<.5?'#c880e0':Math.random()<.5?'#80e0c0':'#e0c880',
    size:1+(Math.random()*1.5|0)
  });
}

/* ═══════════════════ RENDER ═══════════════════ */
function render(t){
  const camX=P.x-W/2,camY=P.y-H/2;
  const tsx=Math.max(0,(camX/TS|0)-1),tsy=Math.max(0,(camY/TS|0)-1);
  const tex=Math.min(MW,(camX+W)/TS+2|0),tey=Math.min(MH,(camY+H)/TS+2|0);

  ctx.fillStyle='#101018';ctx.fillRect(0,0,W,H);

  // tiles
  for(let y=tsy;y<tey;y++)for(let x=tsx;x<tex;x++){
    const sx=(x*TS-camX)|0,sy=(y*TS-camY)|0;
    if(sx>-TS&&sx<W+TS&&sy>-TS&&sy<H+TS) drawTile(sx,sy,x,y,tiles[y][x],t*.00008);
  }

  // fireflies
  for(const ff of fireflies){
    const sx=(ff.x-camX)|0,sy=(ff.y-camY)|0;
    if(sx>=0&&sx<W&&sy>=0&&sy<H){
      const gl=.25+.2*Math.sin(t*ff.sp+ff.ph);
      ctx.fillStyle=hexToRGBA(ff.col,gl);ctx.fillRect(sx,sy,ff.size,ff.size);
      ctx.fillStyle=hexToRGBA('#ffffff',gl*.35);ctx.fillRect(sx, sy,1,1);
    }
  }

  // particles
  for(const p of particles){
    const sx=(p.x-camX)|0,sy=(p.y-camY)|0;
    if(sx>=0&&sx<W&&sy>=0&&sy<H){
      ctx.fillStyle=hexToRGBA(p.col,p.life*.7);
      ctx.fillRect(sx,sy,p.size,p.size);
      if(p.size>1)ctx.fillStyle=hexToRGBA('#fff',p.life*.4);
      if(p.size>1)ctx.fillRect(sx+1,sy+1,1,1);
    }
  }

  // player
  drawPlayer(P.x-camX,P.y-camY);

  // psychedelic overlay
  const ph=t*.00007;
  ctx.fillStyle=`rgba(${100+35*Math.sin(ph)},${15+12*Math.cos(ph*1.3)},${160+35*Math.sin(ph*.7)},.028)`;
  ctx.fillRect(0,0,W,H);

  // vignette
  const vg=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*.32,W/2,H/2,Math.min(W,H)*.68);
  vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(4,2,12,.4)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
}

/* ═══════════════════ UPDATE ═══════════════════ */
function update(dt){
  // movement input
  let mx=0,my=0;
  if(keys['w']||keys['arrowup'])my=-1;
  if(keys['s']||keys['arrowdown'])my=1;
  if(keys['a']||keys['arrowleft'])mx=-1;
  if(keys['d']||keys['arrowright'])mx=1;
  if(mx&&my){mx*=.707;my*=.707;}

  P.vx=mx*P.speed;P.vy=my*P.speed;
  if(mx||my)P.frame++;else P.frame=0;

  // collision
  const r=TS/2-2;
  const step=dt*.06;
  const nx=P.x+P.vx*step,ny=P.y+P.vy*step;
  let cx=1,cy=1;
  [[nx-r,ny-r],[nx+r,ny-r],[nx-r,ny+r],[nx+r,ny+r]].forEach(([px,py])=>{
    const tx=px/TS|0,ty=py/TS|0;
    if(tx>=0&&tx<MW&&ty>=0&&ty<MH&&IMPASSABLE.includes(tiles[ty][tx]))cx=0;
  });
  [[P.x-r,ny-r],[P.x+r,ny-r],[P.x-r,ny+r],[P.x+r,ny+r]].forEach(([px,py])=>{
    const tx=px/TS|0,ty=py/TS|0;
    if(tx>=0&&tx<MW&&ty>=0&&ty<MH&&IMPASSABLE.includes(tiles[ty][tx]))cy=0;
  });

  if(cx)P.x=nx;if(cy)P.y=ny;
  P.x=Math.max(r,Math.min(MW*TS-r,P.x));
  P.y=Math.max(r,Math.min(MH*TS-r,P.y));

  // fireflies
  for(const ff of fireflies){
    ff.x+=ff.vx;ff.y+=ff.vy;
    if(ff.x<0||ff.x>MW*TS)ff.vx*=-1;
    if(ff.y<0||ff.y>MH*TS)ff.vy*=-1;
    const ftx=ff.x/TS|0,fty=ff.y/TS|0;
    if(ftx>=0&&ftx<MW&&fty>=0&&fty<MH&&tiles[fty][ftx]===T.WATER){
      ff.vx=(Math.random()-.5)*.4;ff.vy=(Math.random()-.5)*.4;
    }
  }

  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx*p.life;p.y+=p.vy*p.life;p.vy+=.015;p.life-=p.decay;
    if(p.life<=0)particles.splice(i,1);
  }

  // crystal particle spawning
  const ptx=P.x/TS|0,pty=P.y/TS|0;
  for(let dy=-4;dy<=4;dy++)for(let dx=-4;dx<=4;dx++){
    const tx=ptx+dx,ty=pty+dy;
    if(tx>=0&&tx<MW&&ty>=0&&ty<MH&&tiles[ty][tx]===T.CRYSTAL&&Math.random()<.2)
      spawnParticles(tx*TS+TS/2,ty*TS+TS/2,1,'#b898f0');
  }

  // HUD
  document.getElementById('hud-pos').textContent=`🌲 X:${P.x/TS|0} Y:${P.y/TS|0}`;
  const dp=Math.sin(performance.now()*.000025)*.5+.5;
  document.getElementById('hud-time').textContent=dp>.65?'☀ 白昼':dp>.35?'🌅 暮光':'🌙 暗夜';
  document.getElementById('hud-info').textContent=`✨ ${P.sparkles}`;
}

/* ═══════════════════ MOBILE ═══════════════════ */
['up','down','left','right'].forEach(d=>{
  const btn=document.getElementById('btn-'+d);
  const kmap={up:'w',down:'s',left:'a',right:'d'};
  btn.addEventListener('pointerdown',e=>{e.preventDefault();keys[kmap[d]]=true;collectNearby();});
  btn.addEventListener('pointerup',e=>{e.preventDefault();keys[kmap[d]]=false;});
  btn.addEventListener('pointerleave',()=>{keys[kmap[d]]=false;});
});

/* ═══════════════════ GAME LOOP ═══════════════════ */
initMap();
let lastT=0;
function loop(t){
  const dt=lastT?Math.min(t-lastT,50):16;lastT=t;
  update(dt);
  render(t);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
