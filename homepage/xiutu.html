<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>仙途 · 文字修仙</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;color:#c8b896;font-family:'PingFang SC','Microsoft YaHei',serif;overflow:hidden;height:100vh;user-select:none;-webkit-user-select:none}
#app{display:flex;flex-direction:column;height:100vh;max-width:500px;margin:0 auto}
#header{background:linear-gradient(180deg,rgba(15,10,25,.98),rgba(10,8,20,.95));padding:8px 12px;text-align:center;border-bottom:1px solid rgba(180,140,80,.08);flex-shrink:0}
#header .realm{font-size:1.3rem;font-weight:bold;background:linear-gradient(180deg,#ffd700,#b8860b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#header .stats{font-size:.55rem;color:rgba(200,180,140,.4);display:flex;justify-content:center;gap:12px;margin-top:2px}
#header .stats span{color:rgba(200,180,140,.6)}
#content{flex:1;overflow-y:auto;padding:10px;-webkit-overflow-scrolling:touch}
#tabs{display:flex;background:rgba(10,8,20,.98);border-top:1px solid rgba(180,140,80,.08);flex-shrink:0}
#tabs button{flex:1;padding:8px 2px;background:none;border:none;color:rgba(180,140,80,.35);font-size:.55rem;cursor:pointer;transition:all .2s;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:1px}
#tabs button.active{color:#ffd700;background:rgba(180,140,80,.04)}
#tabs button .ti{font-size:1rem}

.card{background:rgba(15,13,28,.7);border:1px solid rgba(180,140,80,.06);border-radius:10px;padding:12px;margin-bottom:8px}
.card h3{font-size:.8rem;color:#d4b060;margin-bottom:6px;letter-spacing:1px}
.card .sub{font-size:.6rem;color:rgba(200,180,140,.4);line-height:1.5}
.card .row{display:flex;justify-content:space-between;align-items:center;font-size:.65rem;margin:3px 0}

.btn{display:block;width:100%;padding:10px;margin:4px 0;border-radius:7px;border:1px solid rgba(180,140,80,.15);background:rgba(180,140,80,.06);color:#d4b060;font-size:.7rem;cursor:pointer;transition:all .2s;font-family:inherit;text-align:center;letter-spacing:1px}
.btn:active{transform:scale(.97)}
.btn.pri{background:rgba(180,140,80,.12);border-color:rgba(180,140,80,.35);color:#ffd700;font-weight:bold}
.btn.dan{background:rgba(200,50,50,.08);border-color:rgba(200,50,50,.2);color:#e57373}
.btn.ok{background:rgba(50,180,80,.08);border-color:rgba(50,180,80,.2);color:#81c784}
.btn:disabled{opacity:.3;pointer-events:none}
.btn-sm{padding:5px 10px;font-size:.55rem;width:auto;display:inline-block;margin:2px}

.progress{height:6px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden;margin:2px 0}
.progress div{height:100%;border-radius:3px;transition:width .3s}
.progress .exp{background:linear-gradient(90deg,#b8860b,#ffd700)}
.progress .hp{background:linear-gradient(90deg,#c62828,#ef5350)}
.progress .mp{background:linear-gradient(90deg,#1565c0,#42a5f5)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}

.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.5rem;margin:1px}
.badge.gold{background:rgba(255,215,0,.1);color:#ffd700;border:1px solid rgba(255,215,0,.2)}
.badge.red{background:rgba(244,67,54,.1);color:#e57373;border:1px solid rgba(244,67,54,.2)}
.badge.blue{background:rgba(66,165,245,.1);color:#64b5f6;border:1px solid rgba(66,165,245,.2)}
.badge.green{background:rgba(129,199,132,.1);color:#81c784;border:1px solid rgba(129,199,132,.2)}
.badge.purple{background:rgba(156,39,176,.1);color:#ce93d8;border:1px solid rgba(156,39,176,.2)}

#log-box{font-size:.55rem;color:rgba(200,180,140,.35);line-height:1.7;max-height:80px;overflow-y:auto}
#battle-log{font-size:.6rem;color:rgba(200,180,140,.5);line-height:1.7;max-height:180px;overflow-y:auto}
#battle-log .hit{color:#e57373}#battle-log .heal{color:#81c784}#battle-log .gold{color:#ffd700}

#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:60;padding:8px 18px;border-radius:20px;font-size:.65rem;color:#ffd700;background:rgba(15,10,25,.95);border:1px solid rgba(180,140,80,.25);opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
#back-link{position:fixed;top:10px;left:10px;z-index:5}
#back-link a{color:rgba(200,180,140,.15);text-decoration:none;font-size:.55rem}
</style>
</head>

</div>

<script>
// ==================== 数据定义 ====================

  {n:'金丹中期',exp:25000,atk:430,def:170,hp:1900,sp:900,desc:'金丹稳固，神通初显'},

const ELEMENTS=['金','木','水','火','土'];
const ELEM_COLORS=['#ffd740','#81c784','#64b5f6','#e57373','#ff8a65'];
const EQ_SLOTS=['武器','防具','头盔','戒指','项链','靴子'];

const SKILLS=[{id:'qigong',n:'基础气功',desc:'修炼效率+20%',cost:30,eff:{expB:.2},icon:'🫁'},
  {id:'tiandun',n:'天罡盾',desc:'防御+30%',cost:80,eff:{defB:.3},icon:'🛡️'},
  {id:'jianjue',n:'剑诀',desc:'攻击+25%',cost:80,eff:{atkB:.25},icon:'⚔️'},
  {id:'jinshen',n:'金身术',desc:'气血上限+40%',cost:120,eff:{hpB:.4},icon:'💪'},
  {id:'tunshi',n:'吞噬苍穹',desc:'修炼效率+50%',cost:250,eff:{expB:.5},icon:'🌌'},
  {id:'leiting',n:'雷霆万钧',desc:'暴击率+20%',cost:200,eff:{critB:.2},icon:'⚡'},
  {id:'buzhou',n:'不周山体',desc:'防御+50%,气血+30%',cost:400,eff:{defB:.5,hpB:.3},icon:'⛰️'},
  {id:'fenghuo',n:'风火轮',desc:'战斗先手攻击',cost:150,eff:{first:true},icon:'🔥'},
  {id:'tianyan',n:'天眼通',desc:'历练掉落率+30%',cost:180,eff:{dropB:.3},icon:'👁️'},
  {id:'xuanyuan',n:'轩辕剑意',desc:'攻击+40%,暴击+15%',cost:500,eff:{atkB:.4,critB:.15},icon:'🗡️'}];

const ALCHEMY_RECIPES=[{id:'hpd_s',n:'小还丹',desc:'恢复30%气血',cost:20,mats:[{n:'灵草',q:2}],icon:'💊',act:'heal',v:.3},
  {id:'hpd_m',n:'大还丹',desc:'恢复60%气血',cost:60,mats:[{n:'灵草',q:4},{n:'灵石碎片',q:1}],icon:'💊',act:'heal',v:.6},
  {id:'expd',n:'聚灵丹',desc:'获得当前等级15%修为',cost:80,mats:[{n:'灵草',q:3},{n:'妖核',q:1}],icon:'✨',act:'exp',v:.15},
  {id:'atkd',n:'龙血丹',desc:'永久攻击+8',cost:200,mats:[{n:'妖核',q:3},{n:'龙涎草',q:1}],icon:'🐉',act:'patk',v:8},
  {id:'defd',n:'玄武丹',desc:'永久防御+4',cost:200,mats:[{n:'妖核',q:3},{n:'玄铁矿',q:1}],icon:'🐢',act:'pdef',v:4},
  {id:'hpp',n:'长生丹',desc:'永久气血+40',cost:300,mats:[{n:'灵草',q:5},{n:'龙涎草',q:2}],icon:'🧬',act:'php',v:40},
  {id:'spd',n:'回灵丹',desc:'灵力+50',cost:40,mats:[{n:'灵草',q:2}],icon:'🔮',act:'sp',v:50},
  {id:'tribd',n:'渡劫丹',desc:'渡劫成功率+10%',cost:500,mats:[{n:'龙涎草',q:3},{n:'玄铁矿',q:2},{n:'妖核',q:5}],icon:'⚡',act:'trib',v:.1}];

const SHOP_ITEMS=[{id:'hpd_s',n:'小还丹',desc:'恢复30%气血',cost:30,icon:'💊',type:'heal',v:.3},
  {id:'hpd_m',n:'大还丹',desc:'恢复60%气血',cost:80,icon:'💊',type:'heal',v:.6},
  {id:'expd',n:'聚灵丹',desc:'获得15%修为',cost:100,icon:'✨',type:'exp',v:.15},
  {id:'atkd',n:'龙血丹',desc:'永久攻击+8',cost:250,icon:'🐉',type:'patk',v:8},
  {id:'defd',n:'玄武丹',desc:'永久防御+4',cost:250,icon:'🐢',type:'pdef',v:4},
  {id:'hpp',n:'长生丹',desc:'永久气血+40',cost:350,icon:'🧬',type:'php',v:40},
  {id:'spd',n:'回灵丹',desc:'灵力+50',cost:50,icon:'🔮',type:'sp',v:50},
  {id:'tribd',n:'渡劫丹',desc:'渡劫成功率+10%',cost:600,icon:'⚡',type:'trib',v:.1}];

const SECT_MISSIONS=[{n:'巡山',desc:'巡逻山门',d:1,rew:{gold:30,exp:20,contrib:10}},
  {n:'采药',desc:'采集灵草',d:1,rew:{gold:20,exp:15,contrib:8,mats:[{n:'灵草',q:2}]}},
  {n:'除妖',desc:'清除山门附近妖兽',d:1,rew:{gold:50,exp:40,contrib:18,mats:[{n:'妖核',q:1}]}},
  {n:'护送',desc:'护送商队',d:2,rew:{gold:100,exp:80,contrib:35}},
  {n:'矿洞',desc:'采集玄铁矿',d:2,rew:{gold:60,exp:50,contrib:25,mats:[{n:'玄铁矿',q:2}]}},
  {n:'秘境',desc:'探索上古秘境',d:3,rew:{gold:200,exp:180,contrib:60,mats:[{n:'龙涎草',q:1},{n:'妖核',q:2}]}}];

const SECT_SHOP=[{n:'宗门功法·残卷',desc:'随机习得一门功法',cost:80,icon:'📜',type:'skill'},
  {n:'筑基丹',desc:'突破筑基成功率+20%',cost:150,icon:'💊',type:'trib_item',v:.2},
  {n:'下品灵器',desc:'随机装备一件',cost:200,icon:'🗡️',type:'equip'},
  {n:'灵兽蛋',desc:'孵化随机灵兽',cost:300,icon:'🥚',type:'beast_egg'},
  {n:'经脉丹',desc:'自动打通一条经脉',cost:250,icon:'🧬',type:'meridian'}];

const MERIDIANS=[{n:'任脉',desc:'气血+20%',cost:50,eff:{hpB:.2}},
  {n:'督脉',desc:'攻击+15%',cost:60,eff:{atkB:.15}},
  {n:'冲脉',desc:'防御+15%',cost:60,eff:{defB:.15}},
  {n:'带脉',desc:'修炼速度+10%',cost:80,eff:{expB:.1}},
  {n:'阴跷脉',desc:'灵力上限+25%',cost:70,eff:{spB:.25}},
  {n:'阳跷脉',desc:'战斗先手概率+20%',cost:100,eff:{firstB:.2}},
  {n:'阴维脉',desc:'历练掉落率+15%',cost:120,eff:{dropB:.15}},
  {n:'阳维脉',desc:'全属性+5%',cost:200,eff:{allB:.05}}];

const BEASTS=[{n:'灵猫',icon:'🐱',atk:3,def:1,hp:20,desc:'敏捷的小型灵兽'},
  {n:'玄龟',icon:'🐢',atk:1,def:5,hp:50,desc:'防御极强的上古血脉'},
  {n:'火凤',icon:'🦅',atk:8,def:2,hp:30,desc:'烈焰中诞生的神鸟'},
  {n:'白虎',icon:'🐯',atk:6,def:3,hp:40,desc:'西方庚金之精'},
  {n:'青龙',icon:'🐉',atk:7,def:4,hp:45,desc:'东方甲乙之神兽'}];

const MONSTERS_BASE=[{n:'山野精怪',hp:25,atk:3,def:1,exp:12,gold:6,icon:'👹',drops:[{n:'灵草',q:1,r:.4}]},
  {n:'毒蛇妖',hp:40,atk:6,def:2,exp:22,gold:10,icon:'🐍',drops:[{n:'妖核',q:1,r:.3}]},
  {n:'石魔',hp:60,atk:8,def:5,exp:35,gold:16,icon:'🗿',drops:[{n:'玄铁矿',q:1,r:.25}]},
  {n:'幽魂',hp:45,atk:10,def:3,exp:30,gold:14,icon:'👻',drops:[{n:'灵草',q:2,r:.35}]},
  {n:'邪修',hp:55,atk:12,def:4,exp:40,gold:20,icon:'🧙',drops:[{n:'妖核',q:1,r:.4}]}];

function getMonsters(){
  const r=P.realm;
  return MONSTERS_BASE.map(m=>({
    ...m,hp:Math.floor(m.hp*(1+r*.4)),atk:Math.floor(m.atk*(1+r*.3)),
    def:Math.floor(m.def*(1+r*.25)),exp:Math.floor(m.exp*(1+r*.3)),
    gold:Math.floor(m.gold*(1+r*.3))
  }));
}

// ==================== 玩家状态 ====================
let P={
  name:'无名修士',realm:0,exp:0,hp:50,maxHp:50,sp:5,maxSp:5,atk:3,def:2,gold:50,lv:1,
  skills:[],bag:[],equipment:{},beast:null,beastLv:0,
  sect:'',sectContrib:0,missionTimer:0,completedMissions:0,
  spiritRoots:{金:50,木:50,水:50,火:50,土:50}, // 随机灵根值0-100
  talents:{根骨:5,悟性:5,气感:5,机缘:5,神识:5},talentPts:0,
  meridians:[], // 已打通的经脉
  permAtk:0,permDef:0,permHp:0,permSp:0,luckBonus:0,tribBonus:0,
  mats:{灵草:3,妖核:1,玄铁矿:0,龙涎草:0},
  innerDemonDefeated:false,autoTrain:false,
};
function save(){localStorage.setItem('xiutu2_save',JSON.stringify(P));}
function load(){try{const d=JSON.parse(localStorage.getItem('xiutu2_save'));if(d)Object.assign(P,d);}catch(e){}}
load();

// 首次初始化
if(!localStorage.getItem('xiutu2_inited')){
  P.spiritRoots={};for(const e of ELEMENTS)P.spiritRoots[e]=20+Math.floor(Math.random()*80);
  P.name=prompt('请输入道号：','无名修士')||'无名修士';
  P.name=P.name.substring(0,8);
  localStorage.setItem('xiutu2_inited','1');
}

function rd(){return REALMS[Math.min(P.realm,REALMS.length-1)];}
function nrd(){return REALMS[Math.min(P.realm+1,REALMS.length-1)];}
function isMax(){return P.realm>=REALMS.length-1;}

function effAtk(){let b=1;for(const s of P.skills){const sk=SKILLS.find(k=>k.id===s);if(sk&&sk.eff.atkB)b+=sk.eff.atkB;}
  for(const m of P.meridians){const mk=MERIDIANS.find(k=>k.n===m);if(mk&&mk.eff.atkB)b+=mk.eff.atkB;if(mk&&mk.eff.allB)b+=mk.eff.allB;}
  let e=0;for(const eq of Object.values(P.equipment))if(eq&&eq.atk)e+=eq.atk;
  return Math.floor((P.atk+P.permAtk+e)*b);}
function effDef(){let b=1;for(const s of P.skills){const sk=SKILLS.find(k=>k.id===s);if(sk&&sk.eff.defB)b+=sk.eff.defB;}
  for(const m of P.meridians){const mk=MERIDIANS.find(k=>k.n===m);if(mk&&mk.eff.defB)b+=mk.eff.defB;if(mk&&mk.eff.allB)b+=mk.eff.allB;}
  let e=0;for(const eq of Object.values(P.equipment))if(eq&&eq.def)e+=eq.def;
  return Math.floor((P.def+P.permDef+e)*b);}
function effMaxHp(){let b=1;for(const s of P.skills){const sk=SKILLS.find(k=>k.id===s);if(sk&&sk.eff.hpB)b+=sk.eff.hpB;}
  for(const m of P.meridians){const mk=MERIDIANS.find(k=>k.n===m);if(mk&&mk.eff.hpB)b+=mk.eff.hpB;if(mk&&mk.eff.allB)b+=mk.eff.allB;}
  let e=0;for(const eq of Object.values(P.equipment))if(eq&&eq.hp)e+=eq.hp;
  return Math.floor((P.maxHp+P.permHp+e)*b);}
function effMaxSp(){let b=1;for(const m of P.meridians){const mk=MERIDIANS.find(k=>k.n===m);if(mk&&mk.eff.spB)b+=mk.eff.spB;if(mk&&mk.eff.allB)b+=mk.eff.allB;}
  return Math.floor((P.maxSp+P.permSp)*b);}
function expBonus(){let b=P.talents.气感*.01+getSpiritBonus();for(const s of P.skills){const sk=SKILLS.find(k=>k.id===s);if(sk&&sk.eff.expB)b+=sk.eff.expB;}
  for(const m of P.meridians){const mk=MERIDIANS.find(k=>k.n===m);if(mk&&mk.eff.expB)b+=mk.eff.expB;if(mk&&mk.eff.allB)b+=mk.eff.allB;}
  return 1+b;}
function dropBonus(){let b=P.talents.机缘*.01+P.luckBonus;for(const s of P.skills){const sk=SKILLS.find(k=>k.id===s);if(sk&&sk.eff.dropB)b+=sk.eff.dropB;}
  for(const m of P.meridians){const mk=MERIDIANS.find(k=>k.n===m);if(mk&&mk.eff.dropB)b+=mk.eff.dropB;if(mk&&mk.eff.allB)b+=mk.eff.allB;}
  return b;}
function critChance(){let b=0;for(const s of P.skills){const sk=SKILLS.find(k=>k.id===s);if(sk&&sk.eff.critB)b+=sk.eff.critB;}
  for(const m of P.meridians){const mk=MERIDIANS.find(k=>k.n===m);if(mk&&mk.eff.critB)b+=mk.eff.critB;}
  return b;}
function hasSkill(id){return P.skills.includes(id);}
function getSpiritBonus(){const vals=Object.values(P.spiritRoots);const avg=vals.reduce((a,b)=>a+b,0)/vals.length;if(avg>=80)return.4;if(avg>=60)return.25;if(avg>=40)return.1;return 0;}
function firstStrikeChance(){let b=0;for(const s of P.skills){const sk=SKILLS.find(k=>k.id===s);if(sk&&sk.eff.first)b+=1;}
  for(const m of P.meridians){const mk=MERIDIANS.find(k=>k.n===m);if(mk&&mk.eff.firstB)b+=mk.eff.firstB;}
  return b;}

// ==================== UI ====================
const content=document.getElementById('content');
const toast=document.getElementById('toast');
let currentTab='home',battleState=null,missionActive=null;

function showToast(msg){toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);}
function uh(){
  document.getElementById('hdr-realm').textContent=rd().n;
  document.getElementById('hdr-atk').textContent=effAtk();document.getElementById('hdr-def').textContent=effDef();
  document.getElementById('hdr-hp').textContent=P.hp+'/'+effMaxHp();
  document.getElementById('hdr-gold').textContent=P.gold;document.getElementById('hdr-lv').textContent=P.lv;
}

document.querySelectorAll('#tabs button').forEach(btn=>{btn.addEventListener('click',()=>{
  document.querySelectorAll('#tabs button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');currentTab=btn.dataset.tab;render();
});});

function render(){uh();switch(currentTab){
  case'home':rHome();break;case'battle':rBattle();break;
  case'sect':rSect();break;case'craft':rCraft();break;case'more':rMore();break;
}save();}

// ==================== 洞府 ====================
function rHome(){
  const r=rd(),nr=nrd();
  const expPct=isMax()?100:Math.min(100,Math.floor((P.exp-r.exp)/(nr.exp-r.exp)*100));
  const expNeed=isMax()?'∞':nr.exp-P.exp;
  let h=`
  <div class="card" style="text-align:center">
    <div style="font-size:2rem">🧘</div><h3>${r.n}</h3>
    <div class="sub">${P.name} · ${r.desc}</div>
    <div class="progress"><div class="exp" style="width:${expPct}%"></div></div>
    <div style="font-size:.55rem;color:rgba(200,180,140,.4);margin-top:2px">还需 ${expNeed} 修为突破</div>
    <div class="row" style="margin-top:4px"><span>⚔️${effAtk()}</span><span>🛡️${effDef()}</span><span>❤️${effMaxHp()}</span><span>🔮${effMaxSp()}</span></div>
    <div class="row" style="font-size:.55rem;color:rgba(200,180,140,.4)"><span>修炼:${Math.floor(expBonus()*100)}%</span><span>掉落:${Math.floor(dropBonus()*100)}%</span><span>暴击:${Math.floor(critChance()*100)}%</span></div>
  </div>
  <button class="btn pri" onclick="cultivate()">🧘 修炼 (+${Math.floor(10*expBonus())}修为)</button>
  <button class="btn ok" onclick="breakthrough()" ${isMax()||P.exp<nr.exp?'disabled':''}>⚡ 突破${isMax()?' (已达巅峰)':P.exp<nr.exp?' (修为不足)':' → '+nr.n}</button>
  <button class="btn" onclick="meditate()">💆 打坐 (恢复气血灵力)</button>

  <div class="card"><h3>🌿 灵根</h3><div class="grid3">`;
  for(let i=0;i<ELEMENTS.length;i++){
    const e=ELEMENTS[i],v=P.spiritRoots[e];
    h+=`<div style="text-align:center;font-size:.6rem;color:${ELEM_COLORS[i]}">${e}<br><strong>${v}</strong></div>`;
  }
  h+=`</div><div class="sub" style="margin-top:4px">灵根均值 ${Math.floor(Object.values(P.spiritRoots).reduce((a,b)=>a+b,0)/5)} · ${getSpiritBonus()>.2?'修炼天赋优秀':getSpiritBonus()>.1?'资质尚可':'资质平平'}</div></div>

  <div class="card"><h3>⭐ 天赋 (剩余点数:${P.talentPts})</h3><div class="sub">每升5级获得1天赋点</div>`;
  for(const[t,v]of Object.entries(P.talents)){
    h+=`<div class="row"><span>${t} Lv.${v}</span><button class="btn-sm btn ok" onclick="addTalent('${t}')" ${P.talentPts<=0?'disabled':''}>+</button></div>`;
  }
  h+=`</div>

  <div class="card"><h3>🔮 经脉</h3><div class="sub">已打通: ${P.meridians.length}/${MERIDIANS.length}</div>`;
  for(const m of MERIDIANS){
    const done=P.meridians.includes(m.n);
    h+=`<div class="row"><span>${done?'✅':''}${m.n}</span><span style="font-size:.55rem;color:rgba(200,180,140,.4)">${m.desc}</span>${done?'':`<button class="btn-sm" onclick="openMeridian('${m.n}')" ${P.gold>=m.cost?'':'disabled'}>💎${m.cost}</button>`}</div>`;
  }
  h+=`</div>

  <div class="card"><h3>👹 心魔</h3><div class="sub">${P.innerDemonDefeated?'已战胜心魔 ✅':'击败心魔可获得大道感悟'}</div>
  ${!P.innerDemonDefeated?`<button class="btn dan" onclick="fightInnerDemon()" ${P.realm<4?'disabled':''}>⚔️ 挑战心魔 ${P.realm<4?'(需筑基期以上)':'(战力:'+Math.floor(effAtk()*.8)+')'}</button>`:''}
  </div>

  <div class="card"><h3>🐾 灵兽</h3>`;
  if(P.beast){const b=P.beast;h+=`<div class="row"><span>${b.icon} ${b.n} Lv.${P.beastLv}</span><span>⚔️${Math.floor(b.atk*(1+P.beastLv*.2))} 🛡️${Math.floor(b.def*(1+P.beastLv*.1))}</span></div><button class="btn-sm ok" onclick="upgradeBeast()" ${P.gold<100?'disabled':''}>升级 💎100</button>`;}
  else{h+=`<div class="sub">尚未拥有灵兽，可在宗门兑换灵兽蛋</div>`;}
  h+=`</div>`;

  content.innerHTML=h;

function cultivate(){
  const gain=Math.floor(10*expBonus());
  P.exp+=gain;P.sp=Math.min(effMaxSp(),P.sp+2);P.lv=Math.floor(P.exp/30)+1;
  if(P.lv%5===0&&P.lv>0&&P.talentPts<Math.floor(P.lv/5))P.talentPts++;
  if(Math.random()<.06+P.talents.机缘*.005){const g=Math.floor(15+P.realm*8);P.gold+=g;showToast(`修炼 +${gain}修为 | 🎁 意外获得灵石+${g}`);}
  else if(Math.random()<.04){const g=Math.floor(40*expBonus());P.exp+=g;showToast(`修炼 +${gain}修为 | 💡 顿悟！额外+${g}修为`);}
  else showToast(`修炼 +${gain}修为`);
  render();
}

function breakthrough(){
  if(isMax())return;const nr=nrd();if(P.exp<nr.exp)return;
  // 天劫判定
  const baseRate=P.realm<4?.8:.5; // 炼气80%，筑基后50%
  const tribRate=Math.min(.95,baseRate+P.tribBonus);
  const success=Math.random()<tribRate;
  if(!success&&P.realm>=4){
    P.exp=Math.floor(P.exp*.7);showToast('💀 渡劫失败！修为损失30%');
    render();return;
  }
  P.realm++;P.atk=nr.atk;P.def=nr.def;P.maxHp=nr.hp;P.maxSp=nr.sp;P.hp=nr.hp;P.sp=nr.sp;
  P.gold+=P.realm*40;P.innerDemonDefeated=false;
  const msgs=['天地轰鸣，灵气疯狂涌入体内！','周身金光大放，境界壁垒轰然破碎！','天道垂青，一道仙光笼罩全身！'];
  showToast(`⚡ ${msgs[Math.floor(Math.random()*msgs.length)]} → ${nr.n}！`);
  render();
}

function meditate(){const hh=Math.floor(effMaxHp()*.4);const ss=Math.floor(effMaxSp()*.5);P.hp=Math.min(effMaxHp(),P.hp+hh);P.sp=Math.min(effMaxSp(),P.sp+ss);showToast(`打坐恢复 +${hh}气血 +${ss}灵力`);render();}
function addTalent(t){if(P.talentPts<=0)return;P.talents[t]++;P.talentPts--;showToast(`${t}+1 → Lv.${P.talents[t]}`);render();}
function openMeridian(n){const m=MERIDIANS.find(k=>k.n===n);if(!m||P.gold<m.cost)return;P.gold-=m.cost;P.meridians.push(n);showToast(`✅ 打通${n}！${m.desc}`);render();}

function fightInnerDemon(){
  const demon={hp:Math.floor(effAtk()*.8*5),atk:Math.floor(effAtk()*.6),def:Math.floor(effDef()*.5),n:'心魔'};
  let pHp=effMaxHp(),dHp=demon.hp,log=[];
  for(let r=1;r<=20;r++){
    const pd=Math.max(1,effAtk()-demon.def+Math.floor(Math.random()*8));dHp-=pd;
    log.push(`第${r}回合: 你造成 ${pd} 伤害`);
    if(dHp<=0){P.innerDemonDefeated=true;P.talentPts+=2;P.exp+=Math.floor(nrd().exp*.2);
      showToast(`👹 战胜心魔！天赋+2,修为大涨`);render();return;}
    const md=Math.max(1,demon.atk-effDef()+Math.floor(Math.random()*6));pHp-=md;
    log.push(`心魔反击 ${md} 伤害`);
    if(pHp<=0){P.hp=1;showToast('💀 被心魔击败…需要更强实力');render();return;}
  }
  showToast('战斗僵持…心魔暂时退去');
  render();
}
function upgradeBeast(){if(!P.beast||P.gold<100)return;P.gold-=100;P.beastLv++;showToast(`🐾 ${P.beast.n}升级到 Lv.${P.beastLv}`);render();}

// ==================== 历练 ====================
function rBattle(){
  if(battleState){rBattleActive();return;}
  const ms=getMonsters();let h=`<div class="card"><h3>⚔️ 历练</h3><div class="sub">选择敌人进行战斗 ${P.beast?'| 🐾'+P.beast.icon+P.beast.n+'助战':''}</div></div>`;
  ms.forEach((m,i)=>{h+=`<div class="card" style="cursor:pointer" onclick="startBattle(${i})">
    <div style="display:flex;align-items:center;gap:8px"><span style="font-size:1.5rem">${m.icon}</span>
    <div style="flex:1"><strong>${m.n}</strong><div style="font-size:.55rem;color:rgba(200,180,140,.4)">❤️${m.hp} ⚔️${m.atk} 🛡️${m.def} | 胜:${m.exp}修 💎${m.gold}</div></div></div></div>`;});
  content.innerHTML=h;
}

function startBattle(i){
  const m=getMonsters()[i];battleState={m,log:[`⚔️ 遭遇 <strong>${m.n}</strong>！`],pHp:effMaxHp(),mHp:m.hp};
  if(hasSkill('fenghuo')||firstStrikeChance()>.5){const d=Math.max(1,effAtk()-m.def+Math.floor(Math.random()*8));battleState.mHp-=d;battleState.log.push(`<span class="hit">🔥 先手！${d}伤害</span>`);}
  P.hp=effMaxHp();render();}

function rBattleActive(){
  const bs=battleState,m=bs.m;let h=`<div class="card" style="text-align:center"><div style="font-size:2rem">${m.icon}</div><h3>${m.n}</h3>
    <div class="row"><span>敌方 ❤️${Math.max(0,bs.mHp)}</span><span>我方 ❤️${bs.pHp}</span></div>
    <div class="progress"><div class="hp" style="width:${Math.max(0,Math.floor(bs.mHp/m.hp*100))}%"></div></div></div>
    <button class="btn pri" onclick="battleTurn('atk')" ${bs.mHp<=0||bs.pHp<=0?'disabled':''}>⚔️ 攻击</button>
    <button class="btn ok" onclick="battleTurn('skill')" ${bs.mHp<=0||bs.pHp<=0?'disabled':''}>✨ 全力一击</button>
    <button class="btn dan" onclick="battleState=null;render();">🏃 逃跑</button>
    <div class="card"><h3>战斗记录</h3><div id="battle-log">${bs.log.slice(-6).join('<br>')}</div></div>`;
  content.innerHTML=h;
  if(bs.mHp<=0)bWin();else if(bs.pHp<=0)bLose();
}

function battleTurn(type){
  const bs=battleState,m=bs.m;let crit=Math.random()<critChance();
  let dmg=Math.max(1,effAtk()-m.def+(type==='skill'?Math.floor(effAtk()*.5):0));
  if(crit)dmg=Math.floor(dmg*2);bs.mHp-=dmg;
  // 灵兽助战
  if(P.beast){const bd=Math.floor(P.beast.atk*(1+P.beastLv*.2));bs.mHp-=bd;bs.log.push(`🐾 ${P.beast.n}助战 +${bd}伤害`);}
  bs.log.push(`${type==='skill'?'✨全力一击':'⚔️攻击'} ${dmg}伤害${crit?' 💥暴击！':''}`);
  if(bs.mHp<=0){render();return;}
  const md=Math.max(1,m.atk-effDef()+Math.floor(Math.random()*5));bs.pHp-=md;
  if(P.beast){const bd2=Math.floor(P.beast.def*(1+P.beastLv*.1));bs.pHp+=bd2;}
  bs.log.push(`${m.n}反击 ${md}伤害`);bs.pHp=Math.max(0,bs.pHp);
  P.hp=bs.pHp;if(bs.pHp<=0){render();return;}render();
}

function bWin(){
  const bs=battleState,m=bs.m;const g=Math.floor(m.gold*(1+dropBonus()));P.gold+=g;P.exp+=m.exp;
  P.hp=Math.max(1,bs.pHp);P.lv=Math.floor(P.exp/30)+1;bs.log.push(`<span class="gold">🎉 胜利！修+${m.exp} 💎+${g}</span>`);
  for(const d of(m.drops||[])){if(Math.random()<d.r+dropBonus()*.3){P.mats[d.n]=(P.mats[d.n]||0)+d.q;bs.log.push(`<span class="gold">📦 ${d.n}×${d.q}</span>`);}}
  if(Math.random()<.1+dropBonus()*.2&&P.realm>=4){const eq=genEquip();P.bag.push(eq);bs.log.push(`<span class="gold">⚡ 掉落装备: ${eq.icon}${eq.n}</span>`);}
  bs.mHp=-1;render();setTimeout(()=>{battleState=null;render();},2500);
}
function bLose(){battleState.pHp=0;P.hp=Math.floor(effMaxHp()*.15);battleState.log.push('<span class="hit">💀 战败…</span>');render();setTimeout(()=>{battleState=null;render();},2000);}

// ==================== 宗门 ====================
function rSect(){
  let h=`<div class="card"><h3>🏛️ 宗门</h3>`;
  if(!P.sect){
    h+=`<div class="sub">选择一个宗门加入</div>
    <button class="btn pri" onclick="joinSect('太虚门')">🏔️ 太虚门 (正道·均衡发展)</button>
    <button class="btn" onclick="joinSect('魔渊殿')">🩸 魔渊殿 (魔道·战力至上)</button>
    <button class="btn" onclick="joinSect('散修联盟')">🏕️ 散修联盟 (自由·机缘深厚)</button>`;
  }else{
    const sectDescs={太虚门:'正道大派，讲究道法自然',魔渊殿:'魔道巨擘，实力为尊',散修联盟:'散修聚集，自由随性'};
    h+=`<h3>${P.sect}</h3><div class="sub">${sectDescs[P.sect]||''} | 贡献: ${P.sectContrib}</div>
    <div class="card"><h3>📋 宗门任务</h3><div class="sub">${missionActive?`任务进行中: ${missionActive.n} (剩余${missionActive.rem}回合)`:'选择一个任务执行'}</div>`;
    if(missionActive){
      h+=`<button class="btn pri" onclick="doMission()">执行任务 (${missionActive.rem}回合)</button>`;
    }else{
      for(const m of SECT_MISSIONS){h+=`<div class="row"><span>${m.n}</span><span style="font-size:.55rem;color:rgba(200,180,140,.4)">${m.desc} (${m.d}回合)</span><button class="btn-sm" onclick="startMission('${m.n}')">接取</button></div>`;}
    }
    h+=`</div>
    <div class="card"><h3>🏪 宗门兑换</h3>`;
    for(const item of SECT_SHOP){
      h+=`<div class="row"><span>${item.icon} ${item.n}</span><span style="font-size:.55rem">${item.desc}</span><button class="btn-sm" onclick="buySectItem('${item.n}')" ${P.sectContrib>=item.cost?'':'disabled'}>🏅${item.cost}</button></div>`;
    }
    h+=`</div>`;
  }
  h+=`</div>`;content.innerHTML=h;
}

function joinSect(n){P.sect=n;P.sectContrib=20;showToast(`✅ 加入${n}！获得初始贡献20`);render();}
function startMission(n){const m=SECT_MISSIONS.find(k=>k.n===n);if(!m)return;missionActive={...m,rem:m.d};showToast(`📋 接取任务: ${m.n}`);render();}
function doMission(){if(!missionActive)return;missionActive.rem--;
  if(missionActive.rem<=0){const m=missionActive;P.gold+=m.rew.gold||0;P.exp+=m.rew.exp||0;P.sectContrib+=m.rew.contrib||0;
    if(m.rew.mats)for(const mt of m.rew.mats)P.mats[mt.n]=(P.mats[mt.n]||0)+mt.q;
    P.completedMissions++;P.lv=Math.floor(P.exp/30)+1;showToast(`✅ 任务完成！+${m.rew.gold}💎 +${m.rew.contrib}贡献`);missionActive=null;}
  render();}
function buySectItem(n){
  const item=SECT_SHOP.find(k=>k.n===n);if(!item||P.sectContrib<item.cost)return;
  if(item.type==='skill'){const avail=SKILLS.filter(s=>!hasSkill(s.id));if(avail.length>0){const s=avail[Math.floor(Math.random()*avail.length)];P.skills.push(s.id);showToast(`📜 习得 ${s.n}！`);}}
  else if(item.type==='trib_item'){P.tribBonus+=item.v;showToast(`⚡ 渡劫率+${Math.floor(item.v*100)}%`);}
  else if(item.type==='equip'){const eq=genEquip();P.bag.push(eq);showToast(`🗡️ 获得 ${eq.icon}${eq.n}`);}
  else if(item.type==='beast_egg'){const b=BEASTS[Math.floor(Math.random()*BEASTS.length)];P.beast={...b};P.beastLv=1;showToast(`🥚 孵化成功！获得 ${b.icon}${b.n}`);}
  else if(item.type==='meridian'){const avail=MERIDIANS.filter(m=>!P.meridians.includes(m.n));if(avail.length>0){const m=avail[Math.floor(Math.random()*avail.length)];P.meridians.push(m.n);showToast(`🧬 打通 ${m.n}！`);}}
  P.sectContrib-=item.cost;render();
}

// ==================== 丹器 ====================
function rCraft(){
  let h=`<div class="card"><h3>⚒️ 炼丹炼器</h3><div class="sub">材料: `;
  for(const[k,v]of Object.entries(P.mats))if(v>0)h+=`${k}×${v} `;
  h+=`</div></div><div class="card"><h3>🧪 炼丹</h3>`;
  for(const rcp of ALCHEMY_RECIPES){
    const can=rcp.mats.every(m=>(P.mats[m.n]||0)>=m.q);
    h+=`<div class="row"><span>${rcp.icon} ${rcp.n}</span><span style="font-size:.5rem;color:rgba(200,180,140,.4)">${rcp.desc} | ${rcp.mats.map(m=>m.n+'×'+m.q).join(',')}</span><button class="btn-sm ok" onclick="craftAlchemy('${rcp.id}')" ${can?'':'disabled'}>炼制</button></div>`;
  }
  h+=`</div><div class="card"><h3>🛡️ 装备栏</h3>`;
  for(const slot of EQ_SLOTS){
    const eq=P.equipment[slot];
    h+=`<div class="row"><span>${slot}</span><span style="font-size:.55rem">${eq?`${eq.icon}${eq.n} ⚔️${eq.atk||0} 🛡️${eq.def||0} ❤️${eq.hp||0}`:'空'}</span><button class="btn-sm" onclick="unequip('${slot}')" ${!eq?'disabled':''}>卸下</button></div>`;
  }
  h+=`</div><div class="card"><h3>🎒 背包 (${P.bag.length}件)</h3><div class="grid2">`;
  for(let i=0;i<P.bag.length;i++){
    const item=P.bag[i];
    if(item.equipSlot)h+=`<div class="card" style="padding:8px;cursor:pointer" onclick="equipItem(${i})">${item.icon} ${item.n}<div class="sub">⚔${item.atk||0} 🛡${item.def||0} ❤${item.hp||0}</div></div>`;
    else h+=`<div class="card" style="padding:8px;cursor:pointer" onclick="useBagItem(${i})">${item.icon||'📦'} ${item.n}<div class="sub">${item.desc||''}</div></div>`;
  }
  if(P.bag.length===0)h+=`<div class="sub">空空如也</div>`;
  h+=`</div></div></div>`;content.innerHTML=h;
}

function craftAlchemy(id){
  const rcp=ALCHEMY_RECIPES.find(r=>r.id===id);if(!rcp)return;
  if(!rcp.mats.every(m=>(P.mats[m.n]||0)>=m.q))return;
  for(const m of rcp.mats)P.mats[m.n]-=m.q;
  const item={...rcp,type:rcp.act,v:rcp.v};P.bag.push(item);showToast(`🧪 炼制成功: ${rcp.n}`);render();
}
function useBagItem(i){
  const it=P.bag[i];if(!it||it.equipSlot)return;
  if(it.act==='heal'){P.hp=Math.min(effMaxHp(),P.hp+Math.floor(effMaxHp()*it.v));P.bag.splice(i,1);showToast('使用 '+it.n);}
  else if(it.act==='exp'){P.exp+=Math.floor((nrd().exp-rd().exp)*it.v);P.lv=Math.floor(P.exp/30)+1;P.bag.splice(i,1);showToast('使用 '+it.n);}
  else if(it.act==='sp'){P.sp=Math.min(effMaxSp(),P.sp+it.v);P.bag.splice(i,1);showToast('使用 '+it.n);}
  else if(it.act==='patk'){P.permAtk+=it.v;P.bag.splice(i,1);showToast('永攻+'+it.v);}
  else if(it.act==='pdef'){P.permDef+=it.v;P.bag.splice(i,1);showToast('永防+'+it.v);}
  else if(it.act==='php'){P.permHp+=it.v;P.bag.splice(i,1);showToast('永血+'+it.v);}
  else if(it.act==='trib'){P.tribBonus+=it.v;P.bag.splice(i,1);showToast('渡劫率+'+Math.floor(it.v*100)+'%');}
  render();
}
function equipItem(i){const it=P.bag[i];if(!it||!it.equipSlot)return;const slot=it.equipSlot;const old=P.equipment[slot];P.equipment[slot]=it;P.bag.splice(i,1);if(old)P.bag.push(old);showToast(`装备: ${it.n}`);render();}
function unequip(slot){const eq=P.equipment[slot];if(!eq)return;P.bag.push(eq);P.equipment[slot]=null;showToast(`卸下: ${eq.n}`);render();}

function genEquip(){
  const prefixes=['凡品','良品','上品','极品','仙品'];const rarities=['⚪','🟢','🔵','🟣','🟠'];
  const ri=Math.floor(Math.random()*5);const mult=1+ri*.4;
  const slots=EQ_SLOTS;const slot=slots[Math.floor(Math.random()*slots.length)];
  const names={武器:['铁剑','青锋','玄铁重剑','斩龙剑','诛仙剑'],防具:['布衣','皮甲','铁铠','灵纹甲','玄武神甲'],头盔:['布巾','铁盔','灵角盔','紫金冠','太虚冠'],戒指:['铜环','银戒','灵玉戒','乾坤戒','混沌戒'],项链:['石坠','玉坠','灵晶链','龙魂链','天命链'],靴子:['草鞋','皮靴','疾风靴','踏云靴','缩地靴']};
  const n=names[slot][ri];const icon=rarities[ri];
  return {n:`[${prefixes[ri]}] ${n}`,icon,equipSlot:slot,atk:Math.floor((4+ri*5)*mult),def:Math.floor((3+ri*4)*mult),hp:Math.floor((10+ri*15)*mult),desc:`${slot} · ${prefixes[ri]}`};
}

// ==================== 功法 ====================
function rMore(){
  let h=`<div class="card"><h3>📿 功法阁</h3><div class="sub">已习得: ${P.skills.length}门</div></div>`;
  for(const s of SKILLS){
    const learned=hasSkill(s.id);
    h+=`<div class="card"><div class="row"><span>${s.icon} ${s.n} ${learned?'✅':''}</span>${learned?'':`<button class="btn-sm" onclick="learnSkill('${s.id}')" ${P.gold>=s.cost?'':'disabled'}>💎${s.cost}</button>`}</div><div class="sub">${s.desc}</div></div>`;
  }
  h+=`<div class="card"><h3>🛒 坊市</h3><div class="sub">灵石: 💎${P.gold}</div></div>`;
  for(const item of SHOP_ITEMS){
    h+=`<div class="card"><div class="row"><span>${item.icon} ${item.n}</span><button class="btn-sm" onclick="buyShopItem('${item.id}')" ${P.gold>=item.cost?'':'disabled'}>💎${item.cost}</button></div><div class="sub">${item.desc}</div></div>`;
  }
  content.innerHTML=h;
}

function learnSkill(id){const sk=SKILLS.find(s=>s.id===id);if(!sk||P.gold<sk.cost)return;P.gold-=sk.cost;P.skills.push(id);showToast(`✅ 习得 ${sk.n}！`);render();}
function buyShopItem(id){const item=SHOP_ITEMS.find(i=>i.id===id);if(!item||P.gold<item.cost)return;P.gold-=item.cost;P.bag.push({...item,act:item.type,v:item.v,icon:item.icon,n:item.n,desc:item.desc});showToast(`✅ 购买 ${item.n}`);render();}

// ==================== 初始化 ====================
function render(){uh();switch(currentTab){
  case'home':rHome();break;case'battle':rBattle();break;
  case'sect':rSect();break;case'craft':rCraft();break;case'more':rMore();break;
}save();}

// 自动修炼 & 宗门计时
setInterval(()=>{
  if(currentTab==='home'){
    P.exp+=Math.floor(3*expBonus());P.sp=Math.min(effMaxSp(),P.sp+1);P.lv=Math.floor(P.exp/30)+1;
    if(P.lv%5===0&&P.lv>0&&P.talentPts<Math.floor(P.lv/5))P.talentPts++;
  }
  if(missionActive){
    missionActive.rem-=0.1;
    if(missionActive.rem<=0){const m=missionActive;P.gold+=m.rew.gold||0;P.exp+=m.rew.exp||0;P.sectContrib+=m.rew.contrib||0;if(m.rew.mats)for(const mt of m.rew.mats)P.mats[mt.n]=(P.mats[mt.n]||0)+mt.q;P.completedMissions++;missionActive=null;showToast('✅ 宗门任务完成！');}
  }
  save();
},8000);

render();
</script>
