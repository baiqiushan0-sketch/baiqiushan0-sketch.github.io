<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>仙途 · 文字修仙</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d1a;color:#c8b896;font-family:'PingFang SC','Microsoft YaHei',serif;overflow:hidden;height:100vh;user-select:none;-webkit-user-select:none;touch-action:manipulation}
#app{display:flex;flex-direction:column;height:100vh;max-width:500px;margin:0 auto;position:relative}

/* Top Bar */
#topbar{background:linear-gradient(180deg,rgba(15,10,25,.98),rgba(10,8,20,.95));padding:6px 10px;border-bottom:1px solid rgba(180,140,80,.08);flex-shrink:0;text-align:center}
#topbar .realm{font-size:1.1rem;font-weight:bold;background:linear-gradient(180deg,#ffd700,#b8860b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#topbar .bars{display:flex;justify-content:center;gap:10px;font-size:.5rem;color:rgba(200,180,140,.4);margin-top:1px}
#topbar .bars span{color:rgba(200,180,140,.6)}
#topbar .layer{font-size:.5rem;color:rgba(200,180,140,.3)}

/* Grid Map */
#map-wrap{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
#map{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;padding-bottom:60px}
.cell{aspect-ratio:1;border-radius:8px;background:rgba(20,18,35,.6);border:1px solid rgba(180,140,80,.05);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:1.4rem;cursor:pointer;transition:all .15s;position:relative;gap:0}
.cell:active{transform:scale(.92);background:rgba(180,140,80,.1)}
.cell.done{opacity:.35;pointer-events:none}
.cell.current{border-color:rgba(0,229,255,.4);box-shadow:0 0 8px rgba(0,229,255,.1)}
.cell .mark{position:absolute;top:2px;right:3px;font-size:.35rem;color:rgba(255,255,255,.2)}
.cell .label{font-size:.4rem;color:rgba(200,180,140,.35);line-height:1;margin-top:-2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.cell .hp-bar{position:absolute;bottom:2px;left:2px;right:2px;height:2px;background:rgba(255,255,255,.05);border-radius:1px}
.cell .hp-bar div{height:100%;background:#e57373;border-radius:1px}

/* Player marker */
#player-marker{background:rgba(0,229,255,.15)!important;border-color:rgba(0,229,255,.4)!important;font-size:.8rem!important}

/* Bottom panel */
#bpanel{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:rgba(10,8,20,.97);border-top:1px solid rgba(180,140,80,.08);padding:6px 10px;z-index:10;display:flex;gap:4px}
#bpanel button{flex:1;padding:8px 2px;background:rgba(180,140,80,.05);border:1px solid rgba(180,140,80,.1);color:rgba(200,180,140,.5);font-size:.55rem;border-radius:6px;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:1px;transition:all .2s}
#bpanel button:active{background:rgba(180,140,80,.12)}
#bpanel button .bi{font-size:.9rem}

/* Modal */
#modal{position:fixed;top:0;left:0;width:100%;height:100%;z-index:50;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center}
#modal.hidden{display:none}
.modal-in{background:#1a1530;border:1px solid rgba(180,140,80,.15);border-radius:12px;padding:20px;max-width:360px;width:90%;max-height:80vh;overflow-y:auto;text-align:center}
.modal-in h2{color:#ffd700;font-size:1rem;margin-bottom:8px}
.modal-in p{font-size:.7rem;color:rgba(200,180,140,.5);line-height:1.7;margin-bottom:12px}
.modal-in .btn{margin:4px 0}

.btn{display:block;width:100%;padding:10px;margin:4px 0;border-radius:7px;border:1px solid rgba(180,140,80,.15);background:rgba(180,140,80,.06);color:#d4b060;font-size:.7rem;cursor:pointer;transition:all .2s;font-family:inherit;text-align:center;letter-spacing:1px}
.btn:active{transform:scale(.97)}
.btn.pri{background:rgba(180,140,80,.12);border-color:rgba(180,140,80,.35);color:#ffd700;font-weight:bold}
.btn.dan{background:rgba(200,50,50,.08);border-color:rgba(200,50,50,.2);color:#e57373}
.btn.ok{background:rgba(50,180,80,.08);border-color:rgba(50,180,80,.2);color:#81c784}
.btn.cy{background:rgba(0,200,255,.08);border-color:rgba(0,200,255,.2);color:#4dd0e1}

.row{display:flex;justify-content:space-between;align-items:center;font-size:.65rem;margin:3px 0}
.progress{height:4px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden;margin:2px 0}
.progress div{height:100%;border-radius:2px;transition:width .3s}
.progress .exp{background:linear-gradient(90deg,#b8860b,#ffd700)}
.progress .hp{background:linear-gradient(90deg,#c62828,#ef5350)}

#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:60;padding:8px 18px;border-radius:20px;font-size:.65rem;color:#ffd700;background:rgba(15,10,25,.95);border:1px solid rgba(180,140,80,.25);opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}

#back-link{position:fixed;top:8px;left:8px;z-index:5}
#back-link a{color:rgba(200,180,140,.15);text-decoration:none;font-size:.5rem}

.battle-log{font-size:.55rem;color:rgba(200,180,140,.4);line-height:1.7;max-height:150px;overflow-y:auto;text-align:left}
.battle-log .hit{color:#e57373}.battle-log .heal{color:#81c784}.battle-log .gold{color:#ffd700}
</style>
</head>
<body>

<div id="app">
<div id="topbar">
  <div class="realm" id="hdr-realm">凡人</div>
  <div class="bars">
    <span>⚔️<span id="hdr-atk">3</span></span>
    <span>🛡️<span id="hdr-def">1</span></span>
    <span>❤️<span id="hdr-hp">40</span></span>
    <span>💎<span id="hdr-gold">0</span></span>
  </div>
  <div class="layer">第 <span id="hdr-layer">1</span> 层</div>
</div>
<div id="map-wrap"><div id="map"></div></div>
<div id="bpanel">
  <button onclick="openChar()"><span class="bi">👤</span>人物</button>
  <button onclick="openSkills()"><span class="bi">📜</span>功法</button>
  <button onclick="openBag()"><span class="bi">🎒</span>背包</button>
  <button onclick="openBeast()"><span class="bi">🐾</span>灵兽</button>
  <button onclick="openShop()"><span class="bi">🏪</span>坊市</button>
</div>
</div>

<div id="modal" class="hidden"><div class="modal-in" id="modal-in"></div></div>
<div id="toast"></div>
<div id="back-link"><a href="../index.html">← 返回合集</a></div>

<script>
// ==================== 数据 ====================
const REALMS=[
  {n:'凡人',exp:0,atk:2,def:1,hp:30,layer:0},{n:'炼气一层',exp:60,atk:5,def:2,hp:50,layer:5},
  {n:'炼气三层',exp:180,atk:10,def:4,hp:80,layer:12},{n:'炼气六层',exp:420,atk:18,def:7,hp:130,layer:20},
  {n:'炼气九层',exp:850,atk:32,def:12,hp:200,layer:30},{n:'筑基初期',exp:1700,atk:58,def:22,hp:340,layer:42},
  {n:'筑基中期',exp:3600,atk:100,def:38,hp:550,layer:55},{n:'筑基后期',exp:7000,atk:170,def:65,hp:880,layer:70},
  {n:'结丹初期',exp:14000,atk:290,def:110,hp:1400,layer:88},{n:'结丹中期',exp:28000,atk:490,def:190,hp:2300,layer:108},
  {n:'结丹后期',exp:55000,atk:820,def:320,hp:3700,layer:130},{n:'元婴初期',exp:110000,atk:1380,def:540,hp:6000,layer:155},
  {n:'元婴中期',exp:220000,atk:2300,def:900,hp:9800,layer:182},{n:'元婴后期',exp:430000,atk:3800,def:1500,hp:16000,layer:210},
  {n:'化神期',exp:850000,atk:6300,def:2500,hp:27000,layer:245},{n:'炼虚期',exp:1700000,atk:10500,def:4200,hp:45000,layer:285},
  {n:'合体期',exp:3400000,atk:17500,def:7000,hp:75000,layer:330},{n:'大乘期',exp:6800000,atk:29000,def:11800,hp:125000,layer:385},
  {n:'渡劫期',exp:13600000,atk:48000,def:19600,hp:210000,layer:450},{n:'地仙',exp:99999999,atk:80000,def:33000,hp:500000,layer:520},
];

const PATHS={spirit:{n:'精修',desc:'战斗前降低敌方20%攻击',icon:'🧠',eff:{enemyAtkDebuff:.2}},
  magic:{n:'法修',desc:'修炼速度+50%',icon:'🔮',eff:{expBonus:.5}},
  body:{n:'体修',desc:'气血翻倍，战后恢复30%',icon:'💪',eff:{hpDouble:true,healAfter:.3}}};

const BEASTS=[{n:'汐极鱼',icon:'🐟',type:'assist',desc:'修炼速度+30%',eff:{expBonus:.3},deployDesc:'修炼时自动加成'},
  {n:'青梧貂',icon:'貂',type:'spirit',desc:'战斗前降低敌方10%攻击',eff:{enemyAtkDebuff:.1},deployDesc:'⚠️ 战斗点击出战生效'},
  {n:'赤阳岩兽',icon:'🦎',type:'heal',desc:'战斗后恢复10%最大气血',eff:{healAfter:.1},deployDesc:'⚠️ 战斗点击出战生效'}];

const SKILLS=[{n:'吐纳术',grade:'黄阶下品',atk:3,def:2,hp:5,cost:60,icon:'🫁',lvl:1,maxLvl:9},
  {n:'铁布衫',grade:'黄阶中品',atk:0,def:8,hp:10,cost:100,icon:'🛡️',lvl:1,maxLvl:9},
  {n:'金刚掌',grade:'玄阶下品',atk:12,def:3,hp:0,cost:200,icon:'✋',lvl:1,maxLvl:9},
  {n:'天罡剑气',grade:'玄阶上品',atk:25,def:0,hp:0,cost:400,icon:'⚔️',lvl:1,maxLvl:9},
  {n:'紫血御诀',grade:'地阶中品',atk:5,def:20,hp:30,cost:800,icon:'🩸',lvl:1,maxLvl:9},
  {n:'纵横狱般若罩',grade:'天阶上品',atk:0,def:45,hp:50,cost:1500,icon:'🔮',lvl:1,maxLvl:9},
  {n:'太虚剑意',grade:'圣阶下品',atk:60,def:10,hp:20,cost:3000,icon:'🗡️',lvl:1,maxLvl:9},
  {n:'混沌吞天诀',grade:'帝阶中品',atk:100,def:30,hp:80,cost:8000,icon:'🌌',lvl:1,maxLvl:9}];

const EQUIP_TEMPLATES=[{n:'铁剑',atk:5,icon:'🗡️',cost:80},{n:'青锋剑',atk:15,icon:'⚔️',cost:200},
  {n:'斩龙刀',atk:50,icon:'🔪',cost:600},{n:'玄铁重剑',atk:120,icon:'⛏️',cost:1500},
  {n:'名刀·离',atk:300,icon:'🗡️',cost:4000},{n:'人皇剑',atk:800,icon:'👑',cost:15000}];

const CELL_TYPES={
  train:{icon:'🧘',n:'修炼点',desc:'灵气充沛之地，适合修炼'},
  enemy:{icon:'👹',n:'妖兽',desc:'前方有妖兽出没'},
  treasure:{icon:'📦',n:'宝箱',desc:'不知何人遗留的宝箱'},
  shop:{icon:'🏪',n:'行脚商',desc:'游历四方的行脚商人'},
  secret:{icon:'🏛️',n:'秘境',desc:'上古修士遗留的洞府秘境'},
  boss:{icon:'💀',n:'守护者',desc:'此层的镇守BOSS'},
  beast:{icon:'🐾',n:'灵兽',desc:'一只灵兽在此徘徊'},
  equip:{icon:'🗡️',n:'遗物',desc:'前人留下的兵器'},
  skill:{icon:'📜',n:'功法碑',desc:'刻有功法口诀的石碑'},
  adventure:{icon:'🎲',n:'奇遇',desc:'意想不到的事情发生了'},
  legacy:{icon:'🏛️',n:'传承',desc:'远古大能的传承之地'},
  partner:{icon:'💕',n:'道侣',desc:'一位修士在此等候'},
  furnace:{icon:'🧪',n:'炼丹炉',desc:'一座古老的炼丹炉'},
  mine:{icon:'⛏️',n:'灵矿脉',desc:'裸露的灵石矿脉'},
  spring:{icon:'🌊',n:'灵泉',desc:'涌动着灵气的泉水'},
  ruin:{icon:'🏚️',n:'遗迹',desc:'远古宗门的废墟'},
  tribulation:{icon:'⚡',n:'渡劫台',desc:'古人渡劫留下的法台'},
  stele:{icon:'📖',n:'悟道碑',desc:'刻满大道符文的古碑'},
  garden:{icon:'🌿',n:'药园',desc:'野生灵药生长的园圃'},
  demon:{icon:'👺',n:'心魔',desc:'内心深处的执念所化'},
  empty:{icon:'·',n:'空地',desc:''}};

// ==================== 玩家 ====================
let P={name:'无名修士',realm:0,exp:0,hp:40,maxHp:40,atk:2,def:1,gold:100,
  path:'',equippedWeapon:null,equippedSkills:[],beast:null,beastDeployed:false,
  layer:0,currentLayer:0,maxLayer:0,mapCells:[],playerPos:0,cultivationCount:0,
  permAtk:0,permDef:0,permHp:0,kills:0};

function save(){localStorage.setItem('xiutu3_save',JSON.stringify(P));}
function load(){try{const d=JSON.parse(localStorage.getItem('xiutu3_save'));if(d)Object.assign(P,d);}catch(e){}}
load();
if(!localStorage.getItem('xiutu3_inited')){
  P.name=(prompt('请输入道号：','无名修士')||'无名修士').substring(0,8);
  localStorage.setItem('xiutu3_inited','1');save();
}

function rd(){return REALMS[Math.min(P.realm,REALMS.length-1)];}
function nrd(){return REALMS[Math.min(P.realm+1,REALMS.length-1)];}
function isMax(){return P.realm>=REALMS.length-1;}

// 计算属性
function effAtk(){let a=P.atk+P.permAtk+(P.equippedWeapon?P.equippedWeapon.atk:0);
  for(const s of(P.equippedSkills||[]))if(s)a+=s.atk*s.lvl;return a;}
function effDef(){let d=P.def+P.permDef;for(const s of(P.equippedSkills||[]))if(s)d+=s.def*s.lvl;return d;}
function effMaxHp(){let h=P.maxHp+P.permHp;for(const s of(P.equippedSkills||[]))if(s)h+=s.hp*s.lvl;
  if(P.path==='body')h*=2;return h;}
function expBonus(){let b=1;if(P.path==='magic')b+=.5;
  if(P.beast&&P.beast.type==='assist')b+=P.beast.eff.expBonus;return b;}
function healAfterBattle(){if(P.path==='body')return.3;if(P.beastDeployed&&P.beast&&P.beast.type==='heal')return P.beast.eff.healAfter;return 0;}

// ==================== 地图生成 ====================
function genMap(){
  P.mapCells=[];
  const pool=['train','train','enemy','enemy','treasure','shop','secret','beast','equip','skill',
    'adventure','legacy','partner','furnace','mine','spring','ruin','tribulation','stele','garden','demon'];
  for(let i=0;i<800;i++){
    let type=pool[Math.floor(Math.random()*pool.length)];
    if(i>0&&i%20===0)type='boss';
    P.mapCells.push({type,done:false});
  }
}

function cellAt(idx){return P.mapCells[idx]||{type:'empty',done:true};}

// ==================== UI ====================
const mapEl=document.getElementById('map'),modal=document.getElementById('modal');
const modalIn=document.getElementById('modal-in'),toast=document.getElementById('toast');
const mapWrap=document.getElementById('map-wrap');
let battleBS=null,secretStep=0;

function showToast(msg){toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);}
function nval(v){return v<1000?String(v):v<1000000?(v/1000).toFixed(1)+'K':(v/1000000).toFixed(1)+'M';}
function showModal(title,body,buttons){
  modalIn.innerHTML=`<h2>${title}</h2><div>${body}</div>${buttons.map((b,i)=>`<button class="btn ${b.cls||''}" id="modal-btn-${i}">${b.text}</button>`).join('')}`;
  modal.classList.remove('hidden');
  buttons.forEach((b,i)=>{document.getElementById('modal-btn-'+i).onclick=()=>{modal.classList.add('hidden');if(b.fn)b.fn();};});
}
modal.addEventListener('click',e=>{if(e.target===modal)modal.classList.add('hidden');});

function uh(){
  document.getElementById('hdr-realm').textContent=rd().n+(P.path?` [${PATHS[P.path].n}]`:'');
  document.getElementById('hdr-atk').textContent=nval(effAtk());
  document.getElementById('hdr-def').textContent=nval(effDef());
  document.getElementById('hdr-hp').textContent=nval(P.hp)+'/'+nval(effMaxHp());
  document.getElementById('hdr-gold').textContent=nval(P.gold);
  document.getElementById('hdr-layer').textContent=P.currentLayer+1;
}

function renderMap(){
  uh();mapEl.innerHTML='';
  const start=P.currentLayer*5,end=start+50; // 显示10行
  for(let i=start;i<Math.min(end,P.mapCells.length);i++){
    const c=cellAt(i);const div=document.createElement('div');
    div.className='cell'+(c.done?' done':'')+(i===P.playerPos?' current':'');
    div.innerHTML=`<span>${CELL_TYPES[c.type].icon}</span><span class="label">${CELL_TYPES[c.type].n}</span>`;
    if(i===P.playerPos){div.id='player-marker';div.innerHTML='<span>🧘</span><span class="label">你在这里</span>';}
    if(!c.done)div.onclick=()=>moveTo(i);
    // Mark done cells
    if(c.done)div.innerHTML+=`<span class="mark">✓</span>`;
    mapEl.appendChild(div);
  }
  // 滚动到玩家位置
  setTimeout(()=>{
    const pm=document.getElementById('player-marker');
    if(pm)pm.scrollIntoView({behavior:'smooth',block:'center'});
  },100);
}

function moveTo(idx){
  if(idx<P.playerPos||cellAt(idx).done)return;
  P.playerPos=idx;P.currentLayer=Math.floor(idx/5);
  if(P.currentLayer>P.maxLayer)P.maxLayer=P.currentLayer;
  encounter(idx);renderMap();save();
}

function encounter(idx){
  const c=cellAt(idx);if(c.done)return;
  const handlers={
    train:doTrain,enemy:doBattle,treasure:doTreasure,shop:doShopEnc,secret:doSecret,
    boss:doBoss,beast:doBeastEnc,equip:doEquipEnc,skill:doSkillEnc,
    adventure:doAdventure,legacy:doLegacy,partner:doPartner,furnace:doFurnace,
    mine:doMine,spring:doSpring,ruin:doRuin,tribulation:doTribulation,
    stele:doStele,garden:doGarden,demon:doDemon
  };
  if(handlers[c.type])handlers[c.type](idx);
  else doTrain(idx);
}

// ==================== 事件 ====================
function completeCell(idx){P.mapCells[idx].done=true;renderMap();}

function doTrain(idx){
  const gain=Math.floor((15+P.realm*5)*expBonus());
  P.exp+=gain;P.hp=Math.min(effMaxHp(),P.hp+Math.floor(effMaxHp()*.05));
  P.cultivationCount++;
  // 自动突破判定
  if(!isMax()&&P.exp>=nrd().exp){
    const nr=nrd();P.realm++;P.atk=nr.atk;P.def=nr.def;P.maxHp=nr.hp;P.hp=nr.hp;
    showToast(`⚡ 突破！→ ${nr.n}`);
  }
  showToast(`🧘 修炼 +${nval(gain)}修为`);
  completeCell(idx);
}

function doBattle(idx){
  const r=rd();const lvl=P.currentLayer;
  const enemy={n:`${['小','中','大','精英','首领'][Math.min(4,Math.floor(lvl/30))]}${['妖','魔','鬼怪','妖兽','凶兽'][Math.floor(Math.random()*5)]}`,
    hp:Math.floor((30+P.realm*20+lvl*5)*(.7+Math.random()*.6)),
    atk:Math.floor((effAtk()*.3+effAtk()*.7*Math.random())*(.5+lvl*.02)),
    def:Math.floor(effDef()*.3+lvl*.8),
    exp:Math.floor((20+P.realm*8+lvl*3)*expBonus()),
    gold:Math.floor((10+P.realm*5+lvl*2)),icon:'👹'};
  // 精修debuff
  if(P.path==='spirit')enemy.atk=Math.floor(enemy.atk*.8);
  if(P.beastDeployed&&P.beast&&P.beast.type==='spirit')enemy.atk=Math.floor(enemy.atk*.9);

  let pHp=P.hp,eHp=enemy.hp,log=[`⚔️ 遭遇 ${enemy.icon} ${enemy.n}`,''],turn=0;
  while(pHp>0&&eHp>0&&turn<30){
    turn++;const pd=Math.max(1,effAtk()-enemy.def+Math.floor(Math.random()*6));eHp-=pd;
    log.push(`${turn}. 你造成 <span class="hit">${pd}</span> 伤害`);
    if(eHp<=0){log.push(`<span class="gold">🎉 胜利！+${nval(enemy.exp)}修 +${nval(enemy.gold)}💎</span>`);break;}
    const ed=Math.max(1,enemy.atk-effDef()+Math.floor(Math.random()*4));pHp-=ed;
    log.push(`   ${enemy.n}反击 <span class="hit">${ed}</span> 伤害`);if(pHp<=0)break;
  }
  const won=eHp<=0;P.hp=Math.max(1,pHp);P.kills++;
  if(won){P.exp+=enemy.exp;P.gold+=enemy.gold;

function doBoss(idx){
  const lvl=P.currentLayer;const boss={n:`第${P.currentLayer+1}层守护者`,
    hp:Math.floor((100+P.realm*50+lvl*20)*(.8+Math.random()*.4)),
    atk:Math.floor(effAtk()*.5+lvl*3),def:Math.floor(effDef()*.5+lvl*2),
    exp:Math.floor((150+P.realm*40+lvl*15)*expBonus()),gold:Math.floor(100+P.realm*20+lvl*10),icon:'💀'};
  if(P.path==='spirit')boss.atk=Math.floor(boss.atk*.8);
  if(P.beastDeployed&&P.beast&&P.beast.type==='spirit')boss.atk=Math.floor(boss.atk*.9);

  let pHp=P.hp,eHp=boss.hp,log=[`💀 BOSS战！${boss.n}`,``],turn=0;
  while(pHp>0&&eHp>0&&turn<40){turn++;
    const pd=Math.max(1,effAtk()-boss.def+Math.floor(Math.random()*8));eHp-=pd;
    log.push(`${turn}. 你造成 <span class="hit">${pd}</span> 伤害`);
    if(eHp<=0){log.push(`<span class="gold">🎉 击败BOSS！+${nval(boss.exp)}修 +${nval(boss.gold)}💎</span>`);break;}
    const ed=Math.max(1,boss.atk-effDef()+Math.floor(Math.random()*5));pHp-=ed;
    log.push(`   BOSS反击 <span class="hit">${ed}</span> 伤害`);if(pHp<=0)break;
  }
  const won=eHp<=0;P.hp=Math.max(1,pHp);
  if(won){P.exp+=boss.exp;P.gold+=boss.gold;P.kills++;
    const heal=healAfterBattle();if(heal>0)P.hp=Math.min(effMaxHp(),P.hp+Math.floor(effMaxHp()*heal));
    if(!isMax()&&P.exp>=nrd().exp){const nr=nrd();P.realm++;P.atk=nr.atk;P.def=nr.def;P.maxHp=nr.hp;P.hp=nr.hp;log.push(`<span class="gold">⚡ 突破！→ ${nr.n}</span>`);}
    completeCell(idx);
  }else{showToast('💀 BOSS太强了…回退两格');P.playerPos=Math.max(0,idx-2);P.currentLayer=Math.floor(P.playerPos/5);}
  showModal(won?'BOSS战胜利':'BOSS战结果','<div class="battle-log">'+log.join('<br>')+'</div>',[{text:'确定',cls:'pri',fn:()=>renderMap()}]);
}

    story('🏚️ 藏经阁残址',`<em>第${P.currentLayer+1}层 · 藏经阁</em><br><br>你发现一座半塌的藏经阁，大部分典籍已经腐朽。但在最深处，你找到一本保存完好的功法秘籍！`,[{text:'学习秘籍',cls:'pri',fn:()=>{const s=SKILLS[rand(1,SKILLS.length-1)];if(!P.equippedSkills)P.equippedSkills=[];if(!P.equippedSkills.find(es=>es.n===s.n))P.equippedSkills.push({...s,lvl:1});showToast(`习得 ${s.n}`);completeCell(idx);renderMap();}},{text:'搜索宝物',cls:'ok',fn:()=>{const eq=EQUIP_TEMPLATES[rand(2,4)];if(!P.bag)P.bag=[];P.bag.push({...eq,type:'weapon'});showToast(`发现 ${eq.n}`);completeCell(idx);renderMap();}}]);
  }else{
    story('🏚️ 古传送阵',`<em>第${P.currentLayer+1}层 · 传送阵</em><br><br>你在废墟中发现一座半损毁的传送阵。传送符纹尚在微微发光，似乎还能使用。<br><br>也许它能将你传送到更远的层数，但也可能传送到危险之地…`,[{text:'激活传送(前进5-15层)',cls:'pri',fn:()=>{const skip=rand(5,15);P.playerPos+=skip*5;P.currentLayer=Math.floor(P.playerPos/5);showToast(`传送！前进${skip}层`);completeCell(idx);renderMap();}},{text:'修复阵法(+修为)',cls:'ok',fn:()=>{P.exp+=rand(100,300)*expBonus();showToast('研究阵法');completeCell(idx);renderMap();}}]);
  }
}

function doTribulation(idx){
  if(P.realm<3){showToast('修为不够，无法引动天劫');completeCell(idx);renderMap();return;}
  story('⚡ 渡劫台',`<em>第${P.currentLayer+1}层 · 渡劫</em><br><br>你发现一座古老的渡劫台，台上的雷击痕迹诉说着无数修士在此与天争命的往事。<br><br>台上残留的雷劫之力可以引动小天劫。若能扛过，修为大增；若失败，也会有所感悟。<br><br>⚠️ 当前境界: ${rd().n} | 成功率约${60+P.realm*2}%`,[
    {text:'引动天劫！',cls:'dan',fn:()=>{const ok=rand(0,100)<(60+P.realm*2);if(ok){const e=rand(200,600)*expBonus();P.exp+=e;const nr=nrd();if(!isMax()&&P.exp>=nr.exp){P.realm++;P.atk=nr.atk;P.def=nr.def;P.maxHp=nr.hp;P.hp=nr.hp;showToast(`⚡ 突破！→ ${nr.n}`);}showToast(`渡劫成功！+${nval(e)}修`);}else{P.hp=Math.floor(P.hp*.4);P.exp+=rand(50,150)*expBonus();showToast('渡劫失败…但有所感悟');}completeCell(idx);renderMap();}},
    {text:'谨慎离开',cls:'',fn:()=>{showToast('你选择稳妥修行');completeCell(idx);renderMap();}}]);
}

function doStele(idx){
  story('📖 悟道碑',`<em>第${P.currentLayer+1}层 · 古碑</em><br><br>你看到一块巨大的古碑，上面刻满了深奥的大道符文。碑文散发着淡淡的光芒，仿佛在诉说着天地至理。<br><br>你凝神细看，心神沉浸其中…<br><br>不知不觉中，你对修炼之道有了更深的理解。`,[
    {text:'深度参悟 (+修为)',cls:'pri',fn:()=>{const e=rand(100,300)*expBonus();P.exp+=e;showToast(`参悟 +${nval(e)}修`);completeCell(idx);renderMap();}},
    {text:'临摹碑文 (+灵石)',cls:'ok',fn:()=>{P.gold+=rand(60,180);showToast('临摹变卖');completeCell(idx);renderMap();}}]);
}

function doGarden(idx){
  const herbs=['百年灵芝','千年人参','龙涎草','凤凰花','天星草','血菩提'];
  const h=herbs[rand(0,herbs.length-1)];
  const g=rand(1,3);
  if(!P.bag)P.bag=[];
  P.bag.push({n:h,icon:'🌿',type:'mat'});
  if(g>1)P.bag.push({n:h,icon:'🌿',type:'mat'});
  story('🌿 药园',`<em>第${P.currentLayer+1}层 · 药园</em><br><br>你发现一片隐秘的药园，各种灵药在此生长。其中最引人注目的是<strong>${h}</strong>×${g}。<br><br>这些灵药年份不短，药力充沛，可用于炼丹或直接服用。`,
    [{text:'采集灵药',cls:'pri',fn:()=>{showToast(`采集 ${h}×${g}`);completeCell(idx);renderMap();}},
     {text:'就地服用',cls:'ok',fn:()=>{const e=rand(40,120)*expBonus();P.exp+=e;P.hp=Math.min(effMaxHp(),P.hp+rand(30,100));showToast(`服用 +${nval(e)}修 恢复气血`);completeCell(idx);renderMap();}}]);
}

function doDemon(idx){
  if(P.realm<4){showToast('修为不够，心魔未生');completeCell(idx);renderMap();return;}
  const demonAtk=Math.floor(effAtk()*.7);
  const demonHp=Math.floor(effMaxHp()*.8);
  story('👺 心魔',`<em>第${P.currentLayer+1}层 · 心魔</em><br><br>你突然感到一阵心悸，眼前景象扭曲。一个与你一模一样的身影出现在面前——那是你内心深处的执念所化的心魔。<br><br>"放弃吧，修仙之路太过艰难…"心魔低语道。<br><br>你必须战胜它，才能继续前行！<br><br>心魔战力: ⚔️${nval(demonAtk)} ❤️${nval(demonHp)}`,[
    {text:'正面对抗',cls:'dan',fn:()=>{const ok=effAtk()*2>demonHp+demonAtk||rand(0,100)<40+P.realm*3;if(ok){const e=rand(100,400)*expBonus();P.exp+=e;P.talentPts=(P.talentPts||0)+1;showToast(`战胜心魔！天赋+1 +${nval(e)}修`);}else{P.hp=Math.floor(P.hp*.5);showToast('被心魔侵蚀…');}completeCell(idx);renderMap();}},
    {text:'坚守本心',cls:'pri',fn:()=>{P.exp+=rand(50,150)*expBonus();showToast('信念坚定');completeCell(idx);renderMap();}}]);
}

// ==================== 面板 ====================
// ==================== 面板 ====================
function openChar(){
  let h=`<p><strong>${P.name}</strong> · ${rd().n}</p>
    <p>⚔️攻击: ${nval(effAtk())} | 🛡️防御: ${nval(effDef())} | ❤️气血: ${nval(P.hp)}/${nval(effMaxHp())}</p>
    <p>修为: ${nval(P.exp)} / ${isMax()?'∞':nval(nrd().exp)}</p>
    <div class="progress"><div class="exp" style="width:${isMax()?100:Math.min(100,Math.floor(P.exp/nrd().exp*100))}%"></div></div>
    <p>💎灵石: ${nval(P.gold)} | 层数: ${P.currentLayer+1} | 击杀: ${P.kills}</p>`;
  if(!P.path){
    h+=`<p style="color:#ffd700">选择修炼方向：</p>`;
    for(const[k,v]of Object.entries(PATHS))h+=`<button class="btn pri" onclick="choosePath('${k}')">${v.icon} ${v.n} - ${v.desc}</button>`;
  }else{
    h+=`<p>方向: ${PATHS[P.path].icon} ${PATHS[P.path].n}</p>`;
    if(P.equippedWeapon)h+=`<p>装备: ${P.equippedWeapon.icon} ${P.equippedWeapon.n} ⚔+${P.equippedWeapon.atk} <button class="btn dan" style="width:auto;padding:3px 8px;font-size:.5rem" onclick="unequipWeapon()">卸下</button></p>`;
    else h+=`<p>武器: 空手</p>`;
  }
  showModal('👤 人物详情',h,[{text:'关闭',cls:''}]);
}

function choosePath(k){P.path=k;if(k==='body'){P.maxHp*=2;P.hp=P.maxHp;}showToast(`选择 ${PATHS[k].n} 方向！`);modal.classList.add('hidden');renderMap();save();}

function unequipWeapon(){if(P.equippedWeapon){if(!P.bag)P.bag=[];P.bag.push({...P.equippedWeapon,type:'weapon'});P.equippedWeapon=null;}renderMap();save();}

function openSkills(){
  let h='';for(const s of SKILLS){
    const learned=(P.equippedSkills||[]).find(es=>es.n===s.n);
    h+=`<div class="row"><span>${s.icon} ${s.n} <span style="font-size:.5rem;color:rgba(200,180,140,.4)">${s.grade}</span></span>`;
    if(learned){
      h+=`<span style="font-size:.5rem">Lv.${learned.lvl}/${s.maxLvl} ⚔${s.atk*learned.lvl} 🛡${s.def*learned.lvl} ❤${s.hp*learned.lvl}
        <button class="btn ok" style="width:auto;padding:2px 6px;font-size:.45rem" onclick="upgradeSkill('${s.n}')" ${learned.lvl>=s.maxLvl||P.gold<s.cost*learned.lvl?'disabled':''}>升 💎${s.cost*learned.lvl}</button></span>`;
    }else{
      h+=`<button class="btn" style="width:auto;padding:3px 8px;font-size:.5rem" onclick="learnSk('${s.n}')" ${P.gold<s.cost?'disabled':''}>习得 💎${s.cost}</button>`;
    }
    h+=`</div><div style="font-size:.5rem;color:rgba(200,180,140,.3)">⚔${s.atk} 🛡${s.def} ❤${s.hp}</div>`;
  }
  showModal('📜 功法',h,[{text:'关闭',cls:''}]);
}

function learnSk(n){const s=SKILLS.find(sk=>sk.n===n);if(!s||P.gold<s.cost)return;if(!P.equippedSkills)P.equippedSkills=[];P.equippedSkills.push({...s,lvl:1});P.gold-=s.cost;showToast(`习得 ${s.n}`);openSkills();save();renderMap();}
function upgradeSkill(n){const s=(P.equippedSkills||[]).find(es=>es.n===n);if(!s||s.lvl>=s.maxLvl||P.gold<s.cost*s.lvl)return;P.gold-=s.cost*s.lvl;s.lvl++;showToast(`${s.n} → Lv.${s.lvl}`);openSkills();save();renderMap();}

function openBag(){
  let h='';if(!P.bag||P.bag.length===0)h='<p>背包空空如也</p>';
  else P.bag.forEach((item,i)=>{
    if(item.type==='weapon'){
      h+=`<div class="row"><span>${item.icon} ${item.n} ⚔+${item.atk}</span><button class="btn ok" style="width:auto;padding:3px 8px;font-size:.5rem" onclick="equipWeapon(${i})">装备</button></div>`;
    }else{
      h+=`<div class="row"><span>${item.icon} ${item.n}</span><button class="btn ok" style="width:auto;padding:3px 8px;font-size:.5rem" onclick="useBagItem(${i})">使用</button></div>`;
    }
  });
  showModal('🎒 背包',h,[{text:'关闭',cls:''}]);
}

function equipWeapon(i){const item=P.bag[i];if(!item||item.type!=='weapon')return;const old=P.equippedWeapon;P.equippedWeapon=item;P.bag.splice(i,1);if(old)P.bag.push({...old,type:'weapon'});showToast(`装备 ${item.n}`);renderMap();save();}
function useBagItem(i){const item=P.bag[i];if(!item)return;
  if(item.type==='mat'){showToast(`使用 ${item.n}`);P.bag.splice(i,1);}
  renderMap();save();}

function openBeast(){
  let h='';
  if(P.beast){
    h+=`<p>${P.beast.icon} <strong>${P.beast.n}</strong> - ${P.beast.desc}</p>
    <p style="font-size:.6rem;color:${P.beastDeployed?'#81c784':'rgba(200,180,140,.4)'}">状态: ${P.beastDeployed?'✅ 已出战':'⚠️ 未出战'}</p>
    <p style="font-size:.55rem;color:rgba(200,180,140,.3)">${P.beast.deployDesc}</p>`;
    if(!P.beastDeployed)h+=`<button class="btn pri" onclick="deployBeast()">🐾 点击出战</button>`;
    else h+=`<button class="btn dan" onclick="recallBeast()">🔙 召回休息</button>`;
  }else h='<p>尚未拥有灵兽，在地图上探索发现吧</p>';
  showModal('🐾 灵兽',h,[{text:'关闭',cls:''}]);
}

function deployBeast(){P.beastDeployed=true;showToast(`🐾 ${P.beast.n} 出战！`);openBeast();renderMap();save();}
function recallBeast(){P.beastDeployed=false;showToast(`${P.beast.n} 已召回`);openBeast();renderMap();save();}

function openShop(){
  let h='';EQUIP_TEMPLATES.forEach(eq=>{h+=`<div class="row"><span>${eq.icon} ${eq.n} ⚔+${eq.atk}</span><button class="btn ok" style="width:auto;padding:3px 8px;font-size:.5rem" onclick="buyEq('${eq.n}')" ${P.gold>=eq.cost?'':'disabled'}>💎${eq.cost}</button></div>`;});
  h+=`<hr style="border-color:rgba(255,255,255,.05);margin:8px 0"><div class="row"><span>小还丹 ❤30%</span><button class="btn ok" style="width:auto;padding:3px 8px;font-size:.5rem" onclick="buyHeal()" ${P.gold>=50?'':'disabled'}>💎50</button></div>`;
  showModal('🏪 坊市',h,[{text:'关闭',cls:''}]);
}

function buyEq(n){const eq=EQUIP_TEMPLATES.find(e=>e.n===n);if(!eq||P.gold<eq.cost)return;P.gold-=eq.cost;if(!P.bag)P.bag=[];P.bag.push({...eq,type:'weapon'});showToast(`购买 ${eq.n}`);renderMap();save();}
function buyHeal(){if(P.gold<50)return;P.gold-=50;P.hp=Math.min(effMaxHp(),P.hp+Math.floor(effMaxHp()*.3));showToast('使用小还丹');renderMap();save();}

// ==================== 初始化 ====================
if(!P.mapCells||P.mapCells.length===0)genMap();
if(P.playerPos<0)P.playerPos=0;
if(P.hp<=0)P.hp=Math.floor(effMaxHp()*.3);
P.currentLayer=Math.floor(P.playerPos/5);
if(!P.bag)P.bag=[];
if(!P.equippedSkills)P.equippedSkills=[];

// 自动恢复
setInterval(()=>{P.hp=Math.min(effMaxHp(),P.hp+Math.floor(effMaxHp()*.02));save();},10000);

renderMap();
</script>
</body>
</html>
