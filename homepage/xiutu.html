<style>
/* ═══════════════════════════════════════
   仙途 v3.0 — 精美修仙UI主题
   ═══════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07060d;--card:#0f0c1a;--card2:#120f20;
  --gold:#d4a843;--gold2:#f0d68a;--gold3:#8b6914;
  --text:#c8bfa8;--text2:#8a8270;--text3:#5a5548;
  --red:#e05555;--green:#5dbd72;--blue:#5ba0d9;--purple:#9b7ed9;
  --border:rgba(180,150,80,.1);--glow:rgba(200,160,60,.15);
}
body{background:var(--bg);color:var(--text);font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden;height:100vh;user-select:none;-webkit-user-select:none;touch-action:manipulation}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 50% 0%,rgba(180,150,80,.04),transparent 60%),radial-gradient(ellipse at 20% 80%,rgba(100,120,200,.03),transparent 50%);pointer-events:none;z-index:0}
#app{display:flex;flex-direction:column;height:100vh;max-width:500px;margin:0 auto;position:relative;z-index:1}

/* Top Bar - 精美顶栏 */
#topbar{background:linear-gradient(180deg,rgba(12,8,20,.98) 0%,rgba(8,6,16,.96) 100%);padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0;text-align:center;position:relative}
#topbar::after{content:'';position:absolute;bottom:0;left:10%;width:80%;height:1px;background:linear-gradient(90deg,transparent,var(--gold3),transparent);opacity:.3}
#topbar .realm{font-size:1.15rem;font-weight:bold;background:linear-gradient(180deg,#ffe08a,#d4a843,#8b6914);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:none;letter-spacing:2px}
#topbar .bars{display:flex;justify-content:center;gap:14px;font-size:.52rem;color:var(--text2);margin-top:2px;flex-wrap:wrap}
#topbar .bars span{color:var(--text);font-weight:500}
#topbar .layer{font-size:.5rem;color:var(--text3);letter-spacing:1px}

/* Grid Map - 精美格子 */
#map-wrap{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
#map-wrap::-webkit-scrollbar{width:3px}
#map-wrap::-webkit-scrollbar-thumb{background:rgba(180,150,80,.1);border-radius:2px}
#map{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;padding-bottom:70px}
.cell{aspect-ratio:1;border-radius:10px;background:linear-gradient(135deg,rgba(20,16,35,.7),rgba(14,11,28,.5));border:1px solid rgba(180,150,80,.06);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:1.3rem;cursor:pointer;transition:all .2s;position:relative}
.cell:hover{background:rgba(30,22,50,.8);border-color:rgba(180,150,80,.15)}
.cell:active{transform:scale(.9)}
.cell.done{opacity:.3;pointer-events:none;filter:grayscale(.5)}
.cell.current{border-color:rgba(100,180,255,.5)!important;box-shadow:0 0 15px rgba(100,180,255,.15),inset 0 0 30px rgba(100,180,255,.03)!important;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 10px rgba(100,180,255,.1),inset 0 0 20px rgba(100,180,255,.02)}50%{box-shadow:0 0 20px rgba(100,180,255,.2),inset 0 0 40px rgba(100,180,255,.05)}}
.cell .mark{position:absolute;top:2px;right:3px;font-size:.35rem;color:rgba(255,255,255,.3)}
.cell .label{font-size:.38rem;color:var(--text2);line-height:1;margin-top:-1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:95%}

#player-marker{background:rgba(100,180,255,.12)!important;border-color:rgba(100,180,255,.5)!important;font-size:.85rem!important}

/* Bottom Panel - 精美底栏 */
#bpanel{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:linear-gradient(0deg,rgba(8,6,16,.98),rgba(12,8,20,.95));border-top:1px solid var(--border);padding:6px 8px;z-index:10;display:flex;gap:4px;backdrop-filter:blur(10px)}
#bpanel::before{content:'';position:absolute;top:0;left:15%;width:70%;height:1px;background:linear-gradient(90deg,transparent,var(--gold3),transparent);opacity:.5}
#bpanel button{flex:1;min-width:48px;padding:7px 1px;background:rgba(180,150,80,.03);border:1px solid rgba(180,150,80,.08);color:var(--text2);font-size:.5rem;border-radius:8px;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .25s;position:relative;overflow:hidden}
#bpanel button:hover{background:rgba(180,150,80,.08);border-color:rgba(180,150,80,.2);color:var(--gold)}
#bpanel button:active{transform:scale(.95);background:rgba(180,150,80,.12)}
#bpanel button .bi{font-size:.85rem;transition:transform .2s}
#bpanel button:hover .bi{transform:translateY(-2px)}

/* Modal */
#modal{position:fixed;top:0;left:0;width:100%;height:100%;z-index:50;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
#modal.hidden{display:none}
.modal-in{background:linear-gradient(180deg,#1a1532 0%,#120e25 100%);border:1px solid var(--border);border-radius:16px;padding:16px 14px;max-width:390px;width:94%;max-height:88vh;overflow-y:auto;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 0 1px rgba(180,150,80,.05);position:relative}
.modal-in::-webkit-scrollbar{width:3px}
.modal-in::-webkit-scrollbar-thumb{background:rgba(180,150,80,.15);border-radius:2px}
.modal-in h2{color:var(--gold2);font-size:1rem;margin-bottom:10px;letter-spacing:2px;position:relative;display:inline-block}
.modal-in h2::after{content:'';position:absolute;bottom:-4px;left:10%;width:80%;height:1px;background:linear-gradient(90deg,transparent,var(--gold3),transparent)}
.modal-in p{font-size:.65rem;color:var(--text2);line-height:1.8;margin-bottom:8px}

/* Buttons */
.btn{display:block;width:100%;padding:9px;margin:4px 0;border-radius:8px;border:1px solid var(--border);background:rgba(180,150,80,.04);color:var(--text);font-size:.65rem;cursor:pointer;transition:all .25s;font-family:inherit;text-align:center;letter-spacing:1px;position:relative;overflow:hidden}
.btn:hover{background:rgba(180,150,80,.1);border-color:rgba(180,150,80,.25)}
.btn:active{transform:scale(.97)}
.btn.pri{background:linear-gradient(135deg,rgba(180,140,60,.15),rgba(140,100,30,.1));border-color:rgba(200,160,70,.4);color:#f0d68a;font-weight:bold;box-shadow:0 0 15px rgba(200,160,70,.08)}
.btn.pri:hover{box-shadow:0 0 25px rgba(200,160,70,.15)}
.btn.dan{background:rgba(200,60,60,.08);border-color:rgba(200,60,60,.25);color:var(--red)}
.btn.ok{background:rgba(50,180,80,.08);border-color:rgba(50,180,80,.25);color:var(--green)}
.btn.cy{background:rgba(50,140,220,.08);border-color:rgba(50,140,220,.25);color:var(--blue)}
.btn.pur{background:rgba(140,80,220,.08);border-color:rgba(140,80,220,.25);color:var(--purple)}
.btn.org{background:rgba(220,140,50,.08);border-color:rgba(220,140,50,.25);color:#e8a840}
.btn.sm{width:auto;padding:4px 10px;font-size:.5rem;display:inline-block;margin:2px}
.btn:disabled{opacity:.35;pointer-events:none}

/* UI Cards */
.ui-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px;margin:4px 0;position:relative}
.ui-card.hl{border-color:rgba(200,160,70,.25);box-shadow:0 0 10px var(--glow)}
.ui-card .card-title{font-size:.6rem;color:var(--gold);font-weight:bold;margin-bottom:4px;letter-spacing:1px}

/* Item Grid */
.item-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin:4px 0}
.item-card{background:linear-gradient(135deg,rgba(20,16,40,.8),rgba(12,10,25,.6));border:1px solid var(--border);border-radius:8px;padding:6px 4px;text-align:center;cursor:pointer;transition:all .2s;font-size:.5rem;position:relative}
.item-card:hover{transform:translateY(-2px);border-color:rgba(200,160,70,.3);box-shadow:0 4px 15px rgba(0,0,0,.3)}
.item-card .it{font-size:1.6rem;display:block;margin-bottom:2px}
.item-card .in{color:var(--text);font-weight:500}
.item-card .itier{font-size:.4rem;color:var(--text3)}
.item-card .istat{font-size:.42rem;color:var(--gold)}
.item-card.equipped{border-color:rgba(100,200,100,.4)!important;box-shadow:0 0 10px rgba(100,200,100,.1)}
.item-card.equipped::after{content:'✅';position:absolute;top:2px;right:4px;font-size:.5rem}

/* Tab System */
.tabs{display:flex;gap:3px;margin-bottom:8px;flex-wrap:wrap}
.tab{padding:5px 10px;font-size:.5rem;border-radius:6px 6px 0 0;background:rgba(180,150,80,.03);border:1px solid var(--border);color:var(--text2);cursor:pointer;transition:all .2s}
.tab.active{background:rgba(180,150,80,.1);border-color:rgba(200,160,70,.3);color:var(--gold);font-weight:bold}

/* Stats Bar */
.stat-bar{height:5px;background:rgba(255,255,255,.03);border-radius:3px;overflow:hidden;margin:3px 0}
.stat-bar div{height:100%;border-radius:3px;transition:width .4s}
.stat-bar .s-atk{background:linear-gradient(90deg,#c0392b,#e74c3c)}
.stat-bar .s-def{background:linear-gradient(90deg,#2471a3,#3498db)}
.stat-bar .s-exp{background:linear-gradient(90deg,#8b6914,#f0d68a)}
.stat-bar .s-hp{background:linear-gradient(90deg,#27ae60,#2ecc71)}

/* Row */
.row{display:flex;justify-content:space-between;align-items:center;font-size:.6rem;margin:2px 0;padding:2px 0}
.row .label{color:var(--text2)}
.row .val{color:var(--text);font-weight:500}

/* Progress */
.progress{height:4px;background:rgba(255,255,255,.03);border-radius:2px;overflow:hidden;margin:3px 0}
.progress div{height:100%;border-radius:2px;transition:width .4s}
.progress .exp{background:linear-gradient(90deg,#8b6914,#f0d68a)}

#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:60;padding:8px 20px;border-radius:20px;font-size:.6rem;color:var(--gold2);background:rgba(10,8,20,.95);border:1px solid rgba(200,160,70,.3);opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;letter-spacing:1px;box-shadow:0 4px 20px rgba(0,0,0,.4)}
#toast.show{opacity:1}

#back-link{position:fixed;top:8px;left:8px;z-index:5}
#back-link a{color:rgba(200,180,140,.12);text-decoration:none;font-size:.5rem;transition:color .3s}
#back-link a:hover{color:rgba(200,180,140,.3)}

.battle-log{font-size:.52rem;color:var(--text2);line-height:1.8;max-height:160px;overflow-y:auto;text-align:left;padding:8px;background:rgba(0,0,0,.2);border-radius:6px}
.battle-log .hit{color:var(--red)}.battle-log .heal{color:var(--green)}.battle-log .gold{color:var(--gold2)}.battle-log .info{color:var(--blue)}

.story-text{font-size:.65rem;color:var(--text);line-height:2.1;text-align:left;margin:8px 0;padding:10px;background:rgba(0,0,0,.25);border-radius:8px;border-left:2px solid rgba(200,160,70,.3)}
.story-text em{color:var(--text3);font-style:normal;font-size:.55rem}

/* Decorative */
.deco-line{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:8px 0}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.45rem;font-weight:bold}
.badge.gold{background:rgba(200,160,60,.15);color:var(--gold);border:1px solid rgba(200,160,60,.2)}
.badge.red{background:rgba(200,60,60,.1);color:var(--red);border:1px solid rgba(200,60,60,.15)}
.badge.green{background:rgba(60,180,80,.1);color:var(--green);border:1px solid rgba(60,180,80,.15)}
.badge.blue{background:rgba(60,140,220,.1);color:var(--blue);border:1px solid rgba(60,140,220,.15)}
.badge.purple{background:rgba(140,80,220,.1);color:var(--purple);border:1px solid rgba(140,80,220,.15)}

/* Tooltip style info */
.info-tag{font-size:.45rem;color:var(--text3);letter-spacing:.5px}
/* SVG Icons */
.ic{width:1.2rem;height:1.2rem;display:inline-block;vertical-align:middle}
.ic-sm{width:.8rem;height:.8rem}
.ic-lg{width:1.6rem;height:1.6rem}
.ic-xl{width:2.2rem;height:2.2rem}
.ic-gold{color:var(--gold2)}
.ic-red{color:var(--red)}
.ic-blue{color:var(--blue)}
.ic-green{color:var(--green)}
.ic-purple{color:var(--purple)}
.ic-white{color:var(--text)}

/* Premium Item Card */
.premium-card{background:linear-gradient(145deg,rgba(25,18,45,.95),rgba(15,10,30,.9));border:1px solid rgba(180,150,80,.1);border-radius:12px;padding:10px 8px;text-align:center;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.premium-card:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,.4)}
.premium-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent)}
.premium-card .pc-icon{font-size:2rem;display:block;margin:4px 0;transition:transform .3s}
.premium-card:hover .pc-icon{transform:scale(1.1)}
.premium-card .pc-name{font-size:.6rem;color:var(--text);font-weight:bold;margin:2px 0}
.premium-card .pc-tier{font-size:.45rem;margin:1px 0}
.premium-card .pc-stat{font-size:.45rem;color:var(--gold);margin:2px 0}
.premium-card .pc-btn{font-size:.42rem;padding:3px 8px;margin-top:4px;border-radius:4px}
.premium-card.tier-fan{border-color:rgba(150,150,150,.2)}
.premium-card.tier-ling{border-color:rgba(100,180,100,.25);box-shadow:0 0 8px rgba(100,180,100,.05)}
.premium-card.tier-bao{border-color:rgba(100,140,220,.3);box-shadow:0 0 12px rgba(100,140,220,.08)}
.premium-card.tier-xian{border-color:rgba(220,150,50,.35);box-shadow:0 0 18px rgba(220,150,50,.1)}
.premium-card.tier-sheng{border-color:rgba(255,80,80,.4);box-shadow:0 0 22px rgba(255,80,80,.12);animation:glow-sheng 2s infinite}
@keyframes glow-sheng{0%,100%{box-shadow:0 0 15px rgba(255,80,80,.1)}50%{box-shadow:0 0 30px rgba(255,200,80,.2)}}
.premium-card.equipped{border:2px solid rgba(100,200,100,.6)!important;box-shadow:0 0 15px rgba(100,200,100,.2)!important}
.premium-card.equipped::after{content:'已装备';position:absolute;top:6px;right:6px;font-size:.35rem;background:rgba(100,200,100,.2);color:var(--green);padding:1px 6px;border-radius:8px}

/* 灵兽卡 */
.beast-card{background:linear-gradient(135deg,rgba(20,12,35,.95),rgba(25,18,40,.9));border-radius:12px;padding:12px;text-align:center;border:1px solid rgba(180,150,80,.15)}
.beast-card .bc-sprite{font-size:3.5rem;display:block;margin:4px 0;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.beast-card .bc-name{font-size:.8rem;color:var(--gold2);font-weight:bold}
.beast-card .bc-type{font-size:.5rem;color:var(--text2);margin:2px 0}
.beast-card .bc-ability{font-size:.5rem;color:var(--blue);margin:4px 0;padding:4px 8px;background:rgba(0,0,0,.2);border-radius:6px;display:inline-block}

<script>
// ═══════════════════════════════════════
// 仙途 · 文字修仙 v2.0 — 动态剧情引擎
// ═══════════════════════════════════════
const VERSION='2.0';

// ========== 随机工具 ==========
function rnd(min,max){return Math.floor(min+Math.random()*(max-min+1));}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function pickN(arr,n){const s=[...arr];for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}return s.slice(0,n);}
function chance(pct){return Math.random()*100<pct;}

// ========== 动态名称池 ==========
const NPC_NAMES=['青云真人','紫霄道人','太虚仙子','白鹤居士','玄冥老魔','碧落仙姑','苍梧散人','玉衡子',
  '幽兰仙子','赤松道长','寒江孤影','月华仙','凌虚子','丹辰子','墨渊上神','落星仙子','风清扬','云中君',
  '无崖子','清虚道长','瑶光圣女','枯木老人','血煞魔君','霓裳仙子','雷音法师','天机老人'];
const PLACES=['苍梧山','碧落谷','青云峰','紫霄崖','落星涧','月华山','寒潭洞','幽兰谷','龙脊山','凤鸣涧',
  '天河瀑布','丹霞峰','太虚洞','云梦泽','赤松林','白鹤峰','翠微山','玉京峰','忘川河','蓬莱岛'];
const HERBS=['百年灵芝','千年雪莲','龙涎草','凤凰花','天星草','血菩提','紫玉参','赤炎果','九叶灵芝','玄冰花',
  '七彩蘑菇','雷击木','月华草','金线莲','地髓','天元果','冰心兰','灼阳花','幽冥草','星辰花'];
const ORE_NAMES=['玄铁精矿','天外陨铁','星辰砂','紫金矿','寒铁','赤铜','秘银','玄晶石','太阳金精','万年寒玉'];
const ARTIFACT_NAMES=['青铜古灯','白玉如意','紫金钵','八卦镜','山河图','镇魂铃','飞仙笔','九龙鼎','阴阳鱼','天机盘'];
const DEMON_NAMES=['噬魂兽','九尾狐','三足金蟾','玄武龟','朱雀雏鸟','白虎幼崽','穷奇','饕餮','梼杌','混沌兽',
  '螭吻','睚眦','狴犴','貔貅','椒图','金翅大鹏','六耳猕猴','九头蛇','梦魇兽','地狱犬'];
const PILL_NAMES=['聚灵丹','筑基丹','结丹丸','元婴丹','化神丹','淬体丹','回春丹','破境丹','洗髓丹',
  '天元丹','凝神丹','解毒丹','养魂丹','道心丹','玄牝丹','生生造化丹'];

// ========== 动态剧情模板引擎 ==========
function S(){return {place:pick(PLACES),npc:pick(NPC_NAMES),herb:pick(HERBS),
  ore:pick(ORE_NAMES),artifact:pick(ARTIFACT_NAMES),demon:pick(DEMON_NAMES),
  pill:pick(PILL_NAMES),lay:P.currentLayer+1,rd:rd().n,
  beastName:pick(BEASTS).n,skillGrade:pick(SKILLS).grade,
  // 随机高阶境界用于故事背景
  highRealm:pick(['化神','炼虚','合体','大乘','渡劫','真仙','金仙','太乙','大罗','混元'])};}

// 剧情文本中的 {变量} 会被替换
function fill(tpl,ctx){let s=tpl;if(!ctx)ctx=S();
  for(const[k,v]of Object.entries(ctx)){const re=new RegExp('\\{'+k+'\\}','g');s=s.replace(re,String(v));}
  return s;}

// 生成随机的效果描述
function effDesc(e){
  if(!e)return '无明显变化';
  const parts=[];
  if(e.exp)parts.push(`✨修为 +${nval(e.exp)}`);
  if(e.gold)parts.push(`💎灵石 +${nval(e.gold)}`);
  if(e.atk)parts.push(`⚔️永攻 +${e.atk}`);
  if(e.def)parts.push(`🛡️永防 +${e.def}`);
  if(e.hpBonus)parts.push(`❤️永血 +${e.hpBonus}`);
  if(e.heal)parts.push(`💚恢复${nval(e.heal)}气血`);
  if(e.talent)parts.push(`⭐天赋 +${e.talent}`);
  if(e.item)parts.push(`📦获得 ${e.item}`);
  if(e.skill)parts.push(`📜习得 ${e.skill}`);
  if(e.equip)parts.push(`🗡️获得 ${e.equip}`);
  if(e.beast)parts.push(`🐾收服 ${e.beast}`);
  return parts.join(' | ')||'无明显变化';
}

function applyEffect(e){
  if(!e)return;
  if(e.exp)P.exp+=Math.floor(e.exp*expBonus());
  if(e.gold)P.gold+=e.gold;
  if(e.atk)P.permAtk+=e.atk;
  if(e.def)P.permDef+=e.def;
  if(e.hpBonus)P.permHp+=e.hpBonus;
  if(e.heal)P.hp=Math.min(effMaxHp(),P.hp+e.heal);
  if(e.talent)P.talentPts=(P.talentPts||0)+e.talent;
  if(e.item){if(!P.bag)P.bag=[];P.bag.push({n:e.item,icon:'📦',type:'mat'});}
  if(e.skill){if(!P.equippedSkills)P.equippedSkills=[];const sk=SKILLS.find(s=>s.n===e.skill);if(sk&&!P.equippedSkills.find(es=>es.n===sk.n))P.equippedSkills.push({...sk,lvl:1});}
  if(e.equip){if(!P.bag)P.bag=[];const eq=EQUIP_TEMPLATES.find(x=>x.n===e.equip);if(eq)P.bag.push({...eq,type:'weapon'});}
  if(e.beast){const bt=BEASTS.find(b=>b.n===e.beast);if(bt)P.beast={...bt};}
}

// ========== 剧情池系统 ==========
// 每个事件类型有大量不同剧情，每条剧情有不同选择分支
const STORY_POOL={};

// 辅助函数：创建故事结构
function mkStory(title,narrative,choices){
  return {title,narrative,choices};}

// choices格式: [{text,cls,effect,outcome}]
// outcome是选择后显示的文本，effect是实际效果对象

// ===== 奇遇剧情池 (adventure) =====
STORY_POOL.adventure=[
  {tpl:'你行至{place}，忽见一道金光从地底冲出。走近一看，竟是一株即将成熟的{herb}，药香四溢。\n\n正当你准备采摘时，一道人影从远处飞来——是{rd}散修{npc}。\n\n{npc}拱手道："道友，此药对我突破至关重要，可否相让？必有重谢。"',
   choices:[
    {text:'慷慨相让',cls:'pri',effect:{exp:()=>rnd(80,200),gold:()=>rnd(50,150)},outcome:()=>`${pick(NPC_NAMES)}感激不尽，不仅赠予灵石，还分享了修炼心得`},
    {text:'拒绝相让',cls:'dan',effect:{item:()=>pick(HERBS),exp:()=>rnd(40,100)},outcome:()=>`你采下灵药，但{npc}愤怒离去。不知日后是否会结下因果…`},
    {text:'提议共同采摘',cls:'ok',effect:{exp:()=>rnd(60,160),talent:()=>1},outcome:()=>`双方各取一半，还结下了善缘。${pick(NPC_NAMES)}主动提出日后可互相照应。`}]},

  {tpl:'路过{place}时，天色骤变，乌云密布。一道闪电劈在不远处，地上出现了一个焦黑的深坑。\n\n坑底躺着一枚古朴的戒指，戒面刻着看不懂的文字。\n\n灵力探查发现，戒指内藏有一个小型的储物空间…',
   choices:[
    {text:'滴血认主',cls:'pri',effect:{gold:()=>rnd(100,500),equip:()=>pick(EQUIP_TEMPLATES.slice(2)).n},outcome:()=>'戒指认主，储物空间打开，里面有不少好东西！'},
    {text:'谨慎观察',cls:'',effect:{exp:()=>rnd(40,120)},outcome:()=>'你用灵力仔细探查，从中学到了一些神念运用的技巧'},
    {text:'变卖给坊市',cls:'ok',effect:{gold:()=>rnd(200,600)},outcome:()=>'一位识货的坊市商人大价钱买下了戒指'}]},

  {tpl:'{place}上空突然风云变色，一道霞光从天而降。云端隐约可见仙宫楼阁的虚影——居然是千年难遇的"天宫现世"异象！\n\n无数修士从四面八方赶来，想要寻得仙缘。虚空中有道道金莲飘落，每朵金莲中都蕴含着一丝天道法则。\n\n你全力运转功法，试图捕捉金莲…',
   choices:[
    {text:'捕捉金莲(高风险)',cls:'dan',effect:{exp:()=>rnd(100,500),talent:()=>chance(30)?1:0},outcome:()=>chance(60)?'你成功捕获一朵金莲！修为大涨！':'金莲消散太快，你只领悟到一丝皮毛'},
    {text:'观摩天宫(稳妥)',cls:'pri',effect:{exp:()=>rnd(60,200),atk:()=>rnd(3,15)},outcome:()=>'你从仙宫虚影中悟出了一丝攻击法门'},
    {text:'捡拾散落的霞光碎片',cls:'ok',effect:{gold:()=>rnd(100,400)},outcome:()=>'霞光碎片中蕴含着精纯灵力，可卖好价钱'}]},

  {tpl:'前面山路边，一位老者摆了个小摊，上面放着几件古怪的东西。\n\n"{npc}的杂货铺——只卖有缘人。"老者悠悠道，手指在茶壶上轻轻敲着。\n\n摊上摆着：一枚发光的玉简、一颗跳动的翠绿色种子、以及一张发黄的符纸。',
   choices:[
    {text:'购买玉简(💎150)',cls:'pri',effect:{exp:()=>rnd(100,350),skill:()=>pick(SKILLS.slice(1,4)).n},outcome:()=>P.gold>=150?'玉简中记载着一门失传功法！':'灵石不够…老者遗憾地收起了玉简'},
    {text:'购买种子(💎80)',cls:'ok',effect:{item:()=>pick(HERBS),hpBonus:()=>rnd(10,40)},outcome:()=>P.gold>=80?'种子种下后迅速生长，结出了灵果！':'灵石不够…老者笑了笑'},
    {text:'购买符纸(💎60)',cls:'cy',effect:{atk:()=>rnd(5,20)},outcome:()=>P.gold>=60?'符纸上画着一道攻击符咒，你从中悟出了门道':'灵石不够…符纸自行燃烧消失了'}]},

  {tpl:'天色已晚，你在一处山洞中过夜。半夜，被一阵轻微的声响惊醒。\n\n洞壁上不知何时出现了一道裂缝，里面有微弱的光芒透出。你好奇地扩大裂缝，发现后面竟然是一条人工开凿的通道！\n\n通道尽头是一间密室，中央供奉着一尊{artifact}。',
   choices:[
    {text:'取走宝物',cls:'pri',effect:{gold:()=>rnd(150,500),equip:()=>pick(EQUIP_TEMPLATES.slice(3)).n},outcome:()=>'宝物落入手中，密室开始坍塌！你险险逃出，收获颇丰'},
    {text:'参拜供奉',cls:'ok',effect:{exp:()=>rnd(60,200),hpBonus:()=>rnd(20,60)},outcome:()=>'诚心参拜后，一股暖流涌入四肢百骸'},
    {text:'搜索密室的其它角落',cls:'',effect:{gold:()=>rnd(50,200),item:()=>pick(HERBS)},outcome:()=>'在角落找到一个暗格，里面还有一些东西'}]},

  {tpl:'一阵悠扬的琴声从{place}深处传来，令人心旷神怡。循声而去，只见一位白衣修士坐在松树下抚琴。\n\n琴声时而激昂如万马奔腾，时而婉转如溪水潺潺。周围的花草竟然随着琴声摇曳生长——这是传说中的"天音"之道！\n\n白衣修士一曲终了，转头微笑："道友也是被琴声吸引而来？"',
   choices:[
    {text:'请教天音之道',cls:'pri',effect:{exp:()=>rnd(80,250),def:()=>rnd(2,10)},outcome:()=>'白衣修士传授了一些音律与防御的感悟'},
    {text:'请求合奏一曲',cls:'ok',effect:{exp:()=>rnd(60,200),atk:()=>rnd(3,12)},outcome:()=>'合奏时你领悟到攻击与节奏的关联'},
    {text:'安静聆听',cls:'',effect:{exp:()=>rnd(40,150),hpBonus:()=>rnd(10,30)},outcome:()=>'纯粹的音乐洗涤了心灵，神清气爽'}]},

  {tpl:'{place}今日格外热闹——一年一度的修仙坊市正在举行！来自各门各派的修士聚集于此，交易修炼资源。\n\n有人在交换灵草丹药，有人在出售法器功诀，还有人在设擂台赌斗。一位身穿锦衣的商人主动迎向你："道友需要点什么？"',
   choices:[
    {text:'逛逛丹药区',cls:'ok',effect:{exp:()=>rnd(40,150),gold:()=>rnd(30,100)},outcome:()=>'买了些丹药，顺便从丹师那里学到了不少炼丹知识'},
    {text:'逛逛法器区',cls:'pri',effect:{equip:()=>pick(EQUIP_TEMPLATES.slice(1,4)).n,exp:()=>rnd(20,80)},outcome:()=>P.gold>=120?'你入手了一件不错的法器！':'法器好贵…只能看看'},
    {text:'参加赌斗擂',cls:'dan',effect:{exp:()=>rnd(60,300),gold:()=>rnd(-50,200)},outcome:()=>chance(50)?'你连胜三场，赢得满堂彩！':'运气不佳，输了几场…但也积累了战斗经验'}]},

  {tpl:'天色忽暗，万星齐现。一道流星划破天际，拖着长长的光尾朝{place}坠落。\n\n轰！流星砸在不远处，整个大地都在震颤。当你赶到时，发现不是普通的陨石——而是一块{ore}，表面还闪耀着奇异的星光符文。\n\n天外陨铁，价值连城！',
   choices:[
    {text:'吸取星辰之力',cls:'pri',effect:{exp:()=>rnd(100,400),atk:()=>rnd(5,25)},outcome:()=>'星光之力涌入体内，经脉拓宽了不少'},
    {text:'请人炼制成法器',cls:'ok',effect:{equip:()=>pick(EQUIP_TEMPLATES.slice(3)).n,gold:()=>-100},outcome:()=>'虽然花了不少灵石，但得到了一件极品法器'},
    {text:'直接出售',cls:'',effect:{gold:()=>rnd(300,800)},outcome:()=>'识货的炼器师出了大价钱'}]},

  {tpl:'你在{place}遇到一位行将就木的老修士。他气息微弱，显然是寿元将尽。\n\n"年轻人…过来…"老人艰难地说道，"我已时日无多，但有件事放心不下…我年轻时在{place}藏了一本秘笈，那里现在被{rd}妖兽占据，我无力取回…你帮我去取来。"\n\n老人的眼神充满期盼。',
   choices:[
    {text:'答应取秘笈',cls:'dan',effect:{exp:()=>rnd(80,300),skill:()=>pick(SKILLS.slice(3)).n},outcome:()=>'历经一番战斗，你取回了秘笈！老人含笑而去，将秘笈赠予了你'},
    {text:'婉拒但照顾老人',cls:'ok',effect:{exp:()=>rnd(40,120),gold:()=>rnd(30,100)},outcome:()=>'老人感激你的善心，将积蓄的灵石送给了你'},
    {text:'置之不理',cls:'',effect:{exp:()=>rnd(10,40)},outcome:()=>'你匆匆离去…但心中总有些不踏实'}]},
];

// ===== 传承剧情池 (legacy) =====
STORY_POOL.legacy=[
  {tpl:'你踏入一处{place}的古老洞府，正中悬浮着一团金色光球。一道苍老而威严的声音在脑海中响起：\n\n"吾乃上古{npc}，纵横仙界三千年，今留传承于此，以待有缘之人。接受吾之传承，可得吾毕生所学——但需承受传承之力的考验，意志不坚者将魂飞魄散！"\n\n金色光球中隐约可见无数功法、丹药、法器的虚影。',
   choices:[

  {tpl:'{place}你发现了一处符箓大师{npc}留下的洞府。墙上密密麻麻贴满了各种符纸，桌案上摆着朱砂、符笔和半成品符箓。\n\n符箓之道精深玄妙——一道上品的攻击符，能发挥出相当于使用者数倍的攻击力。',
   choices:[
    {text:'学习符箓之道',cls:'pri',effect:{exp:()=>rnd(50,200),atk:()=>rnd(5,20)},outcome:()=>'你悟出了一些符箓的窍门，将符咒之力融入攻击中'},
    {text:'收集成品符箓',cls:'ok',effect:{gold:()=>rnd(80,250),exp:()=>rnd(20,80)},outcome:()=>'桌上还有不少成品符箓，价值不菲'},
    {text:'尝试画一张符',cls:'dan',effect:{exp:()=>rnd(30,150),talent:()=>chance(20)?1:0},outcome:()=>chance(50)?'第一次画符居然成功了！天赋不错':'画歪了…符纸炸开，但炸开的灵气被你吸收'}]},
];

// ===== 新事件: 灵果树 (fruit) =====
STORY_POOL.fruit=[
  {tpl:'{place}生长着一株巨大的灵果树，树上结满了各色灵果。{herb}尤其引人注目，已经熟透了。\n\n灵果树根深扎于灵脉之上，日夜吸收大地灵气。结出的灵果不仅有疗伤功效，长期服用还能改善体质。\n\n树下还有几只灵兽在啃食落果。',
   choices:[
    {text:'采摘灵果',cls:'pri',effect:{item:()=>pick(HERBS),heal:()=>Math.floor(effMaxHp()*0.3),hpBonus:()=>rnd(5,20)},outcome:()=>'摘到了几颗上好的灵果'},
    {text:'在树下打坐吸收灵气',cls:'ok',effect:{exp:()=>rnd(60,200),def:()=>rnd(2,10)},outcome:()=>'树根处的灵气比普通修炼点浓郁得多'},
    {text:'尝试驯服树下的灵兽',cls:'',effect:{beast:()=>pick(BEASTS.slice(0,2)).n,exp:()=>rnd(20,80)},outcome:()=>chance(40)?'一只灵兽对你产生了亲近感！':'灵兽跑掉了…但也算一次有趣的经历'}]},
];

// ===== 仙府 (immortalCave) =====
STORY_POOL.immortalCave=[
  {tpl:'{place}的云雾散开，一座完整的仙府呈现眼前——与之前的残破遗迹不同，这座仙府保存完好！\n\n朱红色的大门虚掩着，门楣上刻着"{place}洞天"四个大字。推开大门，里面别有洞天——亭台楼阁、小桥流水，灵气浓郁得几乎化为液态。\n\n正殿中供奉着{npc}的神像，手中捧着一卷散发着金光的玉简。',
   choices:[
    {text:'取走玉简',cls:'pri',effect:{exp:()=>rnd(150,500),skill:()=>pick(SKILLS.slice(8)).n},outcome:()=>'玉简中记载着仙府主人的核心功法！'},
    {text:'在仙府中修炼',cls:'ok',effect:{exp:()=>rnd(100,400),hpBonus:()=>rnd(20,80),talent:()=>chance(30)?1:0},outcome:()=>'仙府中的灵气浓度比外界高数十倍'},
    {text:'收刮仙府宝贝',cls:'',effect:{gold:()=>rnd(200,800),equip:()=>pick(EQUIP_TEMPLATES.slice(6)).n},outcome:()=>'仙府中值钱的东西不少'}]},
];

STORY_POOL.pillShop=[
  {tpl:'{place}路边有一间挂着"{npc}丹坊"招牌的小店，药香扑鼻。店主是一位头发花白的炼丹师，正在炉前忙碌。\n\n"道友来得正好！刚出炉的上品{pill}，品质绝佳！要不要来几颗？"\n\n货架上琳琅满目：聚灵丹、筑基丹、回春丹…应有尽有。',
   choices:[
    {text:'购买{pill}(💎200)',cls:'pri',effect:{exp:()=>rnd(150,400),heal:()=>Math.floor(effMaxHp()*0.4)},outcome:()=>P.gold>=200?'一口吞下丹药，顿时灵力充沛！':'灵石不够…'},
    {text:'请教炼丹技巧',cls:'ok',effect:{exp:()=>rnd(60,200),talent:()=>chance(25)?1:0},outcome:()=>'老丹师心情好，传授了些窍门'},
    {text:'承接炼丹任务',cls:'cy',effect:{gold:()=>rnd(150,400),exp:()=>rnd(30,120)},outcome:()=>'帮老丹师整理了一天药材，赚了些工钱'}]},
];

STORY_POOL.beastDen=[
  {tpl:'{place}深处你发现了一处兽巢——{beastName}的巢穴！巢中有几颗闪闪发光的灵兽蛋，还有不少妖兽收集的宝物。\n\n母兽似乎不在家，但随时可能回来。你必须尽快做决定…',
   choices:[
    {text:'偷取灵兽蛋',cls:'dan',effect:{beast:()=>pick(BEASTS).n,exp:()=>rnd(60,200)},outcome:()=>chance(60)?'成功抱走一颗蛋！孵化后获得一只灵兽':'母兽回来了！虽然没拿到蛋但战斗中有所感悟'},
    {text:'收集巢中宝物',cls:'ok',effect:{gold:()=>rnd(100,500),equip:()=>chance(30)?pick(EQUIP_TEMPLATES.slice(2,5)).n:null},outcome:()=>'兽巢里散落着不少修士丢失的宝物'},
    {text:'悄悄离开',cls:'',effect:{exp:()=>rnd(30,100)},outcome:()=>'安全第一…但也观察到了一些妖兽习性'}]},
];

STORY_POOL.spiritVein=[
  {tpl:'{place}地下传来强大的灵力波动——这里是地下灵脉的节点！肉眼可见的灵气从地面裂缝中涌出，形成了小范围的灵雾。\n\n如果能在这里布置一个聚灵阵，修炼效果会非常惊人。不过灵脉节点通常被各大宗门掌控，擅自占据可能会有麻烦。',
   choices:[
    {text:'布置简易聚灵阵(💎80)',cls:'pri',effect:{exp:()=>rnd(200,600),def:()=>rnd(3,15)},outcome:()=>P.gold>=80?'聚灵阵运转起来，灵气洪流涌入体内！':'灵石不够，只能直接修炼了'},
    {text:'直接在此修炼',cls:'ok',effect:{exp:()=>rnd(80,300),hpBonus:()=>rnd(10,40)},outcome:()=>'虽然没有阵法加持，但灵脉节点的效果已经很好了'},

];

STORY_POOL.tradeRoute=[

    {text:'加入商队走一段',cls:'cy',effect:{exp:()=>rnd(60,250),gold:()=>rnd(50,200)},outcome:()=>'跟着商队走了一程，既安全又长见识'}]},

STORY_POOL.starPlatform=[
  {tpl:'{place}的山顶上有一座古老的观星台。石台由整块星辰石雕成，上面刻着周天星斗的图谱。\n\n今夜星空格外明亮，观星台上的符文开始自动发光——似乎是千年前的某个禁制被触发。\n\n满天星斗的光辉汇聚成一道光柱，将你笼罩其中。星辰之力在体内流转…',
   choices:[
    {text:'吸收星辰之力',cls:'pri',effect:{exp:()=>rnd(100,450),atk:()=>rnd(5,30),hpBonus:()=>rnd(15,60)},outcome:()=>'星辰之力淬炼了你的肉身和灵力'},
    {text:'参悟星图',cls:'ok',effect:{exp:()=>rnd(80,300),talent:()=>chance(30)?1:0,def:()=>rnd(3,18)},outcome:()=>'星图中蕴含的玄妙法则让你沉迷'},
    {text:'激活观星台禁制',cls:'dan',effect:{exp:()=>rnd(50,200),gold:()=>rnd(100,500)},outcome:()=>chance(55)?'禁制打开了一个小空间，里面有些值钱的东西':'禁制反噬…但也不算太糟'}]},
];

STORY_POOL.soulPool=[
  {tpl:'{place}隐藏着一处"洗魂池"——传说中能洗涤神魂的灵池。池水呈乳白色，散发着柔和的荧光。池底沉着几块"魂玉"，是神魂之力凝结的宝物。\n\n洗魂池对心境的淬炼效果远超普通灵泉，但池水的温度极低，意志不坚者无法久留。',
   choices:[

STORY_POOL.cave=[
  {tpl:'{place}的山壁上有一个不起眼的洞口。走进去后发现别有洞天——溶洞中钟乳石林立，中央有一潭清澈见底的地下湖。\n\n湖底闪烁着蓝光——那是一块巨大的{ore}原矿！纯度高得惊人，是从未见过的极品品质。\n\n不过在湖水深处，有一双巨大的眼睛正在注视着你…',
   choices:[
    {text:'冒险采掘原矿',cls:'dan',effect:{gold:()=>rnd(200,800),exp:()=>rnd(60,200),equip:()=>chance(40)?pick(EQUIP_TEMPLATES.slice(5,10)).n:null},outcome:()=>chance(65)?'成功采到矿！湖中的生物最终没有攻击':'湖中生物冲了出来…虽然打了一架但矿也到手了'},
    {text:'绕开湖水探索洞穴',cls:'pri',effect:{exp:()=>rnd(60,250),item:()=>pick(HERBS),gold:()=>rnd(50,200)},outcome:()=>'洞穴的其他角落有不少灵草和散落矿石'},
    {text:'悄悄退出去',cls:'',effect:{exp:()=>rnd(20,80),def:()=>rnd(2,8)},outcome:()=>'安全离开，观察到的洞穴环境让你学到了一些探索技巧'}]},
];

// ===== 天门 (celestialGate) =====
STORY_POOL.celestialGate=[
  {tpl:'{place}的上空突然霞光万丈，一扇巨大无比的金色天门缓缓开启！这是传说中千年才出现一次的"仙界之门"。\n\n门中隐约可见琼楼玉宇、仙鹤飞舞。一道宏伟的声音从天门中传出："凡界修士，通过天门考验者可获仙缘。"\n\n三道仙光从门中射出，分别呈现金、青、紫三色。',
   choices:[
    {text:'踏入金门(攻击试炼)',cls:'dan',effect:{atk:()=>rnd(10,50),exp:()=>rnd(100,500)},outcome:()=>'金门中是无穷的剑气考验，你咬牙坚持了下来'},

    {text:'踏入紫门(道心试炼)',cls:'ok',effect:{talent:()=>chance(40)?2:1,exp:()=>rnd(80,400)},outcome:()=>'紫门直指本心，道心更加坚定'}]},
];

STORY_POOL.swordGrave=[
  {tpl:'{place}地下沉睡着成千上万柄神剑。每一柄剑都曾是一位陨落剑仙的配剑，剑身虽已锈蚀但剑意犹存。\n\n空气中弥漫着凌厉的剑气，每走一步都能感受到无数剑意的共鸣。中央有一柄巨大的石剑——剑冢之主的配剑。\n\n你感受到其中一柄剑在呼唤你…',
   choices:[
    {text:'尝试拔剑',cls:'dan',effect:{atk:()=>rnd(10,60),equip:()=>chance(50)?pick(EQUIP_TEMPLATES.slice(8,15)).n:null},outcome:()=>chance(55)?'神剑认主！一柄古剑拔地而起落入你手中':'剑气太强了…但剑意已融入你的攻击之中'},

    {text:'收集剑碎',cls:'ok',effect:{gold:()=>rnd(150,500)},outcome:()=>'剑碎虽小，但材质都是天品材料'}]},
];

   choices:[

function checkAchievements(){
  if(!P.achievements)P.achievements=[];
  if(!P.achvBonus)P.achvBonus={atk:0,def:0,hpBonus:0,goldBonus:0};
  let anyNew=false;
  for(const a of ACHIEVEMENTS){
    if(P.achievements.includes(a.id))continue;
    if(a.check()){
      P.achievements.push(a.id);
      const r=a.reward;
      if(r.atk)P.achvBonus.atk+=r.atk;
      if(r.def)P.achvBonus.def+=r.def;
      if(r.hpBonus)P.achvBonus.hpBonus+=r.hpBonus;
      if(r.goldBonus){P.gold+=r.goldBonus;}
      anyNew=true;
      showToast(`🏆 成就解锁: ${a.n}！`);
    }
  }
  if(anyNew)save();
}

function rd(){return REALMS[Math.min(P.realm,REALMS.length-1)];}
function nrd(){return REALMS[Math.min(P.realm+1,REALMS.length-1)];}
function isMax(){return P.realm>=REALMS.length-1;}

// 计算属性
function effAtk(){
  let a=P.atk+P.permAtk+(P.achvBonus?.atk||0)+(P.equippedWeapon?P.equippedWeapon.atk||0:0)+(P.equippedArmor?P.equippedArmor.atk||0:0)+(P.equippedAcc?P.equippedAcc.atk||0:0);
  for(const s of(P.equippedSkills||[]))if(s)a+=s.atk*s.lvl;
  if(P.beastDeployed&&P.beast&&P.beast.eff.atkBonus)a+=Math.floor(a*(P.beast.eff.atkBonus||0));
  if(P.pillsUsed?.atkTemp>0&&P.pillsUsed?.lasts>0)a+=P.pillsUsed.atkTemp;
  return Math.max(0,a);}
function effDef(){
  let d=P.def+P.permDef+(P.achvBonus?.def||0)+(P.equippedWeapon?P.equippedWeapon.def||0:0)+(P.equippedArmor?P.equippedArmor.def||0:0)+(P.equippedAcc?P.equippedAcc.def||0:0);
  for(const s of(P.equippedSkills||[]))if(s)d+=s.def*s.lvl;
  if(P.beastDeployed&&P.beast&&P.beast.eff.defBonus)d+=Math.floor(d*(P.beast.eff.defBonus||0));
  if(P.pillsUsed?.defTemp>0&&P.pillsUsed?.lasts>0)d+=P.pillsUsed.defTemp;
  return Math.max(0,d);}
function effMaxHp(){
  let h=P.maxHp+P.permHp+(P.achvBonus?.hpBonus||0)+(P.equippedWeapon?P.equippedWeapon.hp||0:0)+(P.equippedArmor?P.equippedArmor.hp||0:0)+(P.equippedAcc?P.equippedAcc.hp||0:0);
  for(const s of(P.equippedSkills||[]))if(s)h+=s.hp*s.lvl;
  if(P.path==='body')h*=2;return Math.max(1,h);}
function expBonus(){
  let b=1;if(P.path==='magic')b+=.5;
  if(P.beast&&P.beast.type==='assist')b+=P.beast.eff.expBonus||0;
  if(P.beastDeployed&&P.beast&&P.beast.eff.expBonus)b+=P.beast.eff.expBonus||0;
  return b;}
function healAfterBattle(){
  let h=0;if(P.path==='body')h=.3;
  if(P.beastDeployed&&P.beast&&P.beast.type==='heal')h+=P.beast.eff.healAfter||0;
  return h;}

// 自动突破
function checkRealmUp(){
  if(isMax())return false;
  if(P.exp>=nrd().exp){const nr=nrd();P.realm++;P.atk=nr.atk;P.def=nr.def;P.maxHp=nr.hp;P.hp=nr.hp;showToast(`⚡ 突破！→ ${nr.n}`);checkAchievements();return true;}
  return false;
}

    'adventure','legacy','partner','furnace','mine','spring','ruin','tribulation','stele','garden','demon',

const mapEl=document.getElementById('map'),modal=document.getElementById('modal');

function showToast(msg){toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2000);}
function nval(v){if(v<0)return '-'+nval(-v);return v<1000?String(v):v<1e6?(v/1e3).toFixed(1)+'K':(v/1e6).toFixed(1)+'M';}
function showModal(title,body,buttons){
  modalIn.innerHTML=`<h2>${title}</h2><div>${body}</div>${buttons.map((b,i)=>`<button class="btn ${b.cls||''}" id="modal-btn-${i}">${b.text}</button>`).join('')}`;

function uh(){
  document.getElementById('hdr-realm').textContent=rd().n+(P.path?` [${PATHS[P.path].n}]`:'');
  document.getElementById('hdr-atk').textContent=nval(effAtk());
  document.getElementById('hdr-def').textContent=nval(effDef());
  document.getElementById('hdr-hp').textContent=nval(P.hp)+'/'+nval(effMaxHp());
  document.getElementById('hdr-gold').textContent=nval(P.gold);
  document.getElementById('hdr-layer').textContent=P.currentLayer+1;
  document.getElementById('hdr-kills').textContent=P.kills;
  document.getElementById('hdr-talent').textContent=P.talentPts||0;
  document.getElementById('hdr-ach').textContent=(P.achievements||[]).length;
}

function renderMap(){
  uh();mapEl.innerHTML='';
  // 自动扩展地图
  while(P.mapCells.length<=P.playerPos+10){
    const pool=getMapPool();
    for(let i=0;i<100;i++){
      let type=pool[Math.floor(Math.random()*pool.length)];
      if((P.mapCells.length+i)>0&&(P.mapCells.length+i)%20===0)type='boss';
      P.mapCells.push({type,done:false});
    }
  }
  P.currentLayer=Math.floor(P.playerPos/5);
  const halfRows=5;
  let start=Math.max(0,(P.currentLayer-halfRows)*5);
  let end=Math.min(P.mapCells.length,(P.currentLayer+halfRows+1)*5);
  if(end-start<50){start=Math.max(0,end-50);}
  for(let i=start;i<end;i++){
    const c=cellAt(i);const ct=CELL_TYPES[c.type]||CELL_TYPES.empty;
    const div=document.createElement('div');
    const isCurrent=i===P.playerPos;
    div.className='cell'+(c.done?' done':'')+(isCurrent?' current':'');
    div.innerHTML=`<span style="font-size:1.3rem">${ct.icon}</span><span class="label">${ct.n}</span>`;
    if(isCurrent){
      div.id='player-marker';
      div.innerHTML=`<span style="font-size:1.5rem">🧘</span><span class="label" style="color:#64b5f6">你在这里</span>`;
    }
    if(c.done)div.innerHTML+=`<span class="mark">✓</span>`;
    if(isCurrent){}
    else if(c.done){div.onclick=()=>moveTo(i,true);}
    else{div.onclick=()=>moveTo(i,false);}
    mapEl.appendChild(div);
  }
  setTimeout(()=>{const pm=document.getElementById('player-marker');if(pm)pm.scrollIntoView({behavior:'smooth',block:'center'});},100);
}

function moveTo(idx,isDone){
  if(idx<0||idx>=P.mapCells.length)return;
  P.playerPos=idx;P.currentLayer=Math.floor(idx/5);
  if(P.currentLayer>P.maxLayer)P.maxLayer=P.currentLayer;
  // 丹效递减(仅在新格子战斗时触发，通过encounter间接递减)
  if(!isDone){
    // 只有未完成的格子才触发事件
    if(P.pillsUsed?.lasts>0&&cellAt(idx).type==='enemy'){P.pillsUsed.lasts--;if(P.pillsUsed.lasts<=0){P.pillsUsed.atkTemp=0;P.pillsUsed.defTemp=0;}}
    encounter(idx);
  }
  renderMap();save();
}

    tradeRoute:()=>doStoryEvent(idx,'tradeRoute'),starPlatform:()=>doStoryEvent(idx,'starPlatform'),
    soulPool:()=>doStoryEvent(idx,'soulPool'),cave:()=>doStoryEvent(idx,'cave'),
    celestialGate:()=>doStoryEvent(idx,'celestialGate'),swordGrave:()=>doStoryEvent(idx,'swordGrave'),
    pillRiver:()=>doStoryEvent(idx,'pillRiver'),beastWave:()=>doStoryEvent(idx,'beastWave'),
    meditation:()=>doStoryEvent(idx,'meditation'),timeRift:()=>doStoryEvent(idx,'timeRift'),
    thunderPool:()=>doStoryEvent(idx,'thunderPool'),divineTree:()=>doStoryEvent(idx,'divineTree'),
    tradeFair:()=>doStoryEvent(idx,'tradeFair'),dreamLand:()=>doStoryEvent(idx,'dreamLand'),
    arena:()=>doStoryEvent(idx,'arena'),
  };
  if(handlers[c.type])handlers[c.type](idx);
  else doTrain(idx);
}

function completeCell(idx){
  if(idx>=0&&idx<P.mapCells.length&&P.mapCells[idx]){
    P.mapCells[idx].done=true;
  }
  renderMap();checkAchievements();
}

// ═══════════════════════════════════════
// 动态故事事件（核心引擎）
// ═══════════════════════════════════════
function doStoryEvent(idx,poolKey){
  const pool=STORY_POOL[poolKey];
  if(!pool||pool.length===0){doTrain(idx);return;}
  const story=pick(pool);
  const ctx=S();
  const narrative=fill(story.tpl,ctx);

  let btns=story.choices.map(ch=>{
    const cost=textCost(ch.text);
    return {text:fill(ch.text,ctx),cls:ch.cls||'pri',fn:()=>{
      if(cost>0&&P.gold<cost){showToast('灵石不足！');return;}
      if(cost>0)P.gold-=cost;
      const eff={};if(ch.effect){for(const[k,v]of Object.entries(ch.effect)){
        if(typeof v==='function')eff[k]=v();else eff[k]=v;
      }}
      applyEffect(eff);
      const outcome=ch.outcome?fill(typeof ch.outcome==='function'?ch.outcome():ch.outcome,ctx):effDesc(eff);
      showToast(effDesc(eff));
      checkRealmUp();
      completeCell(idx);
    }};
  });
  // 加一个跳过按钮
  btns.push({text:'继续前行',cls:'',fn:()=>{completeCell(idx);}});
  storyHTML(`🎲 ${fill(story.title||CELL_TYPES[poolKey]?.n||'事件',ctx)}`,narrative,btns);
}

function textCost(t){const m=t.match(/💎(\d+)/);return m?parseInt(m[1]):0;}

function storyHTML(title,narrative,buttons){
  showModal(title,`<div class="story-text">${narrative.replace(/\n/g,'<br>')}</div>`,buttons);
}

// ═══════════════════════════════════════
// 基础事件（保留原有逻辑+增强）
// ═══════════════════════════════════════
function doTrain(idx){
  const gain=Math.floor((15+P.realm*5)*expBonus());
  P.exp+=gain;P.hp=Math.min(effMaxHp(),P.hp+Math.floor(effMaxHp()*.05));
  P.cultivationCount++;
  checkRealmUp();
  showToast(`🧘 修炼 +${nval(gain)}修为`);
  completeCell(idx);
}

function battleCore(enemy,bossMode){
  let pHp=P.hp,eHp=enemy.hp,log=[`⚔️ 遭遇 ${enemy.icon} ${enemy.n}`,''],turn=0;
  const maxT=bossMode?40:30;
  while(pHp>0&&eHp>0&&turn<maxT){turn++;
    const pd=Math.max(1,effAtk()-enemy.def+Math.floor(Math.random()*(bossMode?8:6)));eHp-=pd;
    log.push(`${turn}. 你造成 <span class="hit">${pd}</span> 伤害`);
    if(eHp<=0){log.push(`<span class="gold">🎉 胜利！+${nval(enemy.exp)}修 +${nval(enemy.gold)}💎</span>`);break;}
    const ed=Math.max(1,enemy.atk-effDef()+Math.floor(Math.random()*(bossMode?5:4)));pHp-=ed;
    log.push(`   ${enemy.n}反击 <span class="hit">${ed}</span> 伤害`);if(pHp<=0)break;
  }
  return {won:eHp<=0,pHp:Math.max(1,pHp),log};
}

function doBattle(idx){
  const r=rd();const lvl=P.currentLayer;
  const enemy={n:`${['小','中','大','精英','首领'][Math.min(4,Math.floor(lvl/30))]}${['妖','魔','鬼怪','妖兽','凶兽'][Math.floor(Math.random()*5)]}`,
    hp:Math.floor((30+P.realm*20+lvl*5)*(.7+Math.random()*.6)),
    atk:Math.floor((effAtk()*.3+effAtk()*.7*Math.random())*(.5+lvl*.02)),
    def:Math.floor(effDef()*.3+lvl*.8),
    exp:Math.floor((20+P.realm*8+lvl*3)*expBonus()),
    gold:Math.floor((10+P.realm*5+lvl*2)),icon:'👹'};
  if(P.path==='spirit')enemy.atk=Math.floor(enemy.atk*.8);
  if(P.beastDeployed&&P.beast&&P.beast.type==='spirit')enemy.atk=Math.floor(enemy.atk*(1-(P.beast.eff.enemyAtkDebuff||0)));

  const result=battleCore(enemy,false);P.hp=result.pHp;P.kills++;
  if(result.won){P.exp+=enemy.exp;P.gold+=enemy.gold;
    const heal=healAfterBattle();if(heal>0){const hh=Math.floor(effMaxHp()*heal);P.hp=Math.min(effMaxHp(),P.hp+hh);result.log.push(`<span class="heal">战后恢复 +${nval(hh)}气血</span>`);}
    if(Math.random()<.2){const mat=pick(HERBS);result.log.push(`<span class="gold">📦 掉落: ${mat}</span>`);if(!P.bag)P.bag=[];P.bag.push({n:mat,icon:'🌿',type:'mat'});}
    checkRealmUp();completeCell(idx);
  }else{showToast('💀 战败…回退一格');P.playerPos=Math.max(0,idx-1);P.currentLayer=Math.floor(P.playerPos/5);}
  showModal(result.won?'战斗胜利':'战斗结果','<div class="battle-log">'+result.log.join('<br>')+'</div>',[{text:'确定',cls:'pri',fn:()=>renderMap()}]);
}

function doTreasure(idx){
  const r=Math.random();let msg='',eff={};
  if(r<.35){eff.gold=rnd(30,150+P.realm*15);msg=`💎 灵石 +${nval(eff.gold)}`;}
  else if(r<.65){eff.exp=rnd(40,200+P.realm*20);msg=`✨ 修为 +${nval(eff.exp)}`;}
  else if(r<.85){eff.equip=pick(EQUIP_TEMPLATES.slice(0,Math.min(6,3+Math.floor(P.currentLayer/20)))).n;msg=`🗡️ 获得 ${eff.equip}！`;}
  else{eff.heal=effMaxHp();P.hp=effMaxHp();msg='❤️ 气血回满！';}
  applyEffect(eff);showToast(msg);completeCell(idx);
}

function doShopEnc(idx){
  let h=`<p style="font-size:.55rem">路过此地的行脚商人</p><div class="item-grid">`;
  const shopItems=pickN(EQUIP_TEMPLATES,6);
  shopItems.forEach((eq,i)=>{
    h+=`<div class="item-card" onclick="buyEquipEnc(${i},${idx})"><span class="it">${eq.icon}</span><span class="in">${eq.n}</span><span class="itier">${eq.tier}</span><span class="istat">${eq.atk?'⚔+'+eq.atk:''}${eq.def?' 🛡+'+eq.def:''}${eq.hp?' ❤+'+eq.hp:''}</span><span style="font-size:.4rem;color:var(--gold)">💎${eq.cost}</span></div>`;
  });
  const cons=pick(CONSUMABLES);
  h+=`<div class="item-card" onclick="buyConsEnc(${idx},'${cons.n}')"><span class="it">${cons.icon}</span><span class="in">${cons.n}</span><span class="itier">${cons.desc||''}</span><span style="font-size:.4rem;color:var(--gold)">💎${cons.cost}</span></div>`;
  h+=`</div>`;
  showModal('🏪 行脚商',h,[{text:'离开',cls:'',fn:()=>{completeCell(idx);renderMap();}}]);
  window._shopItems=shopItems;window._shopCons=cons;
}
function buyEquipEnc(i,idx){const eq=window._shopItems[i];if(!eq||P.gold<eq.cost)return;P.gold-=eq.cost;if(!P.bag)P.bag=[];P.bag.push({...eq,type:'weapon'});showToast(`购买 ${eq.n}`);completeCell(idx);renderMap();modal.classList.add('hidden');}
function buyConsEnc(idx,cn){const c=CONSUMABLES.find(x=>x.n===cn);if(!c||P.gold<c.cost)return;P.gold-=c.cost;if(!P.consumables)P.consumables=[];P.consumables.push({...c});showToast(`购买 ${c.n}`);completeCell(idx);renderMap();modal.classList.add('hidden');}

function doSecret(idx){
  let step=0;
  function goStep(){
    const events=[
      {l:'左',desc:'感悟天地法则',fn:()=>{const e=Math.floor((50+P.realm*30)*expBonus());P.exp+=e;showToast(`感悟 +${nval(e)}修为`);}},
      {l:'中',desc:'收集灵石矿脉',fn:()=>{const g=rnd(60,150+P.realm*20);P.gold+=g;showToast(`矿脉 +${nval(g)}💎`);}},
      {l:'右',desc:'灵泉恢复伤势',fn:()=>{P.hp=effMaxHp();showToast('灵泉 气血回满！');}}];
    if(step>=3){completeCell(idx);showToast('秘境探索完毕');checkRealmUp();renderMap();return;}
    step++;
    let btns=events.map(e=>({text:`${e.l} - ${e.desc}`,cls:'pri',fn:()=>{e.fn();goStep();}}));
    showModal(`🏛️ 秘境 第${step}层`,'<p>选择一条路径…</p>',btns);
  }
  goStep();
}

function doBoss(idx){
  const lvl=P.currentLayer;const boss={n:`第${P.currentLayer+1}层守护者`,
    hp:Math.floor((100+P.realm*50+lvl*20)*(.8+Math.random()*.4)),
    atk:Math.floor(effAtk()*.5+lvl*3),def:Math.floor(effDef()*.5+lvl*2),
    exp:Math.floor((150+P.realm*40+lvl*15)*expBonus()),gold:rnd(100,300+P.realm*20+lvl*10),icon:'💀'};
  if(P.path==='spirit')boss.atk=Math.floor(boss.atk*.8);
  if(P.beastDeployed&&P.beast&&P.beast.type==='spirit')boss.atk=Math.floor(boss.atk*(1-(P.beast.eff.enemyAtkDebuff||0)));

  const result=battleCore(boss,true);P.hp=result.pHp;
  if(result.won){P.exp+=boss.exp;P.gold+=boss.gold;P.kills++;
    const heal=healAfterBattle();if(heal>0)P.hp=Math.min(effMaxHp(),P.hp+Math.floor(effMaxHp()*heal));
    // BOSS掉落更好
    if(chance(50)){const eq=pick(EQUIP_TEMPLATES.slice(2,6));if(!P.bag)P.bag=[];P.bag.push({...eq,type:'weapon'});result.log.push(`<span class="gold">📦 BOSS掉落: ${eq.n}！</span>`);}
    checkRealmUp();completeCell(idx);
  }else{showToast('💀 BOSS太强了…回退两格');P.playerPos=Math.max(0,idx-2);P.currentLayer=Math.floor(P.playerPos/5);}
  showModal(result.won?'BOSS战胜利':'BOSS战结果','<div class="battle-log">'+result.log.join('<br>')+'</div>',[{text:'确定',cls:'pri',fn:()=>renderMap()}]);
}

function doBeastEnc(idx){
  const b=pick(BEASTS);
  showModal('🐾 发现灵兽！',`<p>你遇到了一只 <strong>${b.icon} ${b.n}</strong></p><p style="font-size:.6rem">${b.desc}</p><p>是否收服？</p>`,[
    {text:`收服 ${b.n}`,cls:'pri',fn:()=>{P.beast={...b};showToast(`✅ 获得灵兽 ${b.n}！`);completeCell(idx);renderMap();}},
    {text:'离开',cls:'',fn:()=>{completeCell(idx);renderMap();}}]);
}

function doEquipEnc(idx){
  const tier=Math.min(EQUIP_TEMPLATES.length-1,3+Math.floor(P.currentLayer/12));
  const eq=pick(EQUIP_TEMPLATES.slice(0,tier+1));
  if(!P.bag)P.bag=[];P.bag.push({...eq});showToast(`发现 ${eq.icon} ${eq.n} [${eq.tier||'?'}]！`);completeCell(idx);

function doSkillEnc(idx){
  const avail=SKILLS.filter(s=>!(P.equippedSkills||[]).find(es=>es.n===s.n));

    {text:`习得 ${s.n}`,cls:'pri',fn:()=>{if(!P.equippedSkills)P.equippedSkills=[];if(!P.equippedSkills.find(es=>es.n===s.n))P.equippedSkills.push({...s,lvl:1});showToast(`✅ 习得 ${s.n}！`);checkAchievements();completeCell(idx);renderMap();}},
    {text:'离开',cls:'',fn:()=>{completeCell(idx);renderMap();}}]);
}

function openChar(){

    <div style="text-align:center;margin-bottom:6px">
      <div style="font-size:1.3rem;color:var(--gold2);font-weight:bold;letter-spacing:3px">${P.name}</div>

    <div class="deco-line"></div>

    <div class="stat-bar"><div class="s-hp" style="width:${Math.floor(P.hp/effMaxHp()*100)}%"></div></div>
    <div class="deco-line"></div>
    <div class="row"><span class="label"><svg class="ic ic-sm"><use href="#ic-paw"/></svg> 灵兽</span><span class="val">${P.beast?P.beast.icon+' '+P.beast.n+(P.beastDeployed?' ✅':' ⚠️'):'无'}</span></div>
    <div class="row"><span class="label"><svg class="ic ic-sm ic-gold"><use href="#ic-star"/></svg> 天赋点</span><span class="val" style="color:var(--gold)">${P.talentPts||0}</span></div>
    <div class="row"><span class="label">📊 永属加成</span><span class="val" style="font-size:.5rem">攻+${P.permAtk+(P.achvBonus?.atk||0)} 防+${P.permDef+(P.achvBonus?.def||0)} 血+${P.permHp+(P.achvBonus?.hpBonus||0)}</span></div>`;

  if(!P.path){
    h+=`<div class="deco-line"></div><p style="color:var(--gold)"><svg class="ic ic-sm ic-gold"><use href="#ic-compass"/></svg> 选择修炼方向：</p>`;

  }

  h+=`<div class="row"><span class="label"><svg class="ic ic-sm ic-blue"><use href="#ic-shield"/></svg> 防具</span><span class="val">${P.equippedArmor?P.equippedArmor.icon+' '+P.equippedArmor.n+' ['+P.equippedArmor.tier+']':'无'}${P.equippedArmor?` <button class="btn dan sm" onclick="unequipSlot('armor')">卸</button>`:''}</span></div>`;
  h+=`<div class="row"><span class="label">💍 饰品</span><span class="val">${P.equippedAcc?P.equippedAcc.icon+' '+P.equippedAcc.n+' ['+P.equippedAcc.tier+']': '无'}${P.equippedAcc?` <button class="btn dan sm" onclick="unequipSlot('acc')">卸</button>`:''}</span></div>`;

function unequipSlot(slot){
  if(slot==='weapon'&&P.equippedWeapon){if(!P.bag)P.bag=[];P.bag.push({...P.equippedWeapon});P.equippedWeapon=null;}
  else if(slot==='armor'&&P.equippedArmor){if(!P.bag)P.bag=[];P.bag.push({...P.equippedArmor});P.equippedArmor=null;}
  else if(slot==='acc'&&P.equippedAcc){if(!P.bag)P.bag=[];P.bag.push({...P.equippedAcc});P.equippedAcc=null;}
  renderMap();save();modal.classList.add('hidden');openChar();
}

function spendTalent(type){
  if(!P.talentPts||P.talentPts<=0)return;
  P.talentPts--;
  if(type==='atk')P.permAtk+=5;
  else if(type==='def')P.permDef+=3;
  else if(type==='hp')P.permHp+=30;
  showToast(`天赋点使用！${type==='atk'?'永攻+5':type==='def'?'永防+3':'永血+30'}`);
  checkAchievements();save();renderMap();modal.classList.add('hidden');openChar();
}

function choosePath(k){P.path=k;if(k==='body'){P.maxHp*=2;P.hp=P.maxHp;}showToast(`选择 ${PATHS[k].n} 方向！`);modal.classList.add('hidden');renderMap();save();}
function unequipWeapon(){if(P.equippedWeapon){if(!P.bag)P.bag=[];P.bag.push({...P.equippedWeapon,type:'weapon'});P.equippedWeapon=null;}renderMap();save();}

function openSkills(){
  let h=`<div class="tabs"><span class="tab active">全部功法</span><span class="tab">已习得(${(P.equippedSkills||[]).length})</span></div>`;
  h+=`<div class="item-grid">`;
  for(const s of SKILLS){
    const learned=(P.equippedSkills||[]).find(es=>es.n===s.n);
    const gradeClr={'黄阶':'#aaa','玄阶':'#5ba0d9','地阶':'#9b7ed9','天阶':'#e8a840','圣阶':'#e05555','帝阶':'#f0d68a'}[s.grade.substring(0,2)]||'#aaa';
    h+=`<div class="item-card${learned?' equipped':''}" onclick="${learned?'upgradeSkill(\"'+s.n+'\")':'learnSk(\"'+s.n+'\")'}">
      <span class="it">${s.icon}</span><span class="in">${s.n}</span>
      <span class="itier" style="color:${gradeClr}">${s.grade}</span>`;
    if(learned){
      h+=`<span class="istat">Lv${learned.lvl}/${s.maxLvl} ⚔${s.atk*learned.lvl} 🛡${s.def*learned.lvl} ❤${s.hp*learned.lvl}</span>
        <button class="btn ok sm" style="font-size:.4rem;margin-top:2px" ${learned.lvl>=s.maxLvl||P.gold<s.cost*learned.lvl?'disabled':''}>升💎${s.cost*learned.lvl}</button>`;
    }else{
      h+=`<span class="istat">⚔${s.atk} 🛡${s.def} ❤${s.hp}</span>
        <button class="btn sm" style="font-size:.4rem;margin-top:2px;color:var(--green)" ${P.gold<s.cost?'disabled':''}>习💎${s.cost}</button>`;
    }
    h+=`</div>`;
  }
  h+=`</div>`;
  showModal('📜 功法阁',h,[{text:'关闭',cls:''}]);
}
function learnSk(n){const s=SKILLS.find(sk=>sk.n===n);if(!s||P.gold<s.cost)return;if(!P.equippedSkills)P.equippedSkills=[];P.equippedSkills.push({...s,lvl:1});P.gold-=s.cost;showToast(`习得 ${s.n}`);checkAchievements();openSkills();save();renderMap();}
function upgradeSkill(n){const s=(P.equippedSkills||[]).find(es=>es.n===n);if(!s||s.lvl>=s.maxLvl||P.gold<s.cost*s.lvl)return;P.gold-=s.cost*s.lvl;s.lvl++;showToast(`${s.n} → Lv${s.lvl}`);openSkills();save();renderMap();}

let bagTab='all';
function openBag(tab){
  bagTab=tab||bagTab;
  let h=`<div class="tabs">`;
  const tabs=['all','weapon','armor','acc','consum','mat'];
  const tabNames={all:'📦全部',weapon:'⚔️武器',armor:'🛡️防具',acc:'💍饰品',consum:'💊丹药',mat:'🌿材料'};
  for(const t of tabs)h+=`<span class="tab${bagTab===t?' active':''}" onclick="openBag('${t}')">${tabNames[t]}</span>`;
  h+=`</div><div class="item-grid">`;
  let count=0;
  const allCons=P.consumables||[];
  if(bagTab==='all'||bagTab==='consum'){
    allCons.forEach((c,i)=>{
      h+=`<div class="premium-card" onclick="useCons(${i})"><span class="pc-icon">${c.icon}</span><span class="pc-name">${c.n}</span><span class="pc-tier" style="color:var(--green)">${c.desc||''}</span><span class="pc-stat" style="color:var(--green)">✨使用</span></div>`;
      count++;
    });
  }
  const items=P.bag||[];
  items.forEach((item,i)=>{
    if(bagTab!=='all'){
      if(bagTab==='weapon'&&item.type!=='weapon')return;
      if(bagTab==='armor'&&item.type!=='armor')return;
      if(bagTab==='acc'&&item.type!=='acc')return;
      if(bagTab==='mat'&&item.type!=='mat')return;
      if(bagTab==='consum')return;
    }
    count++;
    if(item.type==='weapon'||item.type==='armor'||item.type==='acc'){
      const tierMap={凡品:'tier-fan',灵品:'tier-ling',宝品:'tier-bao',仙品:'tier-xian',圣品:'tier-sheng'};
      const tierCls=tierMap[item.tier]||'';
      h+=`<div class="premium-card ${tierCls}" onclick="equipItem(${i})"><span class="pc-icon">${item.icon}</span><span class="pc-name">${item.n}</span><span class="pc-tier">${item.tier||''}</span><span class="pc-stat">${item.atk?'⚔+'+item.atk:''}${item.def?' 🛡+'+item.def:''}${item.hp?' ❤+'+item.hp:''}</span><span style="font-size:.42rem;color:var(--green)">✨装备</span></div>`;
    }else{
      h+=`<div class="premium-card" onclick="useItem(${i})"><span class="pc-icon">${item.icon}</span><span class="pc-name">${item.n}</span><span class="pc-tier" style="color:var(--text2)">${item.desc||''}</span><span class="pc-stat" style="color:var(--blue)">✨使用</span></div>`;
    }
  });
  if(count===0)h+=`<div style="grid-column:1/-1;text-align:center;color:var(--text3);padding:20px;font-size:.7rem">🎒 空空如也<br><span style="font-size:.5rem">探索地图获取物品</span></div>`;
  h+=`</div>`;
  showModal(`🎒 乾坤袋 (${count}件)`,h,[{text:'关闭',cls:''}]);
}

function equipItem(i){const item=(P.bag||[])[i];if(!item)return;
  if(item.type==='weapon'){const old=P.equippedWeapon;P.equippedWeapon=item;P.bag.splice(i,1);if(old)P.bag.push(old);}
  else if(item.type==='armor'){const old=P.equippedArmor;P.equippedArmor=item;P.bag.splice(i,1);if(old)P.bag.push(old);}
  else if(item.type==='acc'){const old=P.equippedAcc;P.equippedAcc=item;P.bag.splice(i,1);if(old)P.bag.push(old);}
  else return;
  showToast(`装备 ${item.n}！`);renderMap();save();modal.classList.add('hidden');openBag();
}

function useItem(i){const item=(P.bag||[])[i];if(!item)return;
  if(item.type==='mat'){P.exp+=rnd(40,150)*expBonus();showToast(`炼化 ${item.n} +修为`);}
  P.bag.splice(i,1);renderMap();save();modal.classList.add('hidden');openBag();}

function useCons(i){const c=(P.consumables||[])[i];if(!c)return;
  if(c.effect.heal)P.hp=Math.min(effMaxHp(),P.hp+Math.floor(effMaxHp()*c.effect.heal));
  if(c.effect.exp)P.exp+=Math.floor(c.effect.exp*expBonus());
  if(c.effect.permAtk)P.permAtk+=c.effect.permAtk;
  if(c.effect.permDef)P.permDef+=c.effect.permDef;
  if(c.effect.permHp)P.permHp+=c.effect.permHp;
  if(c.effect.talent)P.talentPts=(P.talentPts||0)+c.effect.talent;
  if(c.effect.atkTemp||c.effect.defTemp){
    if(!P.pillsUsed)P.pillsUsed={atkTemp:0,defTemp:0,lasts:0};
    P.pillsUsed.atkTemp=(c.effect.atkTemp||0);
    P.pillsUsed.defTemp=(c.effect.defTemp||0);
    P.pillsUsed.lasts=(c.effect.lasts||3);
  }
  showToast(`使用 ${c.n}！`);P.consumables.splice(i,1);renderMap();save();modal.classList.add('hidden');openBag();}

function openBeast(){
  let h='';
  if(P.beast){
    const b=P.beast;
    h+=`<div style="text-align:center;margin-bottom:8px">
      <div style="font-size:3rem">${b.icon}</div>
      <div style="font-size:.9rem;color:var(--gold2);font-weight:bold">${b.n}</div>
      <span class="badge gold">${b.rarity||''}兽</span>
      <span class="badge ${P.beastDeployed?'green':'red'}">${P.beastDeployed?'✅已出战':'⚠️未出战'}</span>
    </div>
    <div class="ui-card hl"><p style="margin:0">${b.desc}</p></div>
    <p class="info-tag">${b.deployDesc||''}</p>`;
    if(!P.beastDeployed)h+=`<button class="btn pri" onclick="deployBeast()">🐾 点击出战</button>`;
    else h+=`<button class="btn dan" onclick="recallBeast()">🔙 召回休息</button>`;
    h+=`<div class="deco-line"></div><p style="color:var(--text3);font-size:.5rem">📖 灵兽图鉴</p><div class="item-grid">`;
    for(const bb of BEASTS.slice(0,8)){
      h+=`<div class="item-card${P.beast&&P.beast.n===bb.n?' equipped':''}" style="cursor:default"><span class="it">${bb.icon}</span><span class="in">${bb.n}</span><span class="itier">${bb.rarity||''}兽</span></div>`;
    }
    h+=`</div>`;
  }else{
    h=`<p style="text-align:center;color:var(--text3);padding:20px">尚未拥有灵兽</p><p style="text-align:center;color:var(--text3);font-size:.5rem">在地图上探索🐾格子发现灵兽</p><div class="item-grid">`;
    for(const bb of BEASTS.slice(0,6)){
      h+=`<div class="item-card" style="cursor:default"><span class="it">${bb.icon}</span><span class="in">${bb.n}</span><span class="itier">${bb.rarity||''}兽</span><span class="istat">${bb.desc}</span></div>`;
    }
    h+=`</div>`;
  }
  showModal('🐾 灵兽',h,[{text:'关闭',cls:''}]);
}
function deployBeast(){P.beastDeployed=true;showToast(`🐾 ${P.beast.n} 出战！`);openBeast();renderMap();save();}
function recallBeast(){P.beastDeployed=false;showToast(`${P.beast.n} 已召回`);openBeast();renderMap();save();}

function openAchieve(){
  let h='';
  for(const a of ACHIEVEMENTS){
    const got=P.achievements&&P.achievements.includes(a.id);
    h+=`<div class="row"><span>${got?a.icon:'🔒'} ${a.n}</span><span style="font-size:.5rem;color:${got?'#81c784':'rgba(200,180,140,.3)'}">${a.desc}</span></div>`;
  }
  showModal('🏆 成就 ('+(P.achievements?.length||0)+'/'+ACHIEVEMENTS.length+')',h,[{text:'关闭',cls:''}]);
}

let shopTab='weapon';
function openShop(tab){
  shopTab=tab||shopTab;
  let h=`<div class="tabs">`;
  const ts=[{k:'weapon',n:'🗡️武器'},{k:'armor',n:'🛡️防具'},{k:'acc',n:'💍饰品'},{k:'consum',n:'💊丹药'}];
  for(const t of ts)h+=`<span class="tab${shopTab===t.k?' active':''}" onclick="openShop('${t.k}')">${t.n}</span>`;
  h+=`</div><div style="text-align:right;font-size:.5rem;color:var(--gold);margin-bottom:4px">💎 ${nval(P.gold)}</div><div class="item-grid">`;

  if(shopTab==='consum'){
    CONSUMABLES.forEach(c=>{
      h+=`<div class="item-card" onclick="buyCons('${c.n}')"><span class="it">${c.icon}</span><span class="in">${c.n}</span><span class="itier">${c.desc||''}</span><span class="istat">💎${c.cost}</span></div>`;
    });
  }else{
    const typeMap={weapon:'weapon',armor:'armor',acc:'acc'};
    EQUIP_TEMPLATES.filter(e=>e.type===typeMap[shopTab]).forEach(eq=>{
      h+=`<div class="item-card" onclick="buyEq('${eq.n}')"><span class="it">${eq.icon}</span><span class="in">${eq.n}</span><span class="itier">${eq.tier}</span><span class="istat">${eq.atk?'⚔+'+eq.atk:''}${eq.def?' 🛡+'+eq.def:''}${eq.hp?' ❤+'+eq.hp:''}</span><span style="font-size:.45rem;color:var(--gold)">💎${eq.cost}</span></div>`;
    });
  }
  h+=`</div>`;
  showModal(`🏪 坊市`,h,[{text:'关闭',cls:''}]);
}
function buyEq(n){const eq=EQUIP_TEMPLATES.find(e=>e.n===n);if(!eq||P.gold<eq.cost)return;P.gold-=eq.cost;if(!P.bag)P.bag=[];P.bag.push({...eq});showToast(`购买 ${eq.n}`);renderMap();save();modal.classList.add('hidden');openShop();}
function buyCons(n){const c=CONSUMABLES.find(x=>x.n===n);if(!c||P.gold<c.cost)return;P.gold-=c.cost;if(!P.consumables)P.consumables=[];P.consumables.push({...c});showToast(`购买 ${c.n}`);renderMap();save();modal.classList.add('hidden');openShop();}

function openAchieve(){
  let h=`<div style="text-align:center;font-size:.55rem;color:var(--gold);margin-bottom:6px">🏆 已完成 ${(P.achievements||[]).length} / ${ACHIEVEMENTS.length}</div><div class="item-grid" style="grid-template-columns:repeat(2,1fr)">`;
  for(const a of ACHIEVEMENTS){
    const got=P.achievements&&P.achievements.includes(a.id);
    h+=`<div class="item-card${got?' hl':''}" style="cursor:default;opacity:${got?'1':'.45'}">
      <span class="it">${a.icon}</span><span class="in">${a.n}</span>
      <span class="itier">${got?'✅ '+(a.rewardDesc||''):'🔒'}</span>
      <span class="istat" style="font-size:.4rem">${a.desc}</span></div>`;
  }
  h+=`</div>`;
  showModal('🏆 成就殿堂',h,[{text:'关闭',cls:''}]);
}

// ═══════════════════════════════════════
// 初始化
// ═══════════════════════════════════════
if(!P.mapCells||P.mapCells.length===0||P.mapCells.length<P.playerPos+1)genMap();
if(P.playerPos<0)P.playerPos=0;
// 确保 playerPos 不超出地图
if(P.playerPos>=P.mapCells.length){P.playerPos=0;P.currentLayer=0;}
if(P.hp<=0)P.hp=Math.floor(effMaxHp()*.3);
P.currentLayer=Math.floor(P.playerPos/5);
if(!P.bag)P.bag=[];
if(!P.equippedSkills)P.equippedSkills=[];
if(!P.achievements)P.achievements=[];
if(!P.achvBonus)P.achvBonus={atk:0,def:0,hpBonus:0,goldBonus:0};
if(!P.consumables)P.consumables=[];
if(!P.pillsUsed)P.pillsUsed={atkTemp:0,defTemp:0,lasts:0};
if(!P.materials)P.materials=[];
if(!P.equippedArmor)P.equippedArmor=null;
if(!P.equippedAcc)P.equippedAcc=null;
checkAchievements();

// 键盘快捷键
document.addEventListener('keydown',e=>{
  if(e.key==='r'||e.key==='R'){
    if(e.ctrlKey||e.metaKey)return;
    if(confirm('重置位置？这将把你移回地图起点。')){P.playerPos=0;P.currentLayer=0;P.mapCells.forEach(c=>c.done=false);renderMap();save();showToast('位置已重置');}
  }
});

// 自动恢复
setInterval(()=>{P.hp=Math.min(effMaxHp(),P.hp+Math.floor(effMaxHp()*.02));save();},10000);

renderMap();
// 启动后检查是否卡住
setTimeout(()=>{
  const forwardCells=P.mapCells.slice(P.playerPos+1,P.playerPos+51);
  const allDone=forwardCells.length>0&&forwardCells.every(c=>c.done);
  if(allDone)console.warn('⚠️ 检测到前方所有格子已完成，可能是存档问题。按R键重置位置。');
},500);
console.log('🎮 仙途v3.0 已启动 | 按R键可重置位置 | 地图:'+P.mapCells.length+'格 | 剧情池:'+Object.keys(STORY_POOL).length+'类');
</script>
