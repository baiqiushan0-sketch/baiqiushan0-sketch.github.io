<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>无限合成 · Infinite Craft</title>
<style>
/* ═══════════════ TOKENS ═══════════════ */
:root{
  --bg:#080814; --surface:rgba(12,10,24,.9); --surface2:rgba(18,14,32,.95);
  --gold:#c8a858; --gold2:#f0d68a; --cyan:#00e5ff; --magenta:#ff4081;
  --text:#c8bfa8; --text2:#8a8270; --text3:#4a4540;
  --radius:14px; --radius-sm:8px;
  --font:'PingFang SC','Microsoft YaHei',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{
  background:var(--bg);color:var(--text);font-family:var(--font);
  min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none;
  touch-action:manipulation;
  background-image:radial-gradient(ellipse 60% 50% at 50% -20%,rgba(200,168,88,.03),transparent),radial-gradient(ellipse 50% 40% at 80% 80%,rgba(0,229,255,.02),transparent);
}
#back{position:fixed;top:16px;left:16px;z-index:50}
#back a{color:rgba(255,255,255,.2);text-decoration:none;font-size:.65rem;letter-spacing:2px;transition:color .3s}
#back a:hover{color:rgba(255,255,255,.5)}
#particles{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ═══════════════ LAYOUT ═══════════════ */
#app{
  position:relative;z-index:1;max-width:900px;margin:0 auto;
  padding:60px 16px 40px;display:grid;
  grid-template-columns:1fr 320px;gap:16px;min-height:100vh;
  align-items:start;
}
#main-col{display:flex;flex-direction:column;gap:clamp(10px,1.5vh,16px)}

/* Recipe toggle */
#recipe-toggle{
  position:fixed;top:50%;right:0;z-index:55;transform:translateY(-50%);
  width:24px;height:60px;border-radius:12px 0 0 12px;
  background:var(--surface);border:1px solid rgba(255,255,255,.05);border-right:none;
  color:var(--text3);cursor:pointer;font-size:.55rem;letter-spacing:1px;
  writing-mode:vertical-lr;display:flex;align-items:center;justify-content:center;
  transition:all .3s;
}
#recipe-toggle:hover{color:var(--gold);border-color:rgba(200,168,88,.2)}
#recipe-toggle.open{right:320px}

/* Recipe sidebar */
#recipe-panel{
  position:fixed;right:-330px;top:0;bottom:0;width:320px;z-index:50;
  background:rgba(8,6,16,.97);border-left:1px solid rgba(255,255,255,.05);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  transition:right .35s cubic-bezier(.2,.9,.3,1);
  display:flex;flex-direction:column;overflow:hidden;
}
#recipe-panel.open{right:0}
#recipe-panel .rp-header{
  padding:16px;border-bottom:1px solid rgba(255,255,255,.04);
  display:flex;justify-content:space-between;align-items:center
}
#recipe-panel .rp-header h3{font-size:.7rem;font-weight:500;color:var(--gold);letter-spacing:2px}
#recipe-panel .rp-header span{font-size:.55rem;color:var(--text3)}
#recipe-panel .rp-list{
  flex:1;overflow-y:auto;padding:8px;
}
#recipe-panel .rp-list::-webkit-scrollbar{width:3px}
#recipe-panel .rp-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.04);border-radius:2px}
.rp-item{
  display:flex;align-items:center;gap:8px;padding:7px 10px;margin:2px 0;
  border-radius:8px;background:rgba(255,255,255,.01);font-size:.55rem;
  border:1px solid transparent;transition:all .2s;
}
.rp-item:hover{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.04)}
.rp-item .rp-emojis{font-size:.75rem;flex-shrink:0}
.rp-item .rp-arrow{color:var(--text3);margin:0 2px;flex-shrink:0}
.rp-item .rp-result{color:var(--gold);font-weight:500;flex-shrink:0}
.rp-item .rp-formula{color:var(--text3);flex:1;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rp-empty{text-align:center;padding:30px 16px;color:var(--text3);font-size:.6rem;letter-spacing:1px}

/* ═══════════════ HEADER ═══════════════ */
.header{text-align:center}
.header h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:200;letter-spacing:6px;
  background:linear-gradient(180deg,#f0e0b8,#c8a858);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;margin-bottom:2px}
.header .stats{font-size:.65rem;color:var(--text3);letter-spacing:2px}
.header .stats em{font-style:normal;color:var(--cyan);font-weight:600}

/* ═══════════════ COMBINE ═══════════════ */
.combine-area{display:flex;align-items:center;justify-content:center;gap:clamp(8px,2vw,16px);padding:4px 0}
.slot{
  width:clamp(75px,16vw,100px);height:clamp(75px,16vw,100px);
  border:2px dashed rgba(255,255,255,.06);border-radius:var(--radius);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:all .25s;cursor:pointer;background:rgba(255,255,255,.01);
}
.slot.filled{border-color:rgba(200,168,88,.25);background:rgba(200,168,88,.04);border-style:solid}
.slot .emoji{font-size:clamp(1.6rem,4.5vw,2.6rem);transition:transform .2s}
.slot .name{font-size:.5rem;color:var(--text3);margin-top:2px;letter-spacing:1px}
.slot.filled .name{color:var(--text2)}
.slot .placeholder{font-size:.5rem;color:var(--text3);opacity:.4;letter-spacing:1px}
.slot.pulse{animation:slotPulse .4s ease}
@keyframes slotPulse{0%,100%{box-shadow:0 0 0 rgba(200,168,88,0)}50%{box-shadow:0 0 30px rgba(200,168,88,.15)}}

.combine-btn{
  width:clamp(32px,7vw,44px);height:clamp(32px,7vw,44px);
  border-radius:50%;border:1px solid rgba(200,168,88,.15);
  background:rgba(200,168,88,.04);color:var(--gold);
  font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .3s;flex-shrink:0;
}
.combine-btn.ready{border-color:rgba(200,168,88,.4);background:rgba(200,168,88,.12);animation:glowPulse 1.5s infinite}
@keyframes glowPulse{0%,100%{box-shadow:0 0 15px rgba(200,168,88,.1)}50%{box-shadow:0 0 30px rgba(200,168,88,.25)}}

/* Result flash */
.result-flash{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:80;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  transition:transform .3s cubic-bezier(.2,1.2,.5,1);
}
.result-flash.show{transform:translate(-50%,-50%) scale(1)}
.result-flash .r-emoji{font-size:3.5rem;filter:drop-shadow(0 0 30px rgba(200,168,88,.5))}
.result-flash .r-name{font-size:.8rem;color:var(--gold2);letter-spacing:2px}
.result-flash .r-tag{font-size:.5rem;color:var(--cyan);letter-spacing:1px;padding:2px 8px;
  border:1px solid rgba(0,229,255,.2);border-radius:10px}
.result-flash.known .r-emoji{filter:drop-shadow(0 0 20px rgba(120,120,120,.3))}
.result-flash.known .r-name{color:var(--text3)}

/* ═══════════════ SEARCH ═══════════════ */
.search-wrap{position:relative}
.search-wrap input{
  width:100%;padding:9px 14px 9px 32px;font-size:.68rem;
  background:var(--surface);border:1px solid rgba(255,255,255,.05);border-radius:20px;
  color:var(--text);outline:none;font-family:inherit;letter-spacing:1px;transition:border-color .3s
}
.search-wrap input:focus{border-color:rgba(200,168,88,.2)}
.search-wrap .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:.6rem;color:var(--text3)}

/* ═══════════════ ELEMENTS GRID ═══════════════ */
.elements-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(56px,12vw,72px),1fr));
  gap:clamp(4px,.8vw,6px);max-height:42vh;overflow-y:auto;padding:2px;
  scroll-behavior:smooth;
}
.elements-grid::-webkit-scrollbar{width:3px}
.elements-grid::-webkit-scrollbar-thumb{background:rgba(255,255,255,.04);border-radius:2px}

.element-card{
  aspect-ratio:1;border-radius:var(--radius-sm);
  background:var(--surface);border:1px solid rgba(255,255,255,.03);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;position:relative;gap:1px;
}
.element-card:hover{background:var(--surface2);border-color:rgba(255,255,255,.08);transform:translateY(-2px)}
.element-card:active{transform:scale(.93)}
.element-card.selected{border-color:var(--gold);background:rgba(200,168,88,.06);box-shadow:0 0 12px rgba(200,168,88,.1)}
.element-card .e-emoji{font-size:clamp(1rem,2.5vw,1.7rem);transition:transform .2s}
.element-card:hover .e-emoji{transform:scale(1.1)}
.element-card .e-name{font-size:.42rem;color:var(--text3);text-align:center;line-height:1.1;max-width:88%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.element-card.new-arrival{animation:cardAppear .5s cubic-bezier(.2,1.2,.5,1)}
@keyframes cardAppear{0%{transform:scale(0);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}

/* ═══════════════ CONTROLS ═══════════════ */
.controls{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.controls button{
  padding:7px 14px;font-size:.55rem;border:1px solid rgba(255,255,255,.05);
  background:var(--surface);color:var(--text2);border-radius:18px;
  cursor:pointer;letter-spacing:1px;transition:all .3s;font-family:inherit
}
.controls button:hover{background:var(--surface2);border-color:rgba(255,255,255,.1);color:var(--text)}
.controls button.active{background:rgba(200,168,88,.08);border-color:rgba(200,168,88,.2);color:var(--gold)}
.controls button.danger:hover{border-color:rgba(255,64,129,.3);color:var(--magenta)}

/* ═══════════════ TOAST ═══════════════ */
#toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);z-index:70;
  font-size:.6rem;padding:8px 18px;border-radius:20px;pointer-events:none;
  opacity:0;transition:all .3s;
  background:rgba(0,0,0,.9);border:1px solid rgba(255,255,255,.08);color:var(--text2);
  letter-spacing:1px;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ═══════════════ RESPONSIVE ═══════════════ */
@media(max-width:768px){
  #app{grid-template-columns:1fr;padding:50px 8px 30px}
  #recipe-panel{width:280px;right:-290px}
  #recipe-toggle.open{right:280px}
}
@media(max-width:480px){
  .elements-grid{max-height:32vh;grid-template-columns:repeat(auto-fill,minmax(48px,1fr))}
  .slot{width:65px;height:65px}
  #recipe-panel{width:100vw;right:-100vw;border-left:none}
  #recipe-toggle.open{right:100vw}
}
</style>
</head>
<body>
<div id="back"><a href="../index.html">← 返回合集</a></div>
<canvas id="particles"></canvas>

<div id="recipe-panel">

<div id="app">

    <div class="combine-area">

    <div class="search-wrap">

      <input type="text" id="search" placeholder="搜索已发现的元素..." autocomplete="off">
    </div>

    <div class="elements-grid" id="grid"></div>

    <div class="controls">
      <button id="btnSort">📋 类别</button>
      <button id="btnRecent">🕐 最近</button>
      <button id="btnAtoZ">🔤 A-Z</button>
      <button id="btnReset" class="danger">🔄 重置</button>
    </div>
  </div>
</div>

<div class="result-flash" id="resultFlash"><span class="r-emoji"></span><span class="r-name"></span><span class="r-tag"></span></div>
<div id="toast"></div>

    {id:'blood',name:'血液',emoji:'🩸',cat:'life'},{id:'clover',name:'三叶草',emoji:'🍀',cat:'nature'},
    {id:'trade',name:'交易',emoji:'🤝',cat:'abstract'},{id:'fog_id',name:'雾气',emoji:'🌫️',cat:'nature'},
    {id:'power_plant',name:'发电厂',emoji:'🏭',cat:'tech'},
  ];
  for(const e of missing){if(!allElements.has(e.id)) allElements.set(e.id,e)}
}

// ── Smart fallback ──
function generateResult(a,b){
  if(a.id===b.id) return {id:`super_${a.id}`,name:`超级${a.name}`,emoji:a.emoji,cat:a.cat};
  const patterns=[
    {name:`${a.name}${b.name}`,emoji:a.emoji},
    {name:`${b.name}之${a.name}`,emoji:b.emoji},
    {name:`${a.name}的${b.name}`,emoji:a.emoji},
    {name:`${b.name}${a.name}`,emoji:b.emoji},
  ];
  const p=patterns[Math.floor((a.name.length+b.name.length)%patterns.length)];
  return {id:`${a.id}_${b.id}`.slice(0,40),name:p.name,emoji:p.emoji,cat:a.cat};
}

function getComboResult(id1,id2){
  const key=[id1,id2].sort().join('|');
  if(combos.has(key)) return allElements.get(combos.get(key))||null;
  if(!allElements.has(id1)||!allElements.has(id2)) return null;
  return generateResult(allElements.get(id1),allElements.get(id2));
}

// ═══════════════ INIT ═══════════════
function init(){
  buildDB();
  let saved=null;
  try{saved=JSON.parse(localStorage.getItem('craft_v2_save'))}catch{}
  if(saved&&saved.discovered&&saved.discoveryOrder){
    discovered=new Set(saved.discovered);discoveryOrder=saved.discoveryOrder;
    if(saved.recipes) discoveredRecipes=saved.recipes;
  }else{
    for(const id of['water','fire','wind','earth']){discovered.add(id);discoveryOrder.push(id)}
    discoveredRecipes=[];
  }
  sortMode='default';selected=[null,null];
  renderAll();renderRecipes();
}

// ═══════════════ RENDER ═══════════════
function renderAll(){updateSlots();renderGrid();countEl.textContent=discovered.size;comboCountEl.textContent=discoveredRecipes.length}
function updateSlots(){
  [slot1,slot2].forEach((slot,i)=>{
    const el=selected[i];slot.innerHTML='';slot.classList.toggle('filled',!!el);
    if(el) slot.innerHTML=`<span class="emoji">${el.emoji}</span><span class="name">${el.name}</span>`;
    else slot.innerHTML='<span class="placeholder">点击元素</span>';
  });
  combineBtn.classList.toggle('ready',selected[0]&&selected[1]);
}

function renderGrid(){
  grid.innerHTML='';
  let items=[...discovered].map(id=>allElements.get(id)).filter(Boolean);
  const q=searchInput.value.trim().toLowerCase();
  if(q) items=items.filter(e=>e.name.includes(q)||e.id.includes(q));
  if(sortMode==='category') items.sort((a,b)=>(a.cat||'z').localeCompare(b.cat||'z')||a.name.localeCompare(b.name));
  else if(sortMode==='recent'){const m=new Map(discoveryOrder.map((id,i)=>[id,i]));items.sort((a,b)=>(m.get(b.id)||0)-(m.get(a.id)||0))}
  else if(sortMode==='alpha') items.sort((a,b)=>a.name.localeCompare(b.name,'zh'));
  else items.sort((a,b)=>(a.cat||'z').localeCompare(b.cat||'z')||a.name.localeCompare(b.name));
  for(const e of items){
    const card=document.createElement('div');card.className='element-card';card.dataset.id=e.id;
    card.innerHTML=`<span class="e-emoji">${e.emoji}</span><span class="e-name">${e.name}</span>`;
    card.addEventListener('click',()=>onElementClick(e));
    if(selected[0]&&selected[0].id===e.id) card.classList.add('selected');
    if(selected[1]&&selected[1].id===e.id) card.classList.add('selected');
    grid.appendChild(card);
  }
}

function renderRecipes(){
  if(discoveredRecipes.length===0){rpList.innerHTML='<div class="rp-empty">合成两个元素后<br>配方会出现在这里</div>';rpCount.textContent='0条';return}
  rpCount.textContent=discoveredRecipes.length+'条';
  rpList.innerHTML=discoveredRecipes.slice().reverse().map(r=>{
    const a=allElements.get(r.a),b=allElements.get(r.b),res=allElements.get(r.result);
    if(!a||!b||!res) return '';
    return `<div class="rp-item"><span class="rp-emojis">${a.emoji}</span><span class="rp-arrow">+</span><span class="rp-emojis">${b.emoji}</span><span class="rp-arrow">=</span><span class="rp-result">${res.emoji} ${res.name}</span><span class="rp-formula">${a.name}+${b.name}</span></div>`;
  }).filter(Boolean).join('');
}

// ═══════════════ INTERACTIONS ═══════════════
function onElementClick(el){
  if(selected[0]&&selected[0].id===el.id){selected[0]=null}
  else if(selected[1]&&selected[1].id===el.id){selected[1]=null}
  else if(!selected[0]){selected[0]=el;slot1.classList.add('pulse');setTimeout(()=>slot1.classList.remove('pulse'),400)}
  else if(!selected[1]){selected[1]=el;slot2.classList.add('pulse');setTimeout(()=>slot2.classList.remove('pulse'),400)}
  else{selected[0]=el;slot1.classList.add('pulse');setTimeout(()=>slot1.classList.remove('pulse'),400)}
  renderAll();
  if(selected[0]&&selected[1]) setTimeout(doCombine,350);
}

function doCombine(){
  if(!selected[0]||!selected[1]) return;
  const a=selected[0],b=selected[1],result=getComboResult(a.id,b.id);
  if(!result){showToast('无法合成');selected=[null,null];renderAll();return}
  const isNew=!discovered.has(result.id);
  if(!allElements.has(result.id)) allElements.set(result.id,result);
  if(isNew){discovered.add(result.id);discoveryOrder.push(result.id)}
  // Record recipe
  const recipeKey=[a.id,b.id].sort().join('|');
  if(!discoveredRecipes.some(r=>[r.a,r.b].sort().join('|')===recipeKey)){
    discoveredRecipes.push({a:a.id,b:b.id,result:result.id});
  }
  saveGame();
  // Flash
  resultFlash.className='result-flash show'+(isNew?'':' known');
  resultFlash.querySelector('.r-emoji').textContent=result.emoji;
  resultFlash.querySelector('.r-name').textContent=result.name;
  resultFlash.querySelector('.r-tag').textContent=isNew?'🆕 新发现！':'已拥有';
  setTimeout(()=>resultFlash.classList.remove('show'),1500);
  if(isNew){spawnParticles();renderRecipes()}
  selected=[null,null];renderAll();
}

// ═══════════════ PARTICLES ═══════════════
const pCanvas=document.getElementById('particles'),pCtx=pCanvas.getContext('2d');
let particles=[];
function spawnParticles(){
  const cx=window.innerWidth/2,cy=window.innerHeight/2;
  for(let i=0;i<50;i++){
    const angle=Math.random()*Math.PI*2,speed=3+Math.random()*7;
    particles.push({x:cx,y:cy,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:1,decay:.008+Math.random()*.025,size:2+Math.random()*5,color:['#c8a858','#00e5ff','#ff4081','#50c8a0','#ffd740','#9888d8'][Math.floor(Math.random()*6)]});
  }
}
function updateParticles(){
  pCanvas.width=window.innerWidth;pCanvas.height=window.innerHeight;
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;p.vy+=.04;
    if(p.life<=0){particles.splice(i,1);continue}
    pCtx.beginPath();pCtx.arc(p.x,p.y,p.size,0,Math.PI*2);
    const r=parseInt(p.color.slice(1,3),16),g=parseInt(p.color.slice(3,5),16),b=parseInt(p.color.slice(5,7),16);
    pCtx.fillStyle=`rgba(${r},${g},${b},${p.life})`;pCtx.fill();
  }
  requestAnimationFrame(updateParticles);
}

// ═══════════════ SLOTS ═══════════════
slot1.addEventListener('click',()=>{if(selected[0]){selected[0]=null;renderAll()}});
slot2.addEventListener('click',()=>{if(selected[1]){selected[1]=null;renderAll()}});
combineBtn.addEventListener('click',doCombine);
searchInput.addEventListener('input',renderGrid);

// ═══════════════ RECIPE PANEL ═══════════════
recipeToggle.addEventListener('click',()=>{
  recipeOpen=!recipeOpen;
  recipePanel.classList.toggle('open',recipeOpen);
  recipeToggle.classList.toggle('open',recipeOpen);
  recipeToggle.textContent=recipeOpen?'关闭':'合成表';
});

// ═══════════════ CONTROLS ═══════════════
document.getElementById('btnSort').addEventListener('click',function(){
  sortMode=sortMode==='category'?'default':'category';this.classList.toggle('active',sortMode==='category');renderAll();
});
document.getElementById('btnRecent').addEventListener('click',function(){
  sortMode=sortMode==='recent'?'default':'recent';this.classList.toggle('active',sortMode==='recent');renderAll();
});
document.getElementById('btnAtoZ').addEventListener('click',function(){
  sortMode=sortMode==='alpha'?'default':'alpha';this.classList.toggle('active',sortMode==='alpha');renderAll();
});
document.getElementById('btnReset').addEventListener('click',()=>{
  if(confirm('确定要重置所有进度吗？此操作不可恢复。')){
    localStorage.removeItem('craft_v2_save');
    discovered=new Set(['water','fire','wind','earth']);discoveryOrder=['water','fire','wind','earth'];
    discoveredRecipes=[];selected=[null,null];
    renderAll();renderRecipes();showToast('已重置');
  }
});

function showToast(msg){toast.textContent=msg;toast.classList.add('show');if(toastTimer)clearTimeout(toastTimer);toastTimer=setTimeout(()=>toast.classList.remove('show'),2000)}
function saveGame(){try{localStorage.setItem('craft_v2_save',JSON.stringify({discovered:[...discovered],discoveryOrder,recipes:discoveredRecipes}))}catch{}}

// ═══════════════ START ═══════════════
init();updateParticles();
window.addEventListener('resize',()=>{pCanvas.width=window.innerWidth;pCanvas.height=window.innerHeight});
</script>
