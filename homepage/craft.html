<html lang="zh-CN">

<title>无限合成 · Infinite Craft</title>
<style>
/* ═══════════════ TOKENS ═══════════════ */
:root{
  --bg:#080814; --surface:rgba(12,10,24,.9); --surface2:rgba(18,14,32,.95);
  --gold:#c8a858; --gold2:#f0d68a; --cyan:#00e5ff; --magenta:#ff4081;
  --text:#c8bfa8; --text2:#8a8270; --text3:#4a4540;
  --radius:14px; --radius-sm:8px;
  --font:'PingFang SC','Microsoft YaHei',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{
  background:var(--bg);color:var(--text);font-family:var(--font);
  min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none;
  touch-action:manipulation;
  background-image:radial-gradient(ellipse 60% 50% at 50% -20%,rgba(200,168,88,.03),transparent),radial-gradient(ellipse 50% 40% at 80% 80%,rgba(0,229,255,.02),transparent);
}
#back{position:fixed;top:16px;left:16px;z-index:50}
#back a{color:rgba(255,255,255,.2);text-decoration:none;font-size:.65rem;letter-spacing:2px;transition:color .3s}
#back a:hover{color:rgba(255,255,255,.5)}
#particles{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ═══════════════ APP ═══════════════ */
#app{
  position:relative;z-index:1;max-width:680px;margin:0 auto;
  padding:60px 16px 40px;display:flex;flex-direction:column;gap:clamp(12px,2vh,20px);
  min-height:100vh;
}

/* Header */
.header{text-align:center}
.header h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:200;letter-spacing:6px;
  background:linear-gradient(180deg,#f0e0b8,#c8a858);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;margin-bottom:2px}
.header .stats{font-size:.65rem;color:var(--text3);letter-spacing:2px}
.header .stats span{color:var(--cyan);font-weight:600}

/* ═══════════════ COMBINE AREA ═══════════════ */
.combine-area{display:flex;align-items:center;justify-content:center;gap:clamp(8px,2vw,16px);padding:8px 0}
.slot{
  width:clamp(80px,18vw,110px);height:clamp(80px,18vw,110px);
  border:2px dashed rgba(255,255,255,.06);border-radius:var(--radius);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:all .25s;position:relative;cursor:pointer;
  background:rgba(255,255,255,.01);
}
.slot.filled{border-color:rgba(200,168,88,.25);background:rgba(200,168,88,.04);border-style:solid}
.slot .emoji{font-size:clamp(1.8rem,5vw,3rem);transition:transform .2s}
.slot .name{font-size:.55rem;color:var(--text3);margin-top:4px;letter-spacing:1px;transition:color .2s}
.slot.filled .name{color:var(--text2)}
.slot .placeholder{font-size:.55rem;color:var(--text3);opacity:.5;letter-spacing:2px}
.slot:hover{border-color:rgba(255,255,255,.1)}
.slot.pulse{animation:slotPulse .4s ease}
@keyframes slotPulse{0%,100%{box-shadow:0 0 0 rgba(200,168,88,0)}50%{box-shadow:0 0 30px rgba(200,168,88,.15)}}

.combine-btn{
  width:clamp(36px,8vw,50px);height:clamp(36px,8vw,50px);
  border-radius:50%;border:1px solid rgba(200,168,88,.15);
  background:rgba(200,168,88,.04);color:var(--gold);
  font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .3s;flex-shrink:0;
}
.combine-btn.ready{border-color:rgba(200,168,88,.4);background:rgba(200,168,88,.12);animation:glowPulse 1.5s infinite}
.combine-btn:active{transform:scale(.9)}
@keyframes glowPulse{0%,100%{box-shadow:0 0 15px rgba(200,168,88,.1)}50%{box-shadow:0 0 30px rgba(200,168,88,.25)}}

/* Result flash */
.result-flash{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:60;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  transition:transform .3s cubic-bezier(.2,1.2,.5,1);
}
.result-flash.show{transform:translate(-50%,-50%) scale(1)}
.result-flash .r-emoji{font-size:3.5rem;filter:drop-shadow(0 0 30px rgba(200,168,88,.5))}
.result-flash .r-name{font-size:.8rem;color:var(--gold2);letter-spacing:2px;text-shadow:0 0 20px rgba(200,168,88,.4)}
.result-flash .r-tag{font-size:.5rem;color:var(--cyan);letter-spacing:1px;padding:2px 8px;
  border:1px solid rgba(0,229,255,.2);border-radius:10px}

/* Known flash */
.result-flash.known .r-emoji{filter:drop-shadow(0 0 20px rgba(120,120,120,.3))}
.result-flash.known .r-name{color:var(--text3)}

/* ═══════════════ SEARCH ═══════════════ */
.search-wrap{position:relative}
.search-wrap input{
  width:100%;padding:10px 16px 10px 36px;font-size:.72rem;
  background:var(--surface);border:1px solid rgba(255,255,255,.05);border-radius:25px;
  color:var(--text);outline:none;font-family:inherit;letter-spacing:1px;transition:border-color .3s
}
.search-wrap input:focus{border-color:rgba(200,168,88,.2)}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:.7rem;color:var(--text3)}

/* ═══════════════ ELEMENTS GRID ═══════════════ */
.elements-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(62px,14vw,78px),1fr));
  gap:clamp(5px,1vw,8px);max-height:50vh;overflow-y:auto;padding:4px;
  scroll-behavior:smooth;
}
.elements-grid::-webkit-scrollbar{width:4px}
.elements-grid::-webkit-scrollbar-thumb{background:rgba(255,255,255,.05);border-radius:2px}

.element-card{
  aspect-ratio:1;border-radius:var(--radius-sm);
  background:var(--surface);border:1px solid rgba(255,255,255,.03);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;position:relative;
  gap:2px;
}
.element-card:hover{background:var(--surface2);border-color:rgba(255,255,255,.08);transform:translateY(-2px)}
.element-card:active{transform:scale(.94)}
.element-card.selected{border-color:var(--gold);background:rgba(200,168,88,.06);box-shadow:0 0 15px rgba(200,168,88,.1)}
.element-card .e-emoji{font-size:clamp(1.1rem,3vw,2rem);transition:transform .2s}
.element-card:hover .e-emoji{transform:scale(1.1)}
.element-card .e-name{font-size:.45rem;color:var(--text3);text-align:center;line-height:1.1;max-width:90%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* New element animation */
.element-card.new-arrival{animation:cardAppear .5s cubic-bezier(.2,1.2,.5,1)}
@keyframes cardAppear{0%{transform:scale(0);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}

/* ═══════════════ CONTROLS ═══════════════ */
.controls{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.controls button{
  padding:8px 16px;font-size:.6rem;border:1px solid rgba(255,255,255,.06);
  background:var(--surface);color:var(--text2);border-radius:20px;
  cursor:pointer;letter-spacing:1px;transition:all .3s;font-family:inherit
}
.controls button:hover{background:var(--surface2);border-color:rgba(255,255,255,.12);color:var(--text)}
.controls button.danger:hover{border-color:rgba(255,64,129,.3);color:var(--magenta)}

/* ═══════════════ TOAST ═══════════════ */
#toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);z-index:70;
  font-size:.65rem;padding:8px 18px;border-radius:20px;pointer-events:none;
  opacity:0;transition:all .3s;
  background:rgba(0,0,0,.9);border:1px solid rgba(255,255,255,.08);color:var(--text2);
  letter-spacing:1px;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ═══════════════ RESPONSIVE ═══════════════ */
@media(max-width:480px){
  #app{padding:50px 10px 30px}
  .elements-grid{max-height:40vh;grid-template-columns:repeat(auto-fill,minmax(55px,1fr))}
  .slot{width:70px;height:70px}
}
</style>
</head>

<div class="result-flash" id="resultFlash"><span class="r-emoji"></span><span class="r-name"></span><span class="r-tag"></span></div>

// ── Smart fallback: generate result name for unknown combinations ──
function generateResult(a, b) {
  // Rule: same elements = "Super X"
  if (a.id === b.id) return { id: `super_${a.id}`, name: `超级${a.name}`, emoji: a.emoji, cat: a.cat };

  // Rule: adjective patterns based on categories
  const catOrder = ['basic','nature','material','life','tech','cosmic','abstract','culture'];
  const aIdx = catOrder.indexOf(a.cat), bIdx = catOrder.indexOf(b.cat);

  // Pick the "more advanced" category as base
  if (bIdx > aIdx) [a, b] = [b, a];

  // Generate name patterns
  const patterns = [
    {name: `${a.name}${b.name}`, emoji: a.emoji},
    {name: `${b.name}之${a.name}`, emoji: b.emoji},
    {name: `${a.name}的${b.name}`, emoji: a.emoji},
  ];
  const pick = patterns[Math.floor((a.name.length + b.name.length) % patterns.length)];

  const newId = `${a.id}_${b.id}`.slice(0, 40);
  return { id: newId, name: pick.name, emoji: pick.emoji, cat: a.cat };
}

// ── Get combination result ──
function getComboResult(id1, id2) {
  const key = [id1, id2].sort().join('|');
  // Check database
  if (combos.has(key)) {
    const resultId = combos.get(key);
    return allElements.get(resultId) || null;
  }
  // Fallback
  if (!allElements.has(id1) || !allElements.has(id2)) return null;
  return generateResult(allElements.get(id1), allElements.get(id2));
}

// ═══════════════ INIT ═══════════════
function init(){
  buildDB();
  // Load save
  let saved = null;
  try{ saved = JSON.parse(localStorage.getItem('infinite_craft_save')); }catch{}
  if(saved && saved.discovered && saved.discoveryOrder){
    discovered = new Set(saved.discovered);
    discoveryOrder = saved.discoveryOrder;
  } else {
    // Start with 4 basic elements
    for(const id of ['water','fire','wind','earth']){
      discovered.add(id);
      discoveryOrder.push(id);
    }
  }
  sortMode = 'default';
  selected = [null, null];
  renderAll();
}

// ═══════════════ RENDER ═══════════════
function renderAll(){
  updateSlots();
  renderGrid();
  countEl.textContent = discovered.size;
}

function updateSlots(){
  [slot1, slot2].forEach((slot, i) => {
    const el = selected[i];
    slot.innerHTML = '';
    slot.classList.toggle('filled', !!el);
    if(el){
      slot.innerHTML = `<span class="emoji">${el.emoji}</span><span class="name">${el.name}</span>`;
    } else {
      slot.innerHTML = `<span class="placeholder">点击元素</span>`;
    }
  });
  const bothFilled = selected[0] && selected[1];
  combineBtn.classList.toggle('ready', bothFilled);
}

function renderGrid(){
  grid.innerHTML = '';
  let items = [...discovered].map(id => allElements.get(id)).filter(Boolean);

  // Sort
  const searchText = searchInput.value.trim().toLowerCase();
  if(searchText){
    items = items.filter(e => e.name.includes(searchText) || e.id.includes(searchText));
  }
  if(sortMode === 'category'){
    items.sort((a,b) => (a.cat||'z').localeCompare(b.cat||'z') || a.name.localeCompare(b.name));
  } else if(sortMode === 'recent'){
    const orderMap = new Map(discoveryOrder.map((id,i)=>[id,i]));
    items.sort((a,b) => (orderMap.get(b.id)||0) - (orderMap.get(a.id)||0));
  } else {
    // Default: category then name
    items.sort((a,b) => (a.cat||'z').localeCompare(b.cat||'z') || a.name.localeCompare(b.name));
  }

  for(const e of items){
    const card = document.createElement('div');
    card.className = 'element-card';
    card.dataset.id = e.id;
    card.innerHTML = `<span class="e-emoji">${e.emoji}</span><span class="e-name">${e.name}</span>`;
    card.addEventListener('click', () => onElementClick(e));
    // Highlight selected
    if(selected[0] && selected[0].id===e.id) card.classList.add('selected');
    if(selected[1] && selected[1].id===e.id) card.classList.add('selected');
    grid.appendChild(card);
  }
}

// ═══════════════ INTERACTIONS ═══════════════
function onElementClick(el){
  if(selected[0] && selected[0].id === el.id){
    selected[0] = null;
  } else if(selected[1] && selected[1].id === el.id){
    selected[1] = null;
  } else if(!selected[0]){
    selected[0] = el;
    slot1.classList.add('pulse'); setTimeout(()=>slot1.classList.remove('pulse'),400);
  } else if(!selected[1]){
    selected[1] = el;
    slot2.classList.add('pulse'); setTimeout(()=>slot2.classList.remove('pulse'),400);
  } else {
    // Both filled, replace slot 1
    selected[0] = el;
    slot1.classList.add('pulse'); setTimeout(()=>slot1.classList.remove('pulse'),400);
  }
  renderAll();
  // Auto combine if both filled
  if(selected[0] && selected[1]) setTimeout(doCombine, 300);
}

function doCombine(){
  if(!selected[0] || !selected[1]) return;
  const a = selected[0], b = selected[1];
  const result = getComboResult(a.id, b.id);
  if(!result) { showToast('无法合成'); return; }

  const isNew = !discovered.has(result.id);

  // Register element if new
  if(!allElements.has(result.id)){
    allElements.set(result.id, result);
  }

  // Add to discovered
  if(isNew){
    discovered.add(result.id);
    discoveryOrder.push(result.id);
    // Find and mark the new card
    setTimeout(() => {
      const card = grid.querySelector(`[data-id="${result.id}"]`);
      if(card) card.classList.add('new-arrival');
    }, 100);
  }

  // Save
  saveGame();

  // Show result flash
  resultFlash.className = 'result-flash show' + (isNew ? '' : ' known');
  resultFlash.querySelector('.r-emoji').textContent = result.emoji;
  resultFlash.querySelector('.r-name').textContent = result.name;
  resultFlash.querySelector('.r-tag').textContent = isNew ? '🆕 新发现！' : '已拥有';
  setTimeout(()=>resultFlash.classList.remove('show'), 1500);

  // Particle burst for new elements
  if(isNew) spawnParticles();

  // Clear selection
  selected = [null, null];
  renderAll();
}

// ═══════════════ PARTICLES ═══════════════
const pCanvas = document.getElementById('particles');
const pCtx = pCanvas.getContext('2d');
let particles = [];

function spawnParticles(){
  const cx = window.innerWidth/2, cy = window.innerHeight/2;
  for(let i=0;i<40;i++){
    const angle = Math.random()*Math.PI*2;
    const speed = 2+Math.random()*6;
    particles.push({
      x:cx, y:cy, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed,
      life:1, decay:.01+Math.random()*.03, size:2+Math.random()*4,
      color:['#c8a858','#00e5ff','#ff4081','#50c8a0','#ffd740'][Math.floor(Math.random()*5)]
    });
  }
}

function updateParticles(){
  pCanvas.width = window.innerWidth;
  pCanvas.height = window.innerHeight;
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    p.vy += .05; // gravity
    if(p.life<=0){ particles.splice(i,1); continue; }
    pCtx.beginPath();pCtx.arc(p.x,p.y,p.size,0,Math.PI*2);
    pCtx.fillStyle = p.color.replace(')',`,${p.life})`).replace('rgb','rgba');
    if(p.color.startsWith('#')){
      const r=parseInt(p.color.slice(1,3),16),g=parseInt(p.color.slice(3,5),16),b=parseInt(p.color.slice(5,7),16);
      pCtx.fillStyle=`rgba(${r},${g},${b},${p.life})`;
    }
    pCtx.fill();
  }
  requestAnimationFrame(updateParticles);
}

  sortMode = sortMode==='category'?'default':'category';
  renderAll();
});
document.getElementById('btnRecent').addEventListener('click', ()=>{
  sortMode = sortMode==='recent'?'default':'recent';
  renderAll();
});
document.getElementById('btnReset').addEventListener('click', ()=>{
  if(confirm('确定要重置所有进度吗？此操作不可恢复。')){
    localStorage.removeItem('infinite_craft_save');
    discovered = new Set(['water','fire','wind','earth']);
    discoveryOrder = ['water','fire','wind','earth'];
    selected = [null, null];
    renderAll();
    showToast('已重置');
  }
});

// ═══════════════ HELPERS ═══════════════
function showToast(msg){
  toast.textContent = msg; toast.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toast.classList.remove('show'), 2000);
}

function saveGame(){
  try{
    localStorage.setItem('infinite_craft_save', JSON.stringify({
      discovered: [...discovered],
      discoveryOrder: discoveryOrder
    }));
  }catch{}
}

// ═══════════════ START ═══════════════
init();
updateParticles();
requestAnimationFrame(updateParticles);

// Resize handler
window.addEventListener('resize', ()=>{
  pCanvas.width = window.innerWidth;
  pCanvas.height = window.innerHeight;
});
</script>
</body>
</html>
