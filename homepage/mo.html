<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>墨韵 · Ink Ripple</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0806;color:#c8bfa8;font-family:'PingFang SC','Microsoft YaHei',serif;
  overflow:hidden;height:100vh;width:100vw;touch-action:manipulation;
  user-select:none;-webkit-user-select:none;
}
#c{position:fixed;top:0;left:0;width:100%;height:100%}
#back{position:fixed;top:16px;left:16px;z-index:25}
#back a{color:rgba(255,255,255,.2);text-decoration:none;font-size:.65rem;letter-spacing:2px;transition:color .3s}
#back a:hover{color:rgba(255,255,255,.5)}
#ui{position:fixed;top:16px;right:16px;z-index:10;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
#level-name{font-size:.65rem;color:rgba(200,168,88,.5);letter-spacing:3px}
#strokes{display:flex;gap:3px}
#strokes span{width:3px;height:18px;background:rgba(200,60,40,.6);border-radius:1px;transition:all .3s}
#strokes span.used{background:rgba(200,60,40,.1);height:8px}
#level-num{font-size:.55rem;color:rgba(255,255,255,.15);letter-spacing:1px}
#msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:30;pointer-events:none;
  font-size:clamp(1rem,3vw,1.8rem);font-weight:300;letter-spacing:6px;opacity:0;transition:opacity .6s}
#msg.show{opacity:1}
#msg.win{color:#d4a843;text-shadow:0 0 40px rgba(212,168,67,.3)}
#msg.info{color:rgba(255,255,255,.4)}
#hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;
  font-size:.55rem;color:rgba(255,255,255,.12);letter-spacing:2px}
</style>
</head>
<body>
<div id="back"><a href="../index.html">← 返回合集</a></div>
<div id="ui">
  <div id="level-name">初探</div>
  <div id="strokes"></div>
  <div id="level-num">1 / 6</div>
</div>
<div id="msg"></div>
<div id="hint">轻点水面 · 涟漪推墨</div>
<canvas id="c"></canvas>
<script>
/* ═══════════════ 墨韵 · Ink Ripple ═══════════════ */

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const msgEl = document.getElementById('msg');
const strokesEl = document.getElementById('strokes');
const levelNameEl = document.getElementById('level-name');
const levelNumEl = document.getElementById('level-num');
const hintEl = document.getElementById('hint');

let W,H;

// ── Paper texture cache ──
let paperCanvas, paperCtx;
function buildPaper() {
  paperCanvas = document.createElement('canvas');
  paperCanvas.width = W; paperCanvas.height = H;
  paperCtx = paperCanvas.getContext('2d');
  // Base: warm rice-paper color with gradient variation
  const bgGrad = paperCtx.createRadialGradient(W*.3,H*.2,0,W*.5,H*.5,W);
  bgGrad.addColorStop(0,'#f5f0e6');bgGrad.addColorStop(.5,'#f0ead8');bgGrad.addColorStop(1,'#e8e0cc');
  paperCtx.fillStyle=bgGrad;paperCtx.fillRect(0,0,W,H);
  // Fibers
  paperCtx.strokeStyle='rgba(180,160,130,.04)';
  for(let i=0;i<600;i++){
    const x=Math.random()*W,y=Math.random()*H,len=3+Math.random()*15,angle=Math.random()*Math.PI;
    paperCtx.lineWidth=.3+Math.random()*.4;
    paperCtx.beginPath();paperCtx.moveTo(x,y);paperCtx.lineTo(x+Math.cos(angle)*len,y+Math.sin(angle)*len);
    paperCtx.stroke();
  }
  // Subtle brown stains
  for(let i=0;i<8;i++){
    const sx=Math.random()*W,sy=Math.random()*H,sr=20+Math.random()*50;
    const stain=paperCtx.createRadialGradient(sx,sy,0,sx,sy,sr);
    stain.addColorStop(0,'rgba(160,120,80,.03)');stain.addColorStop(1,'transparent');
    paperCtx.fillStyle=stain;paperCtx.fillRect(sx-sr,sy-sr,sr*2,sr*2);
  }
}

// ── Seal image ──
const sealImg = new Image();
sealImg.src = 'seal_real.png';

// ── Game state ──
const INK_COUNT = 600;
let inkParticles = [];     // {x,y,size,alpha,vx,vy}
let targets = [];          // {x,y,r,covered:bool}
let seals = [];            // {x,y,w,h} 印章障碍物
let ripples = [];          // {x,y,r,maxR,strength,age}
let strokesLeft = 0;
let totalStrokes = 0;
let currentLevel = 0;
let gameState = 'idle';    // idle | playing | won
let wonTimer = 0;
let hintTimer = 0;

// ── Level data ──
const levels = [
  {name:'初探',strokes:5,inks:[{x:.3,y:.4}],targets:[{x:.6,y:.45,r:.12}],seals:[]},
  {name:'双引',strokes:6,inks:[{x:.25,y:.5},{x:.75,y:.5}],targets:[{x:.35,y:.3,r:.1},{x:.65,y:.7,r:.1}],seals:[]},
  {name:'绕印',strokes:8,inks:[{x:.2,y:.5}],targets:[{x:.75,y:.5,r:.12}],seals:[{x:.42,y:.28,w:.12,h:.40}]},
  {name:'四散',strokes:9,inks:[{x:.5,y:.5}],targets:[{x:.15,y:.2,r:.08},{x:.85,y:.2,r:.08},{x:.15,y:.8,r:.08},{x:.85,y:.8,r:.08}],seals:[]},
  {name:'迷宫',strokes:12,inks:[{x:.1,y:.5},{x:.9,y:.5}],targets:[{x:.5,y:.15,r:.1},{x:.5,y:.85,r:.1}],seals:[{x:.32,y:.26,w:.08,h:.45},{x:.58,y:.26,w:.08,h:.45}]},
  {name:'大师',strokes:10,inks:[{x:.5,y:.8}],targets:[{x:.15,y:.15,r:.08},{x:.85,y:.15,r:.08},{x:.5,y:.25,r:.09}],seals:[{x:.26,y:.3,w:.12,h:.05},{x:.6,y:.3,w:.12,h:.05}]},
];

function loadLevel(idx) {
  const lv = levels[idx];
  currentLevel = idx;
  strokesLeft = lv.strokes;
  totalStrokes = lv.strokes;
  ripples = [];
  inkParticles = [];
  wonTimer = 0;
  gameState = 'playing';
  msgEl.classList.remove('show','win','info');
  hintEl.textContent = '轻点水面 · 涟漪推墨';
  levelNameEl.textContent = lv.name;
  levelNumEl.textContent = `${idx+1} / ${levels.length}`;

  // Parse targets & seals
  targets = lv.targets.map(t=>({x:t.x*W,y:t.y*H,r:t.r*Math.min(W,H),covered:false}));
  seals = (lv.seals||[]).map(s=>({x:s.x*W,y:s.y*H,w:s.w*W,h:s.h*Math.min(W,H)}));

  // Spawn ink particles around ink sources
  for(const src of lv.inks){
    const sx = src.x*W, sy = src.y*H;
    const count = Math.floor(INK_COUNT / lv.inks.length);
    for(let i=0;i<count;i++){
      const angle = Math.random()*Math.PI*2;
      const dist = Math.random()*Math.min(W,H)*.08;
      inkParticles.push({
        x: sx+Math.cos(angle)*dist,
        y: sy+Math.sin(angle)*dist,
        size: 1.5+Math.random()*4,
        alpha: .15+Math.random()*.35,
        vx:0, vy:0
      });
    }
  }
  // Build stroke indicators
  strokesEl.innerHTML = '';
  for(let i=0;i<lv.strokes;i++){
    const s = document.createElement('span');
    strokesEl.appendChild(s);
  }
  updateStrokeUI();
}

function updateStrokeUI() {
  const spans = strokesEl.children;
  for(let i=0;i<spans.length;i++){
    spans[i].classList.toggle('used', i >= strokesLeft);
  }
}

// ── Ripple effect ──
function addRipple(x,y) {
  if(strokesLeft<=0||gameState!=='playing') return;
  strokesLeft--;
  updateStrokeUI();
  ripples.push({x,y,r:0,maxR:Math.min(W,H)*.7,strength:1,age:0});
  if(strokesLeft===0) hintEl.textContent = '';
}

function updateRipples(dt) {
  const speed = Math.min(W,H)*.8; // pixels per second
  for(let i=ripples.length-1;i>=0;i--){
    const rp = ripples[i];
    rp.r += speed*dt;
    rp.age += dt;
    if(rp.r > rp.maxR){
      ripples.splice(i,1);
      continue;
    }
    // Push ink particles in expanding ring
    const ringW = Math.min(W,H)*.04;
    const innerR = rp.r - ringW*.5;
    const outerR = rp.r + ringW*.5;
    const strength = rp.strength*(1-rp.r/rp.maxR);

    for(const p of inkParticles){
      const dx = p.x - rp.x, dy = p.y - rp.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if(dist<.1) continue; // avoid center singularity
      if(dist>=innerR && dist<=outerR){
        // Push radially outward
        const push = strength*.08*(1-Math.abs(dist-rp.r)/(ringW*.5));
        const nx = dx/dist, ny = dy/dist;
        p.vx += nx*push*60;
        p.vy += ny*push*60;
        // Check seal collision against displayed square
        let blocked = false;
        const newX = p.x+nx*push*60, newY = p.y+ny*push*60;
        for(const s of seals){
          const b = sealBounds(s);
          if(newX>b.x&&newX<b.x+b.w&&newY>b.y&&newY<b.y+b.h){blocked=true;break}
        }
        if(!blocked){p.x=newX;p.y=newY}
      }
    }
  }
}

// ── Update ──
function updateInk(dt) {
  // Apply velocity with damping
  for(const p of inkParticles){
    p.x += p.vx*dt;
    p.y += p.vy*dt;
    p.vx *= .88; p.vy *= .88;
    // Bounce off edges
    if(p.x<0){p.x=0;p.vx*=-.5}
    if(p.x>W){p.x=W;p.vx*=-.5}
    if(p.y<0){p.y=0;p.vy*=-.5}
    if(p.y>H){p.y=H;p.vy*=-.5}
    // Seal collision against displayed square
    for(const s of seals){
      const b = sealBounds(s);
      if(p.x>b.x&&p.x<b.x+b.w&&p.y>b.y&&p.y<b.y+b.h){
        // Push to nearest edge
        const dl=p.x-b.x, dr=b.x+b.w-p.x, dt=p.y-b.y, db=b.y+b.h-p.y;
        const minD=Math.min(dl,dr,dt,db);
        if(minD===dl) p.x=b.x;
        else if(minD===dr) p.x=b.x+b.w;
        else if(minD===dt) p.y=b.y;
        else p.y=b.y+b.h;
        p.vx*=-.5;p.vy*=-.5;
      }
    }
  }

  // Check target coverage
  for(const t of targets){
    let cover = 0, total = 0;
    for(const p of inkParticles){
      const dx=p.x-t.x, dy=p.y-t.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<t.r){cover+=p.alpha;total++}
    }
    t.covered = cover > .15 || total > 8;
  }

  // Win check
  if(gameState==='playing' && targets.every(t=>t.covered)){
    gameState='won';wonTimer=0;
    msgEl.textContent='墨韵已成';
    msgEl.classList.add('show','win');
    hintEl.textContent = '';
    setTimeout(()=>msgEl.classList.remove('show','win'),2500);
  }
}

// ── Render ──
function drawPaper() {
  ctx.drawImage(paperCanvas,0,0);
}

function drawTargets() {
  for(const t of targets){
    // Outer glow ring
    const glow = ctx.createRadialGradient(t.x,t.y,t.r*.6,t.x,t.y,t.r);
    glow.addColorStop(0,'transparent');
    glow.addColorStop(.7,t.covered?'rgba(200,60,40,.04)':'rgba(255,60,30,.12)');
    glow.addColorStop(1,'transparent');
    ctx.fillStyle=glow;ctx.beginPath();ctx.arc(t.x,t.y,t.r,0,Math.PI*2);ctx.fill();

    // Main dashed ring - bolder and more visible
    ctx.strokeStyle=t.covered?'rgba(200,60,40,.18)':'rgba(255,50,30,.55)';
    ctx.lineWidth=2.5;
    ctx.setLineDash([5,4]);
    ctx.beginPath();ctx.arc(t.x,t.y,t.r,0,Math.PI*2);ctx.stroke();

    // Inner ring for depth
    ctx.strokeStyle=t.covered?'rgba(200,60,40,.1)':'rgba(255,80,50,.3)';
    ctx.lineWidth=.8;
    ctx.setLineDash([2,6]);
    ctx.beginPath();ctx.arc(t.x,t.y,t.r*.85,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);

    // Center dot anchor
    if(!t.covered){
      ctx.fillStyle='rgba(255,60,25,.6)';
      ctx.beginPath();ctx.arc(t.x,t.y,3,0,Math.PI*2);ctx.fill();
    } else {
      const g2 = ctx.createRadialGradient(t.x,t.y,0,t.x,t.y,t.r);
      g2.addColorStop(0,'rgba(200,60,40,.08)');g2.addColorStop(1,'transparent');
      ctx.fillStyle=g2;ctx.beginPath();ctx.arc(t.x,t.y,t.r,0,Math.PI*2);ctx.fill();
    }
  }
}

// ── Realistic Chinese seal renderer ──
function drawRealSeal(x,y,w,h,text,opacity=1) {
  ctx.save();
  // Slight random rotation for natural feel
  const rx=x+w/2, ry=y+h/2;
  ctx.translate(rx,ry);
  ctx.rotate((Math.random()-.5)*.03);
  ctx.translate(-rx,-ry);
  ctx.globalAlpha=opacity;

  const pad=w*.08, iw=w-pad*2, ih=h-pad*2;

  // 1. Outer border with irregular edges
  ctx.strokeStyle='#b83a2a';
  ctx.lineWidth=w*.06;
  ctx.beginPath();
  const segs=24, jitter=w*.02;
  for(let i=0;i<segs;i++){
    const t=i/segs*4;
    let bx,by;
    if(t<1){bx=x+pad+t*iw; by=y+pad}else if(t<2){bx=x+pad+iw; by=y+pad+(t-1)*ih}
    else if(t<3){bx=x+pad+(3-t)*iw; by=y+pad+ih}else{bx=x+pad; by=y+pad+(4-t)*ih}
    // Add jitter for handmade feel
    const jx=bx+(Math.random()-.5)*jitter;
    const jy=by+(Math.random()-.5)*jitter;
    if(i===0) ctx.moveTo(jx,jy); else ctx.lineTo(jx,jy);
  }
  ctx.closePath();ctx.stroke();

  // 2. Inner border (thinner)
  ctx.strokeStyle='#b83a2a';
  ctx.lineWidth=w*.025;
  const innerPad=w*.15;
  ctx.beginPath();
  ctx.roundRect(x+innerPad,y+innerPad,w-innerPad*2,h-innerPad*2,w*.04);
  ctx.stroke();

  // 3. Fill with seal paste texture
  // Base red
  const fillGrad=ctx.createRadialGradient(rx,ry,0,rx,ry,w*.7);
  fillGrad.addColorStop(0,'#c94030');fillGrad.addColorStop(.6,'#b83020');fillGrad.addColorStop(1,'#a02018');
  ctx.fillStyle=fillGrad;
  ctx.fillRect(x+pad*1.5,y+pad*1.5,w-pad*3,h-pad*3);

  // 4. Uneven paste texture - random darker/lighter spots
  for(let i=0;i<12;i++){
    const sx=x+pad+Math.random()*(w-pad*2);
    const sy=y+pad+Math.random()*(h-pad*2);
    const sr=w*.03+Math.random()*w*.08;
    const spot=ctx.createRadialGradient(sx,sy,0,sx,sy,sr);
    const dark=Math.random()>.5;
    spot.addColorStop(0,dark?'rgba(80,0,0,.15)':'rgba(255,200,180,.08)');
    spot.addColorStop(1,'transparent');
    ctx.fillStyle=spot;
    ctx.fillRect(sx-sr,sy-sr,sr*2,sr*2);
  }

  // 5. White carved text (阴刻)
  ctx.fillStyle='#f5efe0';
  const fontSize=h*.38;
  ctx.font=`bold ${fontSize}px 'STKaiti','KaiTi','FangSong','SimSun',serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  // Slightly uneven text opacity
  ctx.globalAlpha=opacity*(.78+Math.random()*.08);
  ctx.fillText(text,rx,ry);

  ctx.restore();
}

// Get actual displayed seal bounds (square, centered in bounding box)
function sealBounds(s){
  const size = Math.min(s.w, s.h);
  return {
    x: s.x + (s.w - size)/2,
    y: s.y + (s.h - size)/2,
    w: size, h: size
  };
}

function drawSeals() {
  for(const s of seals){
    if(sealImg.complete && sealImg.naturalWidth>0){
      const b = sealBounds(s);
      ctx.drawImage(sealImg, b.x, b.y, b.w, b.h);
    }
  }
}

function drawInk() {
  // Render ink particles as soft dark blobs
  // Use multiple passes: larger blur first, then darker core
  for(const p of inkParticles){
    if(p.alpha<.02) continue;
    const g = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size);
    const a = p.alpha;
    g.addColorStop(0,`rgba(20,15,10,${a})`);
    g.addColorStop(.4,`rgba(30,25,18,${a*.7})`);
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*1.5,0,Math.PI*2);ctx.fill();
  }
}

function drawRipples() {
  for(const rp of ripples){
    const alpha = (1-rp.r/rp.maxR)*.15;
    if(alpha<.01) continue;
    ctx.strokeStyle=`rgba(255,255,255,${alpha})`;
    ctx.lineWidth=1.5+Math.random()*.3;
    ctx.beginPath();ctx.arc(rp.x,rp.y,rp.r,0,Math.PI*2);ctx.stroke();
    // Inner echo
    const echoR = rp.r-Math.min(W,H)*.02;
    if(echoR>0){
      ctx.strokeStyle=`rgba(255,255,255,${alpha*.4})`;
      ctx.lineWidth=.6;
      ctx.beginPath();ctx.arc(rp.x,rp.y,echoR,0,Math.PI*2);ctx.stroke();
    }
  }
}

function drawSealStamp() {
  const ss = Math.min(W,H)*.07;
  const sx = W - ss*1.5, sy = H - ss*1.5;
  if(sealImg.complete && sealImg.naturalWidth>0){
    ctx.drawImage(sealImg, sx, sy, ss, ss);
  }
}

// ── Game loop ──
let lastTime = 0;
function loop(time) {
  requestAnimationFrame(loop);
  const dt = Math.min((time-lastTime)/1000,.05);
  lastTime = time;

  if(gameState==='playing'){
    updateRipples(dt);
    updateInk(dt);
  }

  // Render
  drawPaper();
  drawTargets();
  drawSeals();
  drawInk();
  drawRipples();
  drawSealStamp();

  // Won state
  if(gameState==='won'){
    wonTimer+=dt;
    if(wonTimer>2.5 && currentLevel<levels.length-1){
      // Auto-advance
    }
  }
}

// ── Input ──
function handleTap(x,y) {
  if(gameState==='playing'){
    // Check if tap is on a seal
    for(const s of seals){
      const b = sealBounds(s);
      if(x>b.x&&x<b.x+b.w&&y>b.y&&y<b.y+b.h) return; // can't tap on seals
    }
    addRipple(x,y);
  } else if(gameState==='won'){
    // Next level or restart
    if(currentLevel<levels.length-1){
      loadLevel(currentLevel+1);
    } else {
      showMsg('全部完成 · 大师之作','win');
      setTimeout(()=>loadLevel(0),3000);
    }
  }
}

canvas.addEventListener('click',e=>handleTap(e.clientX,e.clientY));
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0];
  handleTap(t.clientX,t.clientY);
},{passive:false});

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='r'||e.key==='R') loadLevel(currentLevel);
  if(e.key==='n'||e.key==='N'&&currentLevel<levels.length-1) loadLevel(currentLevel+1);
  if(e.key==='p'||e.key==='P'&&currentLevel>0) loadLevel(currentLevel-1);
});

function showMsg(text,cls) {
  msgEl.textContent=text;msgEl.classList.add('show',cls);
  setTimeout(()=>msgEl.classList.remove('show',cls),2000);
}

// ── Resize ──
function resize() {
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W;canvas.height=H;
  buildPaper();
  // Reload current level (reposition everything)
  if(currentLevel>=0&&currentLevel<levels.length) loadLevel(currentLevel);
}
window.addEventListener('resize',()=>{
  resize();
  if(gameState==='playing') gameState='playing'; // preserve state
});

// ── Init ──
resize();
loadLevel(0);
lastTime = performance.now();
requestAnimationFrame(loop);
</script>
</body>
</html>
