<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>墨韵 · Ink Ripple</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0806;color:#c8bfa8;font-family:'PingFang SC','Microsoft YaHei',serif;
  overflow:hidden;height:100vh;width:100vw;touch-action:manipulation;
  user-select:none;-webkit-user-select:none;
}
#c{position:fixed;top:0;left:0;width:100%;height:100%}

/* ── Back button ── */
#back{position:fixed;top:16px;left:16px;z-index:25}
#back a,#back button{color:rgba(255,255,255,.45);text-decoration:none;font-size:.65rem;letter-spacing:2px;
  transition:color .3s;background:none;border:none;cursor:pointer;font-family:inherit}
#back a:hover,#back button:hover{color:rgba(255,255,255,.7)}

/* ── Mode select overlay ── */
#mode-select{position:fixed;top:0;left:0;width:100%;height:100%;z-index:40;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
#mode-select.hidden{display:none}
#mode-title{font-size:clamp(1.4rem,4vw,2.2rem);font-weight:200;letter-spacing:12px;
  color:#c8bfa8;margin-bottom:16px;text-shadow:0 0 60px rgba(200,180,120,.15)}
.mode-btn{background:transparent;border:1px solid rgba(200,180,140,.25);color:#c8bfa8;
  padding:18px 48px;font-size:.85rem;letter-spacing:6px;cursor:pointer;font-family:inherit;
  transition:all .4s;position:relative;min-width:220px}
.mode-btn:hover{border-color:rgba(200,180,140,.5);background:rgba(200,180,140,.04);
  box-shadow:0 0 40px rgba(200,180,120,.08)}
.mode-btn .sub{display:block;font-size:.5rem;color:rgba(200,180,140,.5);letter-spacing:2px;margin-top:6px}

/* ── Game UI ── */
#ui{position:fixed;top:16px;right:16px;z-index:10;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
#mode-label{font-size:.5rem;color:rgba(200,168,88,.5);letter-spacing:2px}
#level-name{font-size:.65rem;color:rgba(200,168,88,.7);letter-spacing:3px}
#strokes{display:flex;gap:3px}
#strokes span{width:3px;height:18px;background:rgba(200,60,40,.6);border-radius:1px;transition:all .3s}
#strokes span.used{background:rgba(200,60,40,.1);height:8px}
#level-num{font-size:.55rem;color:rgba(255,255,255,.38);letter-spacing:1px}

/* ── Star display ── */
#stars-wrap{display:flex;gap:4px;margin-top:2px}
#stars-wrap .star{font-size:.8rem;color:rgba(255,255,255,.22);transition:all .5s}
#stars-wrap .star.lit{color:#d4a843;text-shadow:0 0 12px rgba(212,168,67,.5)}
#stars-wrap .star.earned{animation:starPop .5s ease-out}
@keyframes starPop{0%{transform:scale(2);opacity:0}60%{transform:scale(.85)}100%{transform:scale(1);opacity:1}}

/* ── Coverage bar (Mode 2) ── */
#coverage-bar-wrap{width:80px;height:3px;background:rgba(255,255,255,.05);border-radius:2px;margin-top:2px;overflow:hidden}
#coverage-bar{height:100%;background:rgba(200,160,60,.5);border-radius:2px;width:0%;transition:width .3s}

/* ── Messages ── */
#msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:30;pointer-events:none;
  font-size:clamp(1rem,3vw,1.8rem);font-weight:300;letter-spacing:6px;opacity:0;transition:opacity .6s}
#msg.show{opacity:1}
#msg.win{color:#d4a843;text-shadow:0 0 40px rgba(212,168,67,.3)}
#msg.info{color:rgba(255,255,255,.65)}
#hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;
  font-size:.55rem;color:rgba(255,255,255,.4);letter-spacing:2px}

/* ── Done button (Mode 2) ── */
#done-btn{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:20;
  background:transparent;border:1px solid rgba(200,180,140,.3);color:rgba(200,180,140,.6);
  padding:10px 32px;font-size:.65rem;letter-spacing:4px;cursor:pointer;font-family:inherit;
  transition:all .3s;display:none}
#done-btn:hover{border-color:rgba(200,180,140,.6);color:#d4a843}
#done-btn.visible{display:block}

/* ── Star bank ── */
#star-bank-wrap{display:flex;align-items:center;gap:4px;margin-top:2px}
#star-bank-icon{font-size:.55rem;color:#d4a843}
#star-bank-num{font-size:.5rem;color:rgba(212,168,67,.7);letter-spacing:1px}

/* ── Shop button ── */
#shop-btn{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:20;
  background:transparent;border:1px solid rgba(212,168,67,.25);color:rgba(212,168,67,.5);
  padding:6px 20px;font-size:.5rem;letter-spacing:3px;cursor:pointer;font-family:inherit;
  transition:all .3s;display:none}
#shop-btn:hover{border-color:rgba(212,168,67,.5);color:#d4a843}
#shop-btn.visible{display:block}

/* ── Shop overlay ── */
#shop-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:50;
  background:rgba(5,4,2,.92);display:none;flex-direction:column;align-items:center;
  justify-content:center;gap:12px;padding:20px}
#shop-overlay.open{display:flex}
#shop-title{font-size:1rem;color:#c8bfa8;letter-spacing:6px;font-weight:200}
#shop-sub{font-size:.5rem;color:rgba(200,180,140,.4);letter-spacing:2px;margin-bottom:8px}
#shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:8px;max-width:480px;width:90vw}
.shop-item{background:rgba(20,16,10,.6);border:1px solid rgba(200,180,140,.1);
  border-radius:8px;padding:12px;text-align:center;cursor:pointer;transition:all .3s}
.shop-item:hover{border-color:rgba(200,180,140,.3);background:rgba(30,24,14,.7)}
.shop-item.owned{border-color:rgba(80,200,140,.15);background:rgba(80,200,140,.03);cursor:default}
.shop-item .si-icon{font-size:1.2rem;margin-bottom:4px}
.shop-item .si-name{font-size:.6rem;color:#c8bfa8;letter-spacing:1px;margin-bottom:2px}
.shop-item .si-desc{font-size:.45rem;color:rgba(200,180,140,.35);margin-bottom:6px}
.shop-item .si-price{font-size:.5rem;color:#d4a843}
.shop-item.owned .si-price{color:rgba(80,200,140,.5)}
.shop-item .si-price .star-icon{font-size:.45rem}
#shop-close{background:transparent;border:1px solid rgba(200,180,140,.2);
  color:rgba(200,180,140,.4);padding:8px 28px;font-size:.55rem;letter-spacing:3px;
  cursor:pointer;font-family:inherit;margin-top:8px;transition:all .3s}
#shop-close:hover{border-color:rgba(200,180,140,.5);color:#d4a843}
</style>
</head>
<body>

<!-- Back -->
<div id="back">
  <button id="back-btn" onclick="backToMenu()">← 返回选单</button>
</div>

<!-- Mode Select -->
<div id="mode-select">
  <div id="mode-title">墨 韵</div>
  <button class="mode-btn" onclick="startMode('ripple')">
    涟漪推墨<span class="sub">点水成漪 · 推墨入韵</span>
  </button>
  <button class="mode-btn" onclick="startMode('settle')">
    评墨成韵<span class="sub">点水推墨 · 以量评星</span>
  </button>
</div>

<!-- Game UI -->
<div id="ui">
  <div id="mode-label"></div>
  <div id="level-name"></div>
  <div id="strokes"></div>
  <div id="stars-wrap"></div>
  <div id="coverage-bar-wrap"><div id="coverage-bar"></div></div>
  <div id="level-num"></div>
  <div id="star-bank-wrap">
    <span id="star-bank-icon">★</span>
    <span id="star-bank-num">0</span>
  </div>
</div>

<!-- Messages -->
<div id="msg"></div>
<div id="hint"></div>
<button id="done-btn" onclick="evaluateStars()">完成 · 评韵</button>
<button id="shop-btn" onclick="openShop()">🏪 墨韵商店</button>

<!-- Shop overlay -->
<div id="shop-overlay">
  <div id="shop-title">墨 韵 商 店</div>
  <div id="shop-sub">收集星辰 · 换取墨宝</div>
  <div id="shop-grid"></div>
  <div id="shop-close" onclick="closeShop()">关闭</div>
</div>
<canvas id="c"></canvas>

<script>
/* ═══════════════════════════════════════════════════
   墨韵 · Ink Ripple  — v2.0
   双模式：涟漪推墨 / 评墨成韵
   ═══════════════════════════════════════════════════ */

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const msgEl = document.getElementById('msg');
const strokesEl = document.getElementById('strokes');
const levelNameEl = document.getElementById('level-name');
const levelNumEl = document.getElementById('level-num');
const hintEl = document.getElementById('hint');
const modeSelectEl = document.getElementById('mode-select');
const modeLabelEl = document.getElementById('mode-label');
const starsWrap = document.getElementById('stars-wrap');
const coverageBar = document.getElementById('coverage-bar');
const coverageBarWrap = document.getElementById('coverage-bar-wrap');
const doneBtn = document.getElementById('done-btn');
const backBtn = document.getElementById('back-btn');

let W, H;

// ── Paper texture cache ──
let paperCanvas, paperCtx;
function buildPaper() {
  paperCanvas = document.createElement('canvas');
  paperCanvas.width = W; paperCanvas.height = H;
  paperCtx = paperCanvas.getContext('2d');
  const bgGrad = paperCtx.createRadialGradient(W*.3,H*.2,0,W*.5,H*.5,W);
  bgGrad.addColorStop(0,'#f5f0e6');bgGrad.addColorStop(.5,'#f0ead8');bgGrad.addColorStop(1,'#e8e0cc');
  paperCtx.fillStyle=bgGrad;paperCtx.fillRect(0,0,W,H);
  paperCtx.strokeStyle='rgba(180,160,130,.04)';
  for(let i=0;i<600;i++){
    const x=Math.random()*W,y=Math.random()*H,len=3+Math.random()*15,angle=Math.random()*Math.PI;
    paperCtx.lineWidth=.3+Math.random()*.4;
    paperCtx.beginPath();paperCtx.moveTo(x,y);paperCtx.lineTo(x+Math.cos(angle)*len,y+Math.sin(angle)*len);
    paperCtx.stroke();
  }
  for(let i=0;i<8;i++){
    const sx=Math.random()*W,sy=Math.random()*H,sr=20+Math.random()*50;
    const stain=paperCtx.createRadialGradient(sx,sy,0,sx,sy,sr);
    stain.addColorStop(0,'rgba(160,120,80,.03)');stain.addColorStop(1,'transparent');
    paperCtx.fillStyle=stain;paperCtx.fillRect(sx-sr,sy-sr,sr*2,sr*2);
  }
}

// ── Seal image ──
const sealImg = new Image();
sealImg.src = 'seal_real.png';

// ── Game state ──
const INK_COUNT = 600;
let inkParticles = [];
let targets = [];
let seals = [];
let ripples = [];
let windZones = [];       // {x,y,w,h,dx,dy} 风区
let strokesLeft = 0;
let totalStrokes = 0;
let currentLevel = 0;
let gameState = 'idle';   // idle | playing | won | evaluated
let wonTimer = 0;
let currentMode = null;   // 'ripple' | 'settle'
let starRating = 0;       // 0-3 for settle mode
let settleTimer = 0;      // timer for settle mode auto-evaluate
let dropsLeft = 0;

// ── Star bank & shop ──
let starBank = 0;
const SHOP_ITEMS = [
  {id:'extra', name:'涟漪+1', desc:'每关额外获得1次涟漪', price:25, icon:'🌊', owned:false},
  {id:'strong', name:'强漪', desc:'涟漪推力增强30%', price:35, icon:'💪', owned:false},
  {id:'thick', name:'浓墨', desc:'墨粒体积增大30%', price:40, icon:'🎨', owned:false},
  {id:'more', name:'墨量增幅', desc:'墨粒数量增加30%', price:50, icon:'📜', owned:false},
  {id:'gold', name:'墨色·金', desc:'墨迹化为金色华彩', price:60, icon:'✨', owned:false},
  {id:'seal', name:'透印', desc:'墨可缓透印章障碍', price:70, icon:'🔓', owned:false},
];

function loadProgress(){
  try{
    const d=JSON.parse(localStorage.getItem('moyun_progress')||'{}');
    starBank=d.starBank||0;
    (d.owned||[]).forEach(id=>{
      const item=SHOP_ITEMS.find(it=>it.id===id);
      if(item) item.owned=true;
    });
  }catch(e){}
  updateStarBankUI();
}

function saveProgress(){
  try{
    localStorage.setItem('moyun_progress', JSON.stringify({
      starBank: starBank,
      owned: SHOP_ITEMS.filter(it=>it.owned).map(it=>it.id)
    }));
    updateStarBankUI();
  }catch(e){}
}

function updateStarBankUI(){
  document.getElementById('star-bank-num').textContent=starBank;
}

// Apply shop buffs to game parameters
function getEffectiveInkCount(){
  let count=INK_COUNT;
  if(SHOP_ITEMS.find(it=>it.id==='more'&&it.owned)) count=Math.floor(count*1.3);
  return count;
}

function getEffectiveStrokeBonus(){
  return SHOP_ITEMS.find(it=>it.id==='extra'&&it.owned)?1:0;
}

function getEffectiveRippleStrength(){
  return SHOP_ITEMS.find(it=>it.id==='strong'&&it.owned)?1.3:1;
}

function getEffectiveInkSize(){
  return SHOP_ITEMS.find(it=>it.id==='thick'&&it.owned)?1.3:1;
}

function hasGoldInk(){
  return SHOP_ITEMS.find(it=>it.id==='gold'&&it.owned);
}

function hasSealPierce(){
  return SHOP_ITEMS.find(it=>it.id==='seal'&&it.owned);
}

function openShop(){
  const grid=document.getElementById('shop-grid');
  grid.innerHTML='';
  SHOP_ITEMS.forEach(item=>{
    const div=document.createElement('div');
    div.className='shop-item'+(item.owned?' owned':'');
    div.innerHTML=`<div class="si-icon">${item.icon}</div>
      <div class="si-name">${item.name}</div>
      <div class="si-desc">${item.desc}</div>
      <div class="si-price">${item.owned?'已拥有':'★ '+item.price}</div>`;
    if(!item.owned){
      div.addEventListener('click',e=>{e.stopPropagation();buyItem(item.id);});
    }
    grid.appendChild(div);
  });
  document.getElementById('shop-overlay').classList.add('open');
}

function closeShop(){
  document.getElementById('shop-overlay').classList.remove('open');
}

function buyItem(id){
  const item=SHOP_ITEMS.find(it=>it.id===id);
  if(!item||item.owned) return;
  if(starBank<item.price){
    showMsg('星辰不足','info');
    return;
  }
  starBank-=item.price;
  item.owned=true;
  saveProgress();
  openShop(); // refresh shop display
  showMsg('获得 '+item.name+'！','win');
  // Reload current level to apply buffs
  if(currentMode==='settle'&&currentLevel>=0){
    loadSettleLevel(currentLevel);
  }
  if(currentMode==='ripple'&&currentLevel>=0){
    loadRippleLevel(currentLevel);
  }
}

loadProgress();

// ═══════════════════ LEVEL DATA ═══════════════════

// ── Mode 1: 涟漪推墨 (Ripple Push) ──
const rippleLevels = [
  // 原有6关
  {name:'初探',strokes:5,inks:[{x:.3,y:.4}],targets:[{x:.6,y:.45,r:.12}],seals:[],winds:[]},
  {name:'双引',strokes:6,inks:[{x:.25,y:.5},{x:.75,y:.5}],targets:[{x:.35,y:.3,r:.1},{x:.65,y:.7,r:.1}],seals:[],winds:[]},
  {name:'绕印',strokes:8,inks:[{x:.2,y:.5}],targets:[{x:.75,y:.5,r:.12}],seals:[{x:.42,y:.28,w:.12,h:.40}],winds:[]},
  {name:'四散',strokes:9,inks:[{x:.5,y:.5}],targets:[{x:.15,y:.2,r:.08},{x:.85,y:.2,r:.08},{x:.15,y:.8,r:.08},{x:.85,y:.8,r:.08}],seals:[],winds:[]},
  {name:'迷宫',strokes:12,inks:[{x:.1,y:.5},{x:.9,y:.5}],targets:[{x:.5,y:.15,r:.1},{x:.5,y:.85,r:.1}],seals:[{x:.32,y:.26,w:.08,h:.45},{x:.58,y:.26,w:.08,h:.45}],winds:[]},
  {name:'大师',strokes:10,inks:[{x:.5,y:.8}],targets:[{x:.15,y:.15,r:.08},{x:.85,y:.15,r:.08},{x:.5,y:.25,r:.09}],seals:[{x:.26,y:.3,w:.12,h:.05},{x:.6,y:.3,w:.12,h:.05}],winds:[]},
  // 新增6关
  {name:'逆风',strokes:8,inks:[{x:.2,y:.5}],targets:[{x:.75,y:.5,r:.12}],seals:[],
    winds:[{x:.35,y:.15,w:.3,h:.7,dx:0,dy:-40}]},
  {name:'双印',strokes:10,inks:[{x:.5,y:.85}],targets:[{x:.2,y:.2,r:.09},{x:.8,y:.2,r:.09}],
    seals:[{x:.35,y:.28,w:.10,h:.38},{x:.55,y:.28,w:.10,h:.38}],winds:[]},
  {name:'远引',strokes:7,inks:[{x:.08,y:.5}],targets:[{x:.88,y:.5,r:.1}],
    seals:[{x:.25,y:.35,w:.08,h:.25},{x:.5,y:.35,w:.08,h:.25},{x:.72,y:.35,w:.08,h:.25}],winds:[]},
  {name:'三星',strokes:11,inks:[{x:.2,y:.25},{x:.5,y:.75},{x:.8,y:.25}],
    targets:[{x:.35,y:.7,r:.08},{x:.65,y:.7,r:.08},{x:.5,y:.3,r:.09}],seals:[],winds:[]},
  {name:'回流',strokes:14,inks:[{x:.5,y:.85}],
    targets:[{x:.25,y:.3,r:.07},{x:.5,y:.2,r:.07},{x:.75,y:.3,r:.07},{x:.8,y:.55,r:.07},{x:.65,y:.7,r:.07},{x:.35,y:.7,r:.07},{x:.2,y:.55,r:.07}],
    seals:[{x:.42,y:.35,w:.16,h:.04}],winds:[]},
  {name:'终极',strokes:12,inks:[{x:.5,y:.9}],
    targets:[{x:.15,y:.2,r:.08},{x:.38,y:.15,r:.07},{x:.62,y:.15,r:.07},{x:.85,y:.2,r:.08},{x:.5,y:.4,r:.09}],
    seals:[{x:.28,y:.28,w:.12,h:.04},{x:.6,y:.28,w:.12,h:.04}],
    winds:[{x:.15,y:.35,w:.7,h:.25,dx:0,dy:-25}]},
];

// ── Mode 2: 评墨成韵 (Ripple Push + Star Evaluation) ──
const settleLevels = [
  {name:'初评',strokes:5,inks:[{x:.3,y:.4}],targets:[{x:.6,y:.45,r:.12}],seals:[],winds:[],starThresholds:[0.3,0.6,0.85]},
  {name:'双评',strokes:7,inks:[{x:.25,y:.5},{x:.75,y:.5}],targets:[{x:.35,y:.3,r:.1},{x:.65,y:.7,r:.1}],seals:[],winds:[],starThresholds:[0.3,0.6,0.85]},
  {name:'印评',strokes:9,inks:[{x:.2,y:.5}],targets:[{x:.75,y:.5,r:.12}],seals:[{x:.42,y:.28,w:.12,h:.40}],winds:[],starThresholds:[0.25,0.55,0.8]},
  {name:'四评',strokes:10,inks:[{x:.5,y:.5}],targets:[{x:.15,y:.2,r:.08},{x:.85,y:.2,r:.08},{x:.15,y:.8,r:.08},{x:.85,y:.8,r:.08}],seals:[],winds:[],starThresholds:[0.25,0.55,0.8]},
  {name:'风评',strokes:8,inks:[{x:.2,y:.5}],targets:[{x:.75,y:.5,r:.12}],seals:[],
    winds:[{x:.35,y:.15,w:.3,h:.7,dx:0,dy:-40}],starThresholds:[0.25,0.55,0.8]},
  {name:'迷评',strokes:12,inks:[{x:.1,y:.5},{x:.9,y:.5}],targets:[{x:.5,y:.15,r:.1},{x:.5,y:.85,r:.1}],
    seals:[{x:.32,y:.26,w:.08,h:.45},{x:.58,y:.26,w:.08,h:.45}],winds:[],starThresholds:[0.2,0.5,0.75]},
  {name:'远评',strokes:8,inks:[{x:.08,y:.5}],targets:[{x:.88,y:.5,r:.1}],
    seals:[{x:.25,y:.35,w:.08,h:.25},{x:.5,y:.35,w:.08,h:.25},{x:.72,y:.35,w:.08,h:.25}],winds:[],starThresholds:[0.2,0.45,0.7]},
  {name:'宗评',strokes:12,inks:[{x:.5,y:.9}],
    targets:[{x:.15,y:.2,r:.08},{x:.38,y:.15,r:.07},{x:.62,y:.15,r:.07},{x:.85,y:.2,r:.08},{x:.5,y:.4,r:.09}],
    seals:[{x:.28,y:.28,w:.12,h:.04},{x:.6,y:.28,w:.12,h:.04}],
    winds:[{x:.15,y:.35,w:.7,h:.25,dx:0,dy:-25}],starThresholds:[0.2,0.45,0.7]},
];

// ═══════════════ MODE MANAGEMENT ═══════════════

function backToMenu() {
  gameState = 'idle';
  currentMode = null;
  ripples = [];
  inkParticles = [];
  modeSelectEl.classList.remove('hidden');
  starsWrap.innerHTML = '';
  coverageBarWrap.style.display = 'none';
  doneBtn.classList.remove('visible');
  modeLabelEl.textContent = '';
  levelNameEl.textContent = '';
  levelNumEl.textContent = '';
  strokesEl.innerHTML = '';
  hintEl.textContent = '';
  msgEl.classList.remove('show','win','info');
  document.getElementById('shop-btn').classList.remove('visible');
  starRating = 0;
}

function startMode(mode) {
  currentMode = mode;
  modeSelectEl.classList.add('hidden');
  starRating = 0;
  starsWrap.innerHTML = '';
  if (mode === 'ripple') {
    modeLabelEl.textContent = '涟漪推墨';
    hintEl.textContent = '轻点水面 · 涟漪推墨';
    coverageBarWrap.style.display = 'none';
    doneBtn.classList.remove('visible');
    document.getElementById('shop-btn').classList.remove('visible');
    updateStarBankUI();
    loadRippleLevel(0);
  } else if (mode === 'settle') {
    modeLabelEl.textContent = '评墨成韵';
    hintEl.textContent = '轻点水面 · 涟漪推墨';
    coverageBarWrap.style.display = 'block';
    coverageBar.style.width = '0%';
    doneBtn.classList.add('visible');
    doneBtn.textContent = '完成 · 评韵';
    document.getElementById('shop-btn').classList.add('visible');
    updateStarBankUI();
    // Init star display
    starsWrap.innerHTML = '';
    for(let i=0;i<3;i++){
      const s=document.createElement('span');s.className='star';s.textContent='★';
      starsWrap.appendChild(s);
    }
    loadSettleLevel(0);
  }
}

// ═══════════════ MODE 1: RIPPLE PUSH ═══════════════

function loadRippleLevel(idx) {
  const lv = rippleLevels[idx];
  currentLevel = idx;
  strokesLeft = lv.strokes;
  totalStrokes = lv.strokes;
  ripples = [];
  inkParticles = [];
  wonTimer = 0;
  gameState = 'playing';
  starRating = 0;
  msgEl.classList.remove('show','win','info');
  hintEl.textContent = '轻点水面 · 涟漪推墨';
  levelNameEl.textContent = lv.name;
  levelNumEl.textContent = `${idx+1} / ${rippleLevels.length}`;
  starsWrap.innerHTML = '';
  coverageBarWrap.style.display = 'none';
  doneBtn.classList.remove('visible');

  targets = lv.targets.map(t=>({x:t.x*W,y:t.y*H,r:t.r*Math.min(W,H),covered:false}));
  seals = (lv.seals||[]).map(s=>({x:s.x*W,y:s.y*H,w:s.w*W,h:s.h*Math.min(W,H)}));
  windZones = (lv.winds||[]).map(w=>({x:w.x*W,y:w.y*H,w:w.w*W,h:w.h*H,dx:w.dx,dy:w.dy}));

  // Spawn ink
  for(const src of lv.inks){
    const sx=src.x*W, sy=src.y*H;
    const effInk=getEffectiveInkCount();
    const count=Math.floor(effInk/lv.inks.length);
    for(let i=0;i<count;i++){
      const angle=Math.random()*Math.PI*2;
      const dist=Math.random()*Math.min(W,H)*.08;
      inkParticles.push({
        x:sx+Math.cos(angle)*dist, y:sy+Math.sin(angle)*dist,
        size:(1.5+Math.random()*4)*getEffectiveInkSize(), alpha:.15+Math.random()*.35, vx:0,vy:0
      });
    }
  }
  strokesEl.innerHTML='';
  for(let i=0;i<lv.strokes;i++){
    const s=document.createElement('span');strokesEl.appendChild(s);
  }
  updateStrokeUI();
}

function updateStrokeUI(){
  const spans=strokesEl.children;
  for(let i=0;i<spans.length;i++) spans[i].classList.toggle('used',i>=strokesLeft);
}

function addRipple(x,y){
  if(strokesLeft<=0||gameState!=='playing') return;
  strokesLeft--;
  updateStrokeUI();
  ripples.push({x,y,r:0,maxR:Math.min(W,H)*.7,strength:1,age:0});
  if(strokesLeft===0) hintEl.textContent=currentMode==='settle'?'评韵中… 点击「完成·评韵」':'';
}

function updateRipples(dt){
  const speed=Math.min(W,H)*.8;
  for(let i=ripples.length-1;i>=0;i--){
    const rp=ripples[i];
    rp.r+=speed*dt; rp.age+=dt;
    if(rp.r>rp.maxR){ripples.splice(i,1);continue;}
    const ringW=Math.min(W,H)*.04;
    const innerR=rp.r-ringW*.5, outerR=rp.r+ringW*.5;
    const strength=rp.strength*(1-rp.r/rp.maxR);
    for(const p of inkParticles){
      const dx=p.x-rp.x, dy=p.y-rp.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<.1) continue;
      if(dist>=innerR && dist<=outerR){
        const push=strength*.08*(1-Math.abs(dist-rp.r)/(ringW*.5))*getEffectiveRippleStrength();
        const nx=dx/dist, ny=dy/dist;
        p.vx+=nx*push*60; p.vy+=ny*push*60;
        let blocked=false;
        const newX=p.x+nx*push*60, newY=p.y+ny*push*60;
        for(const s of seals){
          const b=sealBounds(s);
          if(newX>b.x&&newX<b.x+b.w&&newY>b.y&&newY<b.y+b.h){blocked=true;break}
        }
        if(!blocked){p.x=newX;p.y=newY}
        else if(hasSealPierce()){
          // Seal pierce: slow pass through seals
          const sx=p.x+nx*push*20, sy=p.y+ny*push*20;
          p.x=sx; p.y=sy;
        }
      }
    }
  }
}

function updateInkRipple(dt){
  for(const p of inkParticles){
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.vx*=.88; p.vy*=.88;
    // Wind zones
    for(const w of windZones){
      if(p.x>w.x&&p.x<w.x+w.w&&p.y>w.y&&p.y<w.y+w.h){
        p.vx+=w.dx*dt*.3; p.vy+=w.dy*dt*.3;
      }
    }
    // Edges
    if(p.x<0){p.x=0;p.vx*=-.5}if(p.x>W){p.x=W;p.vx*=-.5}
    if(p.y<0){p.y=0;p.vy*=-.5}if(p.y>H){p.y=H;p.vy*=-.5}
    // Seals
    for(const s of seals){
      const b=sealBounds(s);
      if(p.x>b.x&&p.x<b.x+b.w&&p.y>b.y&&p.y<b.y+b.h){
        const dl=p.x-b.x,dr=b.x+b.w-p.x,dt2=p.y-b.y,db=b.y+b.h-p.y;
        const minD=Math.min(dl,dr,dt2,db);
        if(minD===dl)p.x=b.x;else if(minD===dr)p.x=b.x+b.w;
        else if(minD===dt2)p.y=b.y;else p.y=b.y+b.h;
        p.vx*=-.5;p.vy*=-.5;
      }
    }
  }
  // Check targets
  for(const t of targets){
    let cover=0,total=0;
    for(const p of inkParticles){
      const dx=p.x-t.x,dy=p.y-t.y,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<t.r){cover+=p.alpha;total++}
    }
    t.covered=cover>.15||total>8;
  }
  if(currentMode==='ripple'&&gameState==='playing'&&targets.every(t=>t.covered)){
    gameState='won';wonTimer=0;
    msgEl.textContent='墨韵已成';msgEl.classList.add('show','win');
    hintEl.textContent='点击任意处继续';
    setTimeout(()=>msgEl.classList.remove('show','win'),2500);
  }
}

// ═══════════════ MODE 2: 评墨成韵 (Ripple + Star) ═══════════════

function loadSettleLevel(idx){
  const lv=settleLevels[idx];
  currentLevel=idx;
  strokesLeft=lv.strokes+getEffectiveStrokeBonus();
  totalStrokes=lv.strokes+getEffectiveStrokeBonus();
  ripples=[];
  inkParticles=[];
  wonTimer=0; settleTimer=0;
  gameState='playing';
  starRating=0;
  msgEl.classList.remove('show','win','info');
  hintEl.textContent='轻点水面 · 涟漪推墨';
  levelNameEl.textContent=lv.name;
  levelNumEl.textContent=`${idx+1} / ${settleLevels.length}`;
  coverageBar.style.width='0%';
  coverageBarWrap.style.display='block';
  doneBtn.classList.add('visible');
  doneBtn.textContent='完成 · 评韵';
  starsWrap.innerHTML='';
  for(let i=0;i<3;i++){
    const s=document.createElement('span');s.className='star';s.textContent='★';
    starsWrap.appendChild(s);
  }

  targets=lv.targets.map(t=>({x:t.x*W,y:t.y*H,r:t.r*Math.min(W,H)}));
  seals=(lv.seals||[]).map(s=>({x:s.x*W,y:s.y*H,w:s.w*W,h:s.h*Math.min(W,H)}));
  windZones=(lv.winds||[]).map(w=>({x:w.x*W,y:w.y*H,w:w.w*W,h:w.h*H,dx:w.dx,dy:w.dy}));

  // Spawn ink at sources (same as ripple mode)
  for(const src of lv.inks){
    const sx=src.x*W, sy=src.y*H;
    const effInk=getEffectiveInkCount();
    const count=Math.floor(effInk/lv.inks.length);
    for(let i=0;i<count;i++){
      const angle=Math.random()*Math.PI*2;
      const dist=Math.random()*Math.min(W,H)*.08;
      inkParticles.push({
        x:sx+Math.cos(angle)*dist, y:sy+Math.sin(angle)*dist,
        size:(1.5+Math.random()*4)*getEffectiveInkSize(), alpha:.15+Math.random()*.35, vx:0,vy:0
      });
    }
  }
  strokesEl.innerHTML='';
  for(let i=0;i<totalStrokes;i++){
    const s=document.createElement('span');strokesEl.appendChild(s);
  }
  updateStrokeUI();
}

function calcAvgCoverage(){
  if(targets.length===0) return 0;
  let totalCov=0;
  for(const t of targets){
    const samples=40;
    let hits=0;
    for(let i=0;i<samples;i++){
      const angle=Math.random()*Math.PI*2;
      const dist=Math.random()*t.r;
      const sx=t.x+Math.cos(angle)*dist;
      const sy=t.y+Math.sin(angle)*dist;
      for(const p of inkParticles){
        const dx=sx-p.x,dy=sy-p.y;
        if(Math.sqrt(dx*dx+dy*dy)<p.size*1.8){hits++;break}
      }
    }
    totalCov+=hits/samples;
  }
  return totalCov/targets.length;
}

function evaluateStars(){
  if(gameState!=='playing'&&gameState!=='won') return;
  const cov=calcAvgCoverage();
  const lv=settleLevels[currentLevel];
  const thresholds=lv.starThresholds||[0.3,0.6,0.85];
  let stars=0;
  if(cov>=thresholds[0]) stars=1;
  if(cov>=thresholds[1]) stars=2;
  if(cov>=thresholds[2]) stars=3;
  starRating=stars;
  gameState='evaluated';
  coverageBar.style.width=(cov*100)+'%';
  doneBtn.classList.remove('visible');

  // Deposit earned stars into bank
  if(stars>0){
    starBank+=stars;
    saveProgress();
  }

  const starEls=starsWrap.children;
  for(let i=0;i<3;i++){
    setTimeout(()=>{
      if(i<stars) starEls[i].classList.add('lit','earned');
    },i*400);
  }

  const starNames=['','一星 · 初窥','二星 · 入韵','三星 · 墨成'];
  if(stars>=2){
    msgEl.textContent=starNames[stars];msgEl.classList.add('show','win');
    setTimeout(()=>msgEl.classList.remove('show','win'),2500);
  } else if(stars===1){
    msgEl.textContent='一星 · 初窥';msgEl.classList.add('show','info');
    setTimeout(()=>msgEl.classList.remove('show','info'),2000);
  } else {
    msgEl.textContent='再试一次';msgEl.classList.add('show','info');
    setTimeout(()=>msgEl.classList.remove('show','info'),2000);
  }
  hintEl.textContent='点击任意处继续';
}

// ═══════════════ RENDER ═══════════════

function sealBounds(s){
  const size=Math.min(s.w,s.h);
  return {x:s.x+(s.w-size)/2,y:s.y+(s.h-size)/2,w:size,h:size};
}

function drawPaper(){ctx.drawImage(paperCanvas,0,0);}

function drawTargets(){
  for(const t of targets){
    // Glow ring
    const glow=ctx.createRadialGradient(t.x,t.y,t.r*.6,t.x,t.y,t.r);
    const covered=(currentMode==='ripple'&&t.covered);
    glow.addColorStop(0,'transparent');
    glow.addColorStop(.7,covered?'rgba(200,60,40,.04)':'rgba(255,60,30,.12)');
    glow.addColorStop(1,'transparent');
    ctx.fillStyle=glow;ctx.beginPath();ctx.arc(t.x,t.y,t.r,0,Math.PI*2);ctx.fill();
    // Dashed ring
    ctx.strokeStyle=covered?'rgba(200,60,40,.18)':'rgba(255,50,30,.55)';
    ctx.lineWidth=2.5;ctx.setLineDash([5,4]);
    ctx.beginPath();ctx.arc(t.x,t.y,t.r,0,Math.PI*2);ctx.stroke();
    // Inner ring
    ctx.strokeStyle=covered?'rgba(200,60,40,.1)':'rgba(255,80,50,.3)';
    ctx.lineWidth=.8;ctx.setLineDash([2,6]);
    ctx.beginPath();ctx.arc(t.x,t.y,t.r*.85,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);
    // Center dot
    if(!covered){
      ctx.fillStyle='rgba(255,60,25,.6)';
      ctx.beginPath();ctx.arc(t.x,t.y,3,0,Math.PI*2);ctx.fill();
    }else{
      const g2=ctx.createRadialGradient(t.x,t.y,0,t.x,t.y,t.r);
      g2.addColorStop(0,'rgba(200,60,40,.08)');g2.addColorStop(1,'transparent');
      ctx.fillStyle=g2;ctx.beginPath();ctx.arc(t.x,t.y,t.r,0,Math.PI*2);ctx.fill();
    }
  }
}

function drawWindZones(){
  for(const w of windZones){
    // Subtle directional hint
    ctx.strokeStyle='rgba(180,200,220,.12)';
    ctx.lineWidth=1;ctx.setLineDash([3,8]);
    ctx.beginPath();ctx.rect(w.x,w.y,w.w,w.h);ctx.stroke();
    ctx.setLineDash([]);
    // Arrow hints
    const cx=w.x+w.w/2, cy=w.y+w.h/2;
    for(let i=0;i<3;i++){
      const ax=cx+(Math.random()-.5)*w.w*.6;
      const ay=cy+(Math.random()-.5)*w.h*.6;
      ctx.fillStyle='rgba(180,200,220,.08)';
      ctx.beginPath();
      ctx.moveTo(ax,ay);
      ctx.lineTo(ax+w.dx*.15,ay+w.dy*.15);
      ctx.strokeStyle='rgba(180,200,220,.08)';ctx.lineWidth=.5;
      ctx.stroke();
    }
  }
}

function drawSeals(){
  for(const s of seals){
    if(sealImg.complete&&sealImg.naturalWidth>0){
      const b=sealBounds(s);
      ctx.drawImage(sealImg,b.x,b.y,b.w,b.h);
    }
  }
}

function drawInk(){
  for(const p of inkParticles){
    if(p.alpha<.02) continue;
    const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size);
    const a=p.alpha;
    if(hasGoldInk()){g.addColorStop(0,`rgba(180,140,40,${a*.9})`);g.addColorStop(.4,`rgba(200,160,60,${a*.6})`);}else{g.addColorStop(0,`rgba(20,15,10,${a})`);}
    if(!hasGoldInk()) g.addColorStop(.4,`rgba(30,25,18,${a*.7})`);
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*1.5,0,Math.PI*2);ctx.fill();
  }
}

function drawRipples(){
  for(const rp of ripples){
    const alpha=(1-rp.r/rp.maxR)*.15;
    if(alpha<.01) continue;
    ctx.strokeStyle=`rgba(255,255,255,${alpha})`;
    ctx.lineWidth=1.5+Math.random()*.3;
    ctx.beginPath();ctx.arc(rp.x,rp.y,rp.r,0,Math.PI*2);ctx.stroke();
    const echoR=rp.r-Math.min(W,H)*.02;
    if(echoR>0){
      ctx.strokeStyle=`rgba(255,255,255,${alpha*.4})`;
      ctx.lineWidth=.6;
      ctx.beginPath();ctx.arc(rp.x,rp.y,echoR,0,Math.PI*2);ctx.stroke();
    }
  }
}

function drawSealStamp(){
  const ss=Math.min(W,H)*.07;
  const sx=W-ss*1.5,sy=H-ss*1.5;
  if(sealImg.complete&&sealImg.naturalWidth>0){
    ctx.drawImage(sealImg,sx,sy,ss,ss);
  }
}

// ═══════════════ GAME LOOP ═══════════════

let lastTime=0;
function loop(time){
  requestAnimationFrame(loop);
  const dt=Math.min((time-lastTime)/1000,.05);
  lastTime=time;

  if(gameState==='playing'){
    if(currentMode==='ripple'||currentMode==='settle'){
      updateRipples(dt);
      updateInkRipple(dt);
    }
  }
  // Mode 2: auto-evaluate after strokes used up
  if(currentMode==='settle'&&gameState==='playing'&&strokesLeft===0){
    settleTimer+=dt;
    const cov=calcAvgCoverage();
    coverageBar.style.width=(cov*100)+'%';
    if(settleTimer>3) evaluateStars();
  }

  // Render
  drawPaper();
  drawWindZones();
  drawTargets();
  drawSeals();
  drawInk();
  if(currentMode==='ripple'||currentMode==='settle') drawRipples();
  drawSealStamp();

  // Won timer (ripple mode)
  if(currentMode==='ripple'&&gameState==='won'){
    wonTimer+=dt;
  }
}

// ═══════════════ INPUT ═══════════════

function handleTap(x,y){
  if(!currentMode) return;

  if(currentMode==='ripple'){
    if(gameState==='playing'){
      for(const s of seals){
        const b=sealBounds(s);
        if(x>b.x&&x<b.x+b.w&&y>b.y&&y<b.y+b.h) return;
      }
      addRipple(x,y);
    }else if(gameState==='won'){
      if(currentLevel<rippleLevels.length-1){
        loadRippleLevel(currentLevel+1);
      }else{
        showMsg('全部完成 · 大师之作','win');
        setTimeout(()=>loadRippleLevel(0),3000);
      }
    }
  }

  if(currentMode==='settle'){
    if(gameState==='playing'){
      for(const s of seals){
        const b=sealBounds(s);
        if(x>b.x&&x<b.x+b.w&&y>b.y&&y<b.y+b.h) return;
      }
      addRipple(x,y);
    }else if(gameState==='evaluated'){
      if(currentLevel<settleLevels.length-1){
        loadSettleLevel(currentLevel+1);
      }else{
        showMsg('全部完成 · 墨韵天成','win');
        setTimeout(()=>loadSettleLevel(0),3000);
      }
    }
  }
}

canvas.addEventListener('click',e=>handleTap(e.clientX,e.clientY));
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0];
  handleTap(t.clientX,t.clientY);
},{passive:false});

// Done button for settle mode
doneBtn.addEventListener('click',e=>{
  e.stopPropagation();
  if(currentMode==='settle'&&gameState==='playing') evaluateStars();
});
doneBtn.addEventListener('touchstart',e=>{
  e.stopPropagation();e.preventDefault();
  if(currentMode==='settle'&&gameState==='playing') evaluateStars();
});

// Keyboard
document.addEventListener('keydown',e=>{
  if(!currentMode) return;
  if(e.key==='r'||e.key==='R'){
    if(currentMode==='ripple') loadRippleLevel(currentLevel);
    else loadSettleLevel(currentLevel);
  }
  if(e.key==='n'||e.key==='N'){
    const lvls=currentMode==='ripple'?rippleLevels:settleLevels;
    if(currentLevel<lvls.length-1){
      if(currentMode==='ripple') loadRippleLevel(currentLevel+1);
      else loadSettleLevel(currentLevel+1);
    }
  }
  if((e.key==='p'||e.key==='P')&&currentLevel>0){
    if(currentMode==='ripple') loadRippleLevel(currentLevel-1);
    else loadSettleLevel(currentLevel-1);
  }
  if(e.key==='Escape') backToMenu();
});

function showMsg(text,cls){
  msgEl.textContent=text;msgEl.classList.add('show',cls);
  setTimeout(()=>msgEl.classList.remove('show',cls),2000);
}

// ═══════════════ RESIZE ═══════════════

function resize(){
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W;canvas.height=H;
  buildPaper();
  if(currentMode==='ripple'&&currentLevel>=0&&currentLevel<rippleLevels.length){
    loadRippleLevel(currentLevel);
  }else if(currentMode==='settle'&&currentLevel>=0&&currentLevel<settleLevels.length){
    loadSettleLevel(currentLevel);
  }
}
window.addEventListener('resize',()=>resize());

// ═══════════════ INIT ═══════════════

resize();
lastTime=performance.now();
requestAnimationFrame(loop);
</script>
